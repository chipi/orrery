name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier in-flight runs on the same ref when a newer push or
# PR update lands. Keeps the latest commit's status as the source of
# truth and prevents stale "cancelled" entries from polling the README
# badge. Per-PR runs cancel cleanly when a new commit pushes to the
# same PR; main runs cancel cleanly when fast-consecutive pushes land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Split prettier + eslint into discrete steps with `if: always()` on
      # the second so a Prettier failure doesn't short-circuit ESLint —
      # both diagnostics surface in a single CI run, matching the
      # preflight rule (CLAUDE.md "Before pushing").
      - name: Lint — Prettier
        run: npm run lint:prettier
      - name: Lint — ESLint
        if: always()
        run: npm run lint:eslint
      - run: npm run test
      - run: npm run validate-data
      - run: npm run build
