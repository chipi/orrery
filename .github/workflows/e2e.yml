name: e2e

# E2e (Playwright) tests run on three triggers:
#
#   1. After CI succeeds on main — workflow_run gate. CI is fast (~2-3 min);
#      e2e is heavy (~23 min). Sequencing means a typecheck/lint/unit-test
#      failure short-circuits the pipeline instead of wasting 23 min of
#      Playwright runtime, and the chained preview.yml only deploys when
#      both CI and e2e are green. Replaces the prior `push: main` trigger.
#   2. Manual workflow_dispatch — for ad-hoc reruns from the Actions tab.
#   3. Nightly cron — catches regressions introduced by EXTERNAL state
#      drift, not code changes: a CDN going offline, an upstream asset
#      source moving a URL, a Wikimedia rate-limit kicking in. Without
#      this, a quiet weekend on the repo could ship a broken Pages site
#      without anyone noticing. Time chosen to land before EU devs
#      start the day (05:07 UTC = 06:07 CET = 22:07 PST), with the
#      off-minute (:07) to dodge GitHub Actions' top-of-hour scheduler
#      contention. Runs independently of the CI gate — point is to
#      catch drift that ISN'T tied to a code push.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '7 5 * * *'

# When a newer push to main lands while an earlier e2e is still running,
# cancel the older run rather than letting it complete after the new
# code is already on main. Without this, fast-consecutive pushes leave
# a string of "cancelled" runs as the latest workflow status, which
# renders as a red/grey badge on the README even though every commit
# eventually passes. Pre-empting cleanly keeps the badge accurate.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # workflow_run fires on EVERY completion of the upstream workflow
    # (success + failure + cancelled). Skip the run unless CI passed,
    # so a typecheck/lint/unit-test failure doesn't waste 23 min of
    # Playwright runtime. Manual + cron triggers always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    # 40 min — the suite ran in ~6.7min through May 3 (28 missions,
    # single-worker Chromium per playwright.config.ts), ~13-15min
    # after v0.3's 32-mission expansion + i18n-es smoke, and now
    # ~23min after v0.6 added 3 new science suit sections + 13 new
    # /fleet space-suit entries (+ their per-locale smoke). Local
    # full-suite still runs in ~6.5min — CI is 3-4× slower under
    # ubuntu-latest 1-worker constraint. 40min keeps margin against
    # variance; a runaway hang still surfaces, but cold-cache + asset
    # load spikes don't kill the build.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          # When triggered via workflow_run, pin to the exact SHA that
          # passed CI — not the latest of main (which may have moved on
          # if a newer commit landed between CI completing and e2e
          # starting). For manual + cron triggers, falls through to the
          # default checkout (latest of the triggering ref / main).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run e2e tests
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
