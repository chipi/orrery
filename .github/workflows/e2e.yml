name: e2e

# E2e (Playwright) tests run on push to main only — not on every PR —
# per ADR-015 (testing strategy). Heavier than unit tests; gates the
# Pages deploy implicitly because the deploy workflow chains off main.

on:
  push:
    branches: [main]
  workflow_dispatch:

# When a newer push to main lands while an earlier e2e is still running,
# cancel the older run rather than letting it complete after the new
# code is already on main. Without this, fast-consecutive pushes leave
# a string of "cancelled" runs as the latest workflow status, which
# renders as a red/grey badge on the README even though every commit
# eventually passes. Pre-empting cleanly keeps the badge accurate.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 25 min — the suite ran in ~6.7min through May 3 (28 missions,
    # single-worker Chromium per playwright.config.ts) and grew to
    # ~13-15min after v0.3's 32-mission expansion + i18n-es smoke +
    # heliocentric arc validation. CI is forced to 1 worker for
    # canvas-rAF determinism, so we can't trade workers for speed.
    # 25min gives margin against ubuntu-latest variance without
    # masking real regressions: a slow run still surfaces in the run
    # summary, but a 1-2min spike doesn't kill the build.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run e2e tests
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
