name: Deploy preview

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Weekly rebuild keeps NASA mission imagery + any external assets
  # fresh per ADR-016 — Mondays 06:00 UTC catches a new week's
  # featured imagery without a manual push.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /orrery/
      - run: npm run docs:build
        env:
          DOCS_BASE: /orrery/docs/
      - run: cp -R docs/.vitepress/dist build/docs
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
