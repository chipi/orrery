<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" role="img" aria-label="A life-in-space chapter cover — a stylised astronaut silhouette floating in microgravity beside a faint Earth horizon, with three vertical bone-bone-muscle indicator bars on the right.">
  <style>
    .stroke-soft { stroke: rgba(255,255,255,0.18); stroke-width: 0.8; fill: none; }
    .stroke-mid { stroke: rgba(255,255,255,0.35); stroke-width: 1; fill: none; }
    .stroke-bright { stroke: rgba(255,255,255,0.7); stroke-width: 1.2; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .gold { stroke: #ffc850; stroke-width: 1.6; fill: none; }
    .red { stroke: #ff6b6b; stroke-width: 1.6; fill: none; }
    .blue { stroke: #6aa9ff; stroke-width: 1.4; fill: none; }
    .star { fill: rgba(255,255,255,0.55); }
    .dim-star { fill: rgba(255,255,255,0.22); }
    .suit-fill { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.6); stroke-width: 1; }
    .visor { fill: rgba(108,169,255,0.18); stroke: rgba(108,169,255,0.6); stroke-width: 1; }
    .bar-bg { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.25); stroke-width: 0.8; }
    .bar-fill { fill: rgba(78,205,196,0.45); }
    .bar-fill-low { fill: rgba(255,107,107,0.4); }
    .earth-arc { fill: rgba(108,169,255,0.18); stroke: rgba(108,169,255,0.45); stroke-width: 1; }
    .label { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1.5px; }
  </style>

  <!-- Starfield -->
  <circle class="dim-star" cx="40" cy="30" r="0.7" />
  <circle class="star" cx="110" cy="22" r="0.8" />
  <circle class="dim-star" cx="170" cy="46" r="0.5" />
  <circle class="dim-star" cx="240" cy="18" r="0.6" />
  <circle class="star" cx="310" cy="40" r="0.7" />
  <circle class="dim-star" cx="380" cy="24" r="0.5" />
  <circle class="dim-star" cx="450" cy="50" r="0.6" />
  <circle class="star" cx="510" cy="34" r="0.7" />
  <circle class="dim-star" cx="560" cy="48" r="0.5" />
  <circle class="dim-star" cx="80" cy="76" r="0.6" />
  <circle class="dim-star" cx="200" cy="92" r="0.5" />
  <circle class="star" cx="280" cy="78" r="0.7" />
  <circle class="dim-star" cx="370" cy="92" r="0.5" />

  <!-- Earth horizon arc (lower-left) -->
  <path class="earth-arc" d="M -40 270 Q 240 130 600 280 L 600 260 L 0 260 Z" />

  <!-- Floating astronaut: head + torso + arms slightly splayed (microgravity pose) -->
  <g transform="translate(220,158)">
    <!-- visor / helmet -->
    <circle class="suit-fill" cx="0" cy="-46" r="20" />
    <ellipse class="visor" cx="0" cy="-46" rx="13" ry="9" />
    <!-- torso / suit -->
    <path class="suit-fill" d="M -22 -22 Q -28 22 -16 50 L 16 50 Q 28 22 22 -22 Q 14 -34 0 -34 Q -14 -34 -22 -22 Z" />
    <!-- chest module -->
    <rect class="stroke-mid" x="-9" y="-10" width="18" height="14" rx="2" />
    <line class="accent" x1="-5" y1="-3" x2="5" y2="-3" />
    <!-- arms — splayed at gentle angles to read as "floating" -->
    <path class="suit-fill" d="M -22 -16 Q -50 -10 -54 14 Q -50 18 -44 16 Q -32 0 -22 -8 Z" />
    <path class="suit-fill" d="M 22 -16 Q 50 -10 54 14 Q 50 18 44 16 Q 32 0 22 -8 Z" />
    <!-- legs -->
    <path class="suit-fill" d="M -14 50 Q -20 76 -16 90 L -2 90 L -2 50 Z" />
    <path class="suit-fill" d="M 14 50 Q 20 76 16 90 L 2 90 L 2 50 Z" />
    <!-- umbilical line drifting up-right toward off-frame structure -->
    <path class="stroke-mid" d="M 12 -28 Q 60 -36 90 -52" stroke-dasharray="2 2" />
  </g>

  <!-- Vital-sign indicator bars on the right -->
  <g transform="translate(440,140)">
    <!-- BONE -->
    <rect class="bar-bg" x="0" y="0" width="22" height="78" />
    <rect class="bar-fill-low" x="0" y="38" width="22" height="40" />
    <text class="label" x="0" y="-6">BONE</text>
    <text class="label" x="0" y="92">−1% / mo</text>
    <!-- MUSCLE -->
    <rect class="bar-bg" x="36" y="0" width="22" height="78" />
    <rect class="bar-fill-low" x="36" y="30" width="22" height="48" />
    <text class="label" x="36" y="-6">MUSC</text>
    <text class="label" x="36" y="92">atrophy</text>
    <!-- O2 / countermeasure -->
    <rect class="bar-bg" x="72" y="0" width="22" height="78" />
    <rect class="bar-fill" x="72" y="14" width="22" height="64" />
    <text class="label" x="72" y="-6">CM</text>
    <text class="label" x="72" y="92">ARED 2h</text>
  </g>
</svg>
