<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Four conic sections — circle, ellipse, parabola, hyperbola — with the focal body marked">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.5; fill: none; }
    .focus { fill: #4ecdc4; }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Common focus (centre body) -->
  <circle cx="200" cy="180" r="6" class="focus" />
  <!-- Circle: r=40, e=0 -->
  <circle cx="200" cy="180" r="40" class="stroke" />
  <text x="180" y="232" class="label-mute">e=0 · circle</text>
  <!-- Ellipse: rx=80, ry=60, e≈0.66 -->
  <ellipse cx="200" cy="180" rx="80" ry="60" class="stroke" />
  <text x="284" y="180" class="label-mute">e=0.66 · ellipse</text>
  <!-- Parabola: opening upward through (200,260) - approx using a quadratic-like path -->
  <path d="M 80 60 Q 200 280 320 60" class="accent" />
  <text x="100" y="48" class="label-accent">e=1 · parabola (escape)</text>
  <!-- Hyperbola branch: open arms - drawn as two diverging curves -->
  <path d="M 60 30 Q 160 130 60 250" class="stroke" />
  <path d="M 340 30 Q 240 130 340 250" class="stroke" />
  <text x="160" y="290" class="label-mute">e&gt;1 · hyperbola (flyby)</text>
</svg>
