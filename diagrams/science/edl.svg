<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="EDL sequence at Mars — entry on heat shield, parachute deploy at supersonic Mach, powered descent on retro-rockets, sky-crane touchdown.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2.4; fill: none; }
    .heat { stroke: #ff6b6b; stroke-width: 2.4; fill: none; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tick { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.8px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">EDL · ENTRY, DESCENT, LANDING — 7 MINUTES OF TERROR</text>

  <!-- Top of atmosphere -->
  <line class="dashed" x1="40" y1="60" x2="560" y2="60" />
  <text class="sublabel" x="44" y="55">TOP OF ATMOSPHERE · ~125 km</text>

  <!-- Surface -->
  <line class="stroke" x1="40" y1="280" x2="560" y2="280" />
  <text class="sublabel" x="44" y="298">SURFACE · 0 km · Mars 1 bar = none</text>

  <!-- Altitude scale -->
  <text class="tick" x="34" y="64" text-anchor="end">125</text>
  <text class="tick" x="34" y="125" text-anchor="end">80</text>
  <text class="tick" x="34" y="180" text-anchor="end">40</text>
  <text class="tick" x="34" y="240" text-anchor="end">10</text>
  <text class="tick" x="34" y="284" text-anchor="end">0 km</text>

  <!-- Phase 1: Entry (red — heat) -->
  <path class="heat" d="M 80 70 Q 130 95 180 140" />
  <circle fill="#ff6b6b" cx="80" cy="70" r="4" />
  <text class="label-red" x="86" y="80">1 · ENTRY</text>
  <text class="sublabel" x="86" y="92">~5.5 km/s · 1500 °C heat shield</text>
  <text class="sublabel" x="86" y="104">decelerate to Mach 2 (~70 km)</text>

  <!-- Phase 2: Parachute (teal) -->
  <path class="accent" d="M 180 140 Q 220 170 240 200" />
  <!-- Parachute canopy -->
  <path stroke="rgba(255,255,255,0.85)" stroke-width="1.4" fill="rgba(255,255,255,0.06)" d="M 222 178 Q 240 168 258 178" />
  <line stroke="rgba(255,255,255,0.55)" stroke-width="1" x1="226" y1="180" x2="234" y2="196" />
  <line stroke="rgba(255,255,255,0.55)" stroke-width="1" x1="254" y1="180" x2="246" y2="196" />
  <text class="label-accent" x="262" y="170">2 · PARACHUTE</text>
  <text class="sublabel" x="262" y="182">Mach 1.5 → subsonic at ~10 km</text>
  <text class="sublabel" x="262" y="194">supersonic chute · 21 m diameter</text>

  <!-- Phase 3: Powered descent (teal arrows) -->
  <path class="accent" d="M 240 200 Q 270 230 290 250" />
  <line stroke="#4ecdc4" stroke-width="2" x1="282" y1="252" x2="282" y2="270" />
  <line stroke="#4ecdc4" stroke-width="2" x1="290" y1="254" x2="294" y2="272" />
  <line stroke="#4ecdc4" stroke-width="2" x1="298" y1="252" x2="302" y2="270" />
  <text class="label-accent" x="320" y="234">3 · POWERED DESCENT</text>
  <text class="sublabel" x="320" y="246">8 MR-80B retro-rockets · 1.6 km altitude</text>
  <text class="sublabel" x="320" y="258">slow to 0.75 m/s for touchdown</text>

  <!-- Phase 4: Sky-crane touchdown -->
  <rect fill="rgba(255,255,255,0.85)" x="436" y="270" width="14" height="10" />
  <line stroke="rgba(255,255,255,0.5)" stroke-width="1" x1="443" y1="260" x2="443" y2="270" />
  <circle fill="rgba(78,205,196,0.55)" cx="443" cy="256" r="6" />
  <text class="label-accent" x="465" y="262">4 · SKY-CRANE / TOUCHDOWN</text>
  <text class="sublabel" x="465" y="274">winches rover down · cut cables</text>
  <text class="sublabel" x="465" y="286">descent stage flies off · wheels-down</text>

  <!-- Timeline -->
  <line class="dashed" x1="80" y1="60" x2="80" y2="305" />
  <line class="dashed" x1="240" y1="200" x2="240" y2="305" />
  <line class="dashed" x1="443" y1="280" x2="443" y2="305" />
  <text class="tick" x="80" y="316" text-anchor="middle">T+0</text>
  <text class="tick" x="240" y="316" text-anchor="middle">T+5 min</text>
  <text class="tick" x="443" y="316" text-anchor="middle">T+7 min</text>
</svg>
