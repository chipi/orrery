<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="An EVA — extra-vehicular activity — path on a space station: depressurise airlock, translate along handrails to a worksite on the truss, work the task, translate back to the airlock.">
  <style>
    .panel { fill: rgba(255,255,255,0.025); stroke: rgba(255,255,255,0.15); stroke-width: 1; }
    .module { fill: rgba(78,205,196,0.18); stroke: #4ecdc4; stroke-width: 1.4; }
    .airlock { fill: rgba(255,200,80,0.22); stroke: #ffc850; stroke-width: 1.6; }
    .worksite { fill: rgba(255,107,107,0.22); stroke: #ff6b6b; stroke-width: 1.6; }
    .truss { stroke: rgba(255,255,255,0.5); stroke-width: 2.5; fill: none; }
    .solar { fill: rgba(123,156,255,0.15); stroke: rgba(123,156,255,0.55); stroke-width: 1.2; }
    .path-out { stroke: #ffc850; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; }
    .path-back { stroke: #ff6b6b; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; }
    .anchor { fill: #ffc850; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .label-red { fill: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tag { fill: rgba(255,255,255,0.6); font-family: 'Space Mono', monospace; font-size: 7.5px; }
    .dim-star { fill: rgba(255,255,255,0.18); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">EVA · EXTRA-VEHICULAR ACTIVITY — AIRLOCK → WORKSITE → AIRLOCK</text>

  <!-- Solar panels at ends -->
  <rect class="solar" x="60" y="100" width="36" height="80" />
  <rect class="solar" x="504" y="100" width="36" height="80" />
  <text class="sublabel" x="78" y="195" text-anchor="middle">P-WING</text>
  <text class="sublabel" x="522" y="195" text-anchor="middle">S-WING</text>

  <!-- Truss spine -->
  <line class="truss" x1="96" y1="160" x2="504" y2="160" />

  <!-- Core modules + airlock cluster (mid-left) -->
  <rect class="module" x="120" y="140" width="56" height="40" />
  <text class="label" x="148" y="164" text-anchor="middle">CORE</text>

  <!-- Airlock (yellow) -->
  <rect class="airlock" x="186" y="132" width="42" height="56" />
  <text class="label-gold" x="207" y="160" text-anchor="middle">QUEST</text>
  <text class="sublabel" x="207" y="200" text-anchor="middle">AIRLOCK</text>

  <!-- More truss modules right of airlock -->
  <rect class="module" x="238" y="140" width="48" height="40" />
  <rect class="module" x="296" y="140" width="48" height="40" />
  <rect class="module" x="354" y="140" width="48" height="40" />

  <!-- Worksite at far end (red) -->
  <rect class="worksite" x="412" y="130" width="28" height="60" />
  <text class="label-red" x="426" y="160" text-anchor="middle">ORU</text>
  <text class="sublabel" x="426" y="200" text-anchor="middle">BATTERY</text>

  <!-- Outbound path (gold) -->
  <path class="path-out" d="M 207 132 Q 207 100 280 100 Q 360 100 426 100 L 426 130" />
  <!-- Arrow on outbound -->
  <polygon fill="#ffc850" points="316,96 308,100 316,104" />

  <!-- Return path (red) -->
  <path class="path-back" d="M 426 190 Q 360 220 280 220 Q 207 220 207 188" />
  <!-- Arrow on return -->
  <polygon fill="#ff6b6b" points="312,224 320,220 312,216" />

  <!-- Anchor points -->
  <circle class="anchor" cx="280" cy="100" r="3" />
  <circle class="anchor" cx="360" cy="100" r="3" />
  <circle class="anchor" cx="280" cy="220" r="3" />
  <circle class="anchor" cx="360" cy="220" r="3" />

  <!-- Phase labels along the path -->
  <text class="label-gold" x="280" y="92" text-anchor="middle">OUTBOUND TRANSLATION</text>
  <text class="sublabel" x="280" y="80" text-anchor="middle">tethered handrail crawl · ~30 min</text>
  <text class="label-red" x="280" y="240" text-anchor="middle">RETURN TRANSLATION</text>
  <text class="sublabel" x="280" y="252" text-anchor="middle">+ contamination check at airlock</text>

  <!-- EVA budget panel -->
  <g transform="translate(40,260)">
    <rect x="0" y="0" width="520" height="40" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label" x="8" y="14">EVA BUDGET · 6.5 h nominal · 8 h max · CO₂ scrubber limits the time</text>
    <text class="sublabel" x="8" y="28">SAFER backpack jet-pack (small Δv) · 100% O₂ pre-breathe (4 h) to flush nitrogen before depress</text>
  </g>
</svg>
