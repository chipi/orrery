<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="The inclination angle i — the tilt between an orbit plane and a reference plane (the ecliptic or the planet's equator) — measured at the ascending node.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .ref-plane { stroke: rgba(255,255,255,0.4); stroke-width: 1.3; fill: rgba(255,255,255,0.025); stroke-dasharray: 4 3; }
    .orbit-plane { stroke: #4ecdc4; stroke-width: 1.8; fill: rgba(78,205,196,0.05); }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .arc { stroke: #ffc850; stroke-width: 1.8; fill: none; }
    .focus { fill: rgba(75,156,211,0.4); stroke: rgba(75,156,211,0.95); stroke-width: 1.5; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="60" r="0.5" />
  <circle class="dim-star" cx="80" cy="290" r="0.5" />

  <text class="label" x="40" y="28">i · INCLINATION — TILT OF THE ORBIT PLANE FROM THE REFERENCE PLANE</text>

  <!-- Reference plane (ecliptic): wide flat ellipse for perspective -->
  <ellipse class="ref-plane" cx="300" cy="200" rx="220" ry="32" />
  <text class="sublabel" x="100" y="208">REFERENCE PLANE · ECLIPTIC</text>

  <!-- Central body at common origin -->
  <circle class="focus" cx="300" cy="200" r="14" />
  <text class="label" x="300" y="204" text-anchor="middle" fill="rgba(255,255,255,0.9)">☉</text>

  <!-- Tilted orbit plane: same rx, ry but tilted ~25° -->
  <ellipse class="orbit-plane" cx="300" cy="180" rx="220" ry="90" transform="rotate(-12 300 180)" />

  <!-- Ascending node (where orbit crosses ref plane going "up") -->
  <circle fill="rgba(255,255,255,0.95)" cx="80" cy="194" r="3.5" />
  <text class="label" x="74" y="184" text-anchor="end">☊ N · ASCENDING</text>
  <text class="sublabel" x="74" y="174" text-anchor="end">crosses ref plane going up</text>

  <!-- Descending node (opposite side) -->
  <circle fill="rgba(255,255,255,0.6)" cx="520" cy="194" r="3" />
  <text class="sublabel" x="526" y="220">☋ descending</text>

  <!-- Inclination angle arc at the ascending node -->
  <path class="arc" d="M 120 200 A 40 40 0 0 0 116 178" />
  <text class="label-gold" x="124" y="190">i</text>
  <text class="sublabel" x="135" y="178">25°</text>

  <!-- Orbit-plane label -->
  <text class="label-accent" x="430" y="100">ORBIT PLANE</text>

  <!-- Reference panel with real inclinations -->
  <g transform="translate(30,80)">
    <rect x="0" y="0" width="160" height="100" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="16">PLANET INCLINATIONS</text>
    <text class="sublabel" x="8" y="32">Earth     ·  0°  (defines ecliptic)</text>
    <text class="sublabel" x="8" y="44">Mercury  ·  7°</text>
    <text class="sublabel" x="8" y="56">Pluto      ·  17°</text>
    <text class="sublabel" x="8" y="68">ISS        ·  51.6° (Earth equator)</text>
    <text class="sublabel" x="8" y="80">Polar     ·  90° (sun-sync)</text>
    <text class="sublabel" x="8" y="92">Retrograde ·  &gt; 90°</text>
  </g>

  <text class="sublabel" x="540" y="312" text-anchor="end">launching from latitude φ → cheapest reachable orbit has i ≥ φ</text>
</svg>
