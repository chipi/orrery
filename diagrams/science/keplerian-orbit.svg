<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="A Keplerian orbit — an ellipse with the central body at one focus, labelled with semi-major axis, eccentricity, perihelion, aphelion, and the radius vector.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .ellipse { stroke: rgba(255,255,255,0.85); stroke-width: 1.6; fill: none; }
    .ellipse-fill { fill: rgba(78,205,196,0.04); stroke: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2.2; fill: none; }
    .accent-fill { fill: #4ecdc4; }
    .focus { fill: #ffc850; stroke: #ffc850; stroke-width: 1.2; }
    .body { fill: rgba(255,255,255,0.95); stroke: rgba(255,255,255,0.5); stroke-width: 1; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .lead { stroke: rgba(255,255,255,0.4); stroke-width: 0.8; fill: none; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <!-- Starfield -->
  <circle class="dim-star" cx="50" cy="55" r="0.6" />
  <circle class="dim-star" cx="540" cy="60" r="0.7" />
  <circle class="dim-star" cx="80" cy="280" r="0.6" />
  <circle class="dim-star" cx="560" cy="280" r="0.5" />
  <circle class="dim-star" cx="120" cy="40" r="0.5" />

  <text class="label" x="40" y="28">KEPLERIAN ORBIT — AN ELLIPSE WITH THE CENTRAL BODY AT ONE FOCUS</text>

  <!-- Major axis (line of apsides) -->
  <line class="dashed" x1="80" y1="170" x2="520" y2="170" />

  <!-- Ellipse: a=200, b=140, centred at (300,170), c=sqrt(a²-b²)=143 -->
  <ellipse class="ellipse-fill" cx="300" cy="170" rx="200" ry="140" />
  <ellipse class="ellipse" cx="300" cy="170" rx="200" ry="140" />

  <!-- Right focus (Sun): (300+143,170) = (443,170) -->
  <circle class="focus" cx="443" cy="170" r="8" />
  <text class="label-gold" x="443" y="148" text-anchor="middle">F₁ · SUN</text>
  <text class="sublabel" x="443" y="158" text-anchor="middle">μ = GM</text>

  <!-- Empty focus -->
  <circle fill="rgba(255,255,255,0.55)" cx="157" cy="170" r="3" />
  <text class="label" x="157" y="158" text-anchor="middle">F₂</text>
  <text class="sublabel" x="157" y="148" text-anchor="middle">empty focus</text>

  <!-- Perihelion (right tip) -->
  <circle class="body" cx="500" cy="170" r="4" />
  <line class="lead" x1="500" y1="170" x2="540" y2="208" />
  <text class="label" x="544" y="212">PERIHELION</text>
  <text class="sublabel" x="544" y="224">r_p = a(1 − e)</text>

  <!-- Aphelion (left tip) -->
  <circle class="body" cx="100" cy="170" r="4" />
  <line class="lead" x1="100" y1="170" x2="60" y2="208" />
  <text class="label" x="56" y="212" text-anchor="end">APHELION</text>
  <text class="sublabel" x="56" y="224" text-anchor="end">r_a = a(1 + e)</text>

  <!-- Orbiting body at true anomaly ~70°: parametrize. Let ν=70°; r = a(1-e²)/(1+e cos ν) -->
  <!-- a=200 in ellipse units; in svg same units; e=c/a=0.715; r ≈ 200·(1-0.51)/(1+0.715·0.342) ≈ 98/1.245 ≈ 79 -->
  <!-- Body position relative to focus F1: (443 + r cos ν, 170 - r sin ν) = (443+27, 170-74) = (470, 96) -->
  <circle class="body" cx="470" cy="96" r="5" />
  <!-- Radius vector from focus to body -->
  <line class="accent" x1="443" y1="170" x2="470" y2="96" />
  <line class="lead" x1="470" y1="96" x2="510" y2="80" />
  <text class="label-accent" x="514" y="84">SPACECRAFT</text>
  <text class="label-accent" x="450" y="135">r</text>

  <!-- True anomaly arc -->
  <path d="M 478 170 A 35 35 0 0 0 466 138" stroke="#4ecdc4" stroke-width="1.2" fill="none" />
  <text class="label-accent" x="468" y="155">ν</text>
  <text class="sublabel" x="464" y="168">true anomaly</text>

  <!-- Semi-major axis a annotation, below: from centre (300,170) to right tip (500,170) -->
  <line stroke="rgba(255,255,255,0.55)" stroke-width="1" x1="300" y1="285" x2="500" y2="285" />
  <line stroke="rgba(255,255,255,0.55)" stroke-width="1" x1="300" y1="280" x2="300" y2="290" />
  <line stroke="rgba(255,255,255,0.55)" stroke-width="1" x1="500" y1="280" x2="500" y2="290" />
  <text class="label" x="400" y="302" text-anchor="middle">a · SEMI-MAJOR AXIS</text>

  <!-- Eccentricity callout left -->
  <g transform="translate(30,95)">
    <text class="label-gold" x="0" y="0">e = c / a</text>
    <text class="sublabel" x="0" y="14">0 = circle</text>
    <text class="sublabel" x="0" y="26">0–1 = ellipse</text>
    <text class="sublabel" x="0" y="38">= 1 parabola</text>
    <text class="sublabel" x="0" y="50">> 1 hyperbola</text>
  </g>

  <!-- Bottom note -->
  <text class="sublabel" x="540" y="318" text-anchor="end">Kepler's First Law (1609) · the orbit is an ellipse with the Sun at one focus</text>
</svg>
