<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="A launch ascent profile — vertical rise off the pad, gravity-turn pitch program, stage separation, second-stage climb, and orbital insertion into LEO.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .ground { stroke: rgba(255,255,255,0.85); stroke-width: 1.6; fill: rgba(75,156,211,0.08); }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2.4; fill: none; }
    .stage1 { stroke: #ff6b6b; stroke-width: 2.4; fill: none; }
    .leo { stroke: rgba(255,255,255,0.5); stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .lead { stroke: rgba(255,255,255,0.4); stroke-width: 0.8; fill: none; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />
  <circle class="dim-star" cx="80" cy="80" r="0.5" />
  <circle class="dim-star" cx="450" cy="65" r="0.6" />

  <text class="label" x="40" y="28">LAUNCH ASCENT — PAD → PITCH-OVER → STAGING → LEO</text>

  <!-- Earth surface curve at bottom -->
  <path class="ground" d="M 20 280 Q 300 268 580 280 L 580 320 L 20 320 Z" />
  <text class="sublabel" x="40" y="305">EARTH SURFACE · sea level</text>

  <!-- Pad -->
  <rect x="56" y="270" width="12" height="10" fill="rgba(255,255,255,0.85)" />
  <text class="sublabel" x="62" y="295" text-anchor="middle">PAD</text>

  <!-- Atmosphere top dashed -->
  <line class="dashed" x1="20" y1="160" x2="580" y2="160" />
  <text class="sublabel" x="40" y="155">~100 km · Kármán line · "space"</text>

  <!-- Stage 1 trajectory (red): off pad, vertical, then gravity turn -->
  <path class="stage1" d="M 62 270 L 62 220 Q 65 170 100 140 Q 140 110 200 90" />

  <!-- Stage 1 sep marker -->
  <circle fill="#ff6b6b" cx="200" cy="90" r="3.5" />
  <line class="lead" x1="200" y1="90" x2="210" y2="50" />
  <text class="label-red" x="214" y="50">STAGE 1 SEP</text>
  <text class="sublabel" x="214" y="62">T+~2 min · 70 km · MECO</text>

  <!-- Stage 2 trajectory (teal): from sep to LEO -->
  <path class="accent" d="M 200 90 Q 290 75 380 70 Q 460 70 540 78" />

  <!-- Stage 2 burn arrow -->
  <line stroke="#4ecdc4" stroke-width="2" x1="380" y1="70" x2="395" y2="60" />
  <polygon fill="#4ecdc4" points="398,58 388,60 392,67" />

  <!-- MECO 2 / SECO -->
  <circle fill="#4ecdc4" cx="540" cy="78" r="3.5" />
  <line class="lead" x1="540" y1="78" x2="540" y2="40" />
  <text class="label-accent" x="540" y="38" text-anchor="middle">SECO · LEO INSERTION</text>
  <text class="sublabel" x="540" y="50" text-anchor="middle">T+~9 min · 200 km · 7.8 km/s</text>

  <!-- LEO orbit segment continuing -->
  <path class="leo" d="M 540 78 Q 580 100 580 140" />

  <!-- Pitch-over marker -->
  <circle fill="rgba(255,255,255,0.85)" cx="65" cy="220" r="3" />
  <line class="lead" x1="65" y1="220" x2="100" y2="200" />
  <text class="label" x="104" y="200">PITCH-OVER · gravity turn</text>
  <text class="sublabel" x="104" y="212">T+~30 s · trade vertical for horizontal v</text>

  <!-- Max-Q marker -->
  <circle fill="#ffc850" cx="90" cy="170" r="2.5" />
  <line class="lead" x1="90" y1="170" x2="125" y2="148" />
  <text class="label-gold" x="129" y="148">MAX-Q · dynamic pressure peak</text>
  <text class="sublabel" x="129" y="160">throttle down through transonic</text>

  <!-- Reference panel -->
  <g transform="translate(40,100)">
    <rect x="0" y="0" width="170" height="50" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="14">FALCON 9 EXAMPLE</text>
    <text class="sublabel" x="8" y="28">9.4 km/s total Δv</text>
    <text class="sublabel" x="8" y="40">~50% gravity loss + drag loss</text>
  </g>

  <text class="sublabel" x="540" y="316" text-anchor="end">"the ascent" — the hardest 9.4 km/s in any deep-space mission</text>
</svg>
