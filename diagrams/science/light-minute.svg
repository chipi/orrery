<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Light-time across the inner solar system — distance from Earth to the Moon, Mars, and Jupiter measured in light-seconds and light-minutes, explaining why Mars rovers must be autonomous.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .arrow-fill { fill: #4ecdc4; }
    .sun { fill: #ffc850; stroke: #ffc850; stroke-width: 1.4; }
    .earth { fill: rgba(75,156,211,0.95); }
    .moon { fill: rgba(255,255,255,0.6); }
    .mars { fill: rgba(193,68,14,0.95); }
    .jupiter { fill: rgba(255,200,80,0.85); }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">LIGHT-TIME — DISTANCE IN HOW LONG A SIGNAL TAKES TO GET THERE</text>

  <!-- Sun on left -->
  <circle class="sun" cx="60" cy="180" r="10" />
  <text class="label-gold" x="60" y="208" text-anchor="middle">SUN</text>

  <!-- Earth -->
  <circle class="earth" cx="160" cy="180" r="6" />
  <text class="label" x="160" y="208" text-anchor="middle">EARTH</text>
  <text class="sublabel" x="160" y="220" text-anchor="middle">8.3 light-min from Sun</text>

  <!-- Moon (close to Earth, slightly offset) -->
  <circle class="moon" cx="178" cy="170" r="3" />
  <text class="sublabel" x="184" y="166">Moon · 1.3 ls</text>

  <!-- Mars -->
  <circle class="mars" cx="320" cy="180" r="5" />
  <text class="label" x="320" y="208" text-anchor="middle">MARS</text>
  <text class="sublabel" x="320" y="220" text-anchor="middle">4–22 light-min from Earth</text>

  <!-- Jupiter further right -->
  <circle class="jupiter" cx="500" cy="180" r="8" />
  <text class="label" x="500" y="208" text-anchor="middle">JUPITER</text>
  <text class="sublabel" x="500" y="220" text-anchor="middle">35–53 light-min from Earth</text>

  <!-- Light-time arrows from Earth -->
  <line class="accent" x1="166" y1="140" x2="314" y2="140" />
  <polygon class="arrow-fill" points="320,140 308,135 308,145" />
  <text class="label-accent" x="240" y="132" text-anchor="middle">4–22 LIGHT-MINUTES</text>

  <line class="accent" x1="166" y1="100" x2="494" y2="100" />
  <polygon class="arrow-fill" points="500,100 488,95 488,105" />
  <text class="label-accent" x="330" y="92" text-anchor="middle">35–53 LIGHT-MINUTES</text>

  <!-- Reference table left -->
  <g transform="translate(40,240)">
    <rect x="0" y="0" width="240" height="70" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="14">LIGHT-TIME · QUICK REF</text>
    <text class="sublabel" x="8" y="28">Moon       ·  1.28 s (round-trip 2.6 s)</text>
    <text class="sublabel" x="8" y="40">Mars       ·  3–22 min (one-way)</text>
    <text class="sublabel" x="8" y="52">Voyager 1 · 23 hours (Sun-frame 165 AU)</text>
    <text class="sublabel" x="8" y="64">α Cen      ·  4.3 years</text>
  </g>

  <!-- Consequence panel right -->
  <g transform="translate(300,240)">
    <rect x="0" y="0" width="260" height="70" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="14">→ WHY ROVERS DRIVE THEMSELVES</text>
    <text class="sublabel" x="8" y="28">command-and-wait fails on Mars</text>
    <text class="sublabel" x="8" y="40">at 22 min lag (max conjunction)</text>
    <text class="sublabel" x="8" y="52">Curiosity, Perseverance: AutoNav</text>
    <text class="sublabel" x="8" y="64">obstacles found between sols</text>
  </g>
</svg>
