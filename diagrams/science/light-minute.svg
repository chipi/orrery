<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="The Sun, Earth, and Mars on a horizontal line with light-minute distances labelled.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .sun { fill: #ffc850; }
    .earth { fill: rgba(75,156,211,0.85); }
    .mars { fill: rgba(193,68,14,0.85); }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .arrow { fill: rgba(255,255,255,0.65); }
  </style>
  <text class="lbl" x="20" y="22">Light-time distances</text>
  <line class="dashed" x1="40" y1="120" x2="380" y2="120" />
  <circle class="sun" cx="60" cy="120" r="9" />
  <text class="tick" x="60" y="148" text-anchor="middle">Sun</text>
  <circle class="earth" cx="170" cy="120" r="5" />
  <text class="tick" x="170" y="148" text-anchor="middle">Earth · 1 AU</text>
  <circle class="mars" cx="270" cy="120" r="4" />
  <text class="tick" x="270" y="148" text-anchor="middle">Mars · 1.5 AU</text>
  <line class="accent" x1="62" y1="92" x2="168" y2="92" />
  <polygon class="arrow" points="170,92 162,88 162,96" fill="#4ecdc4" />
  <text class="tick" x="115" y="84" text-anchor="middle" fill="#4ecdc4">8.3 light-min</text>
  <line class="accent" x1="172" y1="76" x2="268" y2="76" />
  <polygon class="arrow" points="270,76 262,72 262,80" fill="#4ecdc4" />
  <text class="tick" x="220" y="68" text-anchor="middle" fill="#4ecdc4">4–22 light-min</text>
  <text class="lbl" x="30" y="190">commands to a Mars rover lag 4–22 minutes — autonomy required</text>
</svg>
