<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Near-rectilinear halo orbit at Earth-Moon L2: stretched egg shape with perilune at the south pole">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Earth on far left (dashed sketch) -->
  <circle cx="40" cy="150" r="14" class="dashed" />
  <text x="32" y="178" class="label-mute">Earth</text>
  <!-- Moon at centre -->
  <circle cx="220" cy="150" r="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" />
  <text x="208" y="186" class="label-mute">Moon</text>
  <!-- L2 dashed marker, beyond the Moon -->
  <circle cx="290" cy="150" r="3" class="focus" />
  <text x="284" y="174" class="label-accent">L2</text>
  <!-- NRHO: stretched egg-shaped path that swings close to Moon's south pole and far past L2 -->
  <path d="M 232 158 Q 130 140 130 80 Q 200 30 320 60 Q 380 110 320 200 Q 280 230 232 158 Z" class="accent" />
  <!-- Perilune marker (close to Moon) -->
  <circle cx="232" cy="160" r="3" class="focus" />
  <text x="240" y="172" class="label-accent">perilune (~1500 km)</text>
  <!-- Apolune marker (far) -->
  <circle cx="320" cy="60" r="3" class="focus" />
  <text x="328" y="50" class="label-accent">apolune (~70,000 km)</text>
  <text x="86" y="288" class="label-mute">~6.5-day period · stable · line-of-sight to Earth</text>
</svg>
