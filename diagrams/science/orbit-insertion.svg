<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Orbit insertion — an incoming hyperbolic trajectory is bent into a captured elliptical orbit by a braking burn at periapsis. Below local escape velocity → bound orbit.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.45); stroke-width: 1.2; stroke-dasharray: 5 4; fill: none; }
    .hyperbola { stroke: rgba(255,255,255,0.55); stroke-width: 1.6; stroke-dasharray: 6 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2.4; fill: none; }
    .accent-fill { fill: #4ecdc4; }
    .planet { fill: rgba(193,68,14,0.4); stroke: rgba(193,68,14,0.95); stroke-width: 1.5; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />
  <circle class="dim-star" cx="80" cy="290" r="0.5" />

  <text class="label" x="40" y="28">ORBIT INSERTION — HYPERBOLIC APPROACH → BURN AT PERIAPSIS → CAPTURE</text>

  <!-- Target planet -->
  <circle class="planet" cx="320" cy="180" r="20" />
  <text class="label" x="320" y="184" text-anchor="middle" fill="rgba(255,255,255,0.95)">M</text>

  <!-- Incoming hyperbolic approach (dashed white) -->
  <path class="hyperbola" d="M 40 60 Q 200 130 296 180" />
  <text class="sublabel" x="50" y="56">INCOMING · v &gt; v_esc (would escape without burn)</text>

  <!-- Outgoing hyperbola (dashed white, continuing past the planet) -->
  <path class="hyperbola" d="M 344 180 Q 430 220 560 300" />

  <!-- Captured ellipse (teal) — tilted ellipse around the planet -->
  <ellipse class="accent" cx="370" cy="180" rx="80" ry="46" transform="rotate(-15 370 180)" />

  <!-- Burn point at periapsis on the ellipse, where it touches the approach -->
  <circle class="accent-fill" cx="304" cy="178" r="5" />
  <!-- Burn vector (retrograde) -->
  <line stroke="#4ecdc4" stroke-width="2.6" x1="304" y1="178" x2="280" y2="148" />
  <polygon class="accent-fill" points="278,144 287,148 281,154" />
  <text class="label-accent" x="220" y="138">Δv · retrograde brake</text>
  <text class="sublabel" x="220" y="150">slow below v_esc → captured</text>

  <!-- Periapsis label -->
  <line stroke="rgba(255,255,255,0.4)" stroke-width="0.8" x1="304" y1="178" x2="240" y2="246" />
  <text class="label" x="236" y="250" text-anchor="end">PERIAPSIS</text>
  <text class="sublabel" x="236" y="262" text-anchor="end">closest approach · v_max</text>

  <!-- Apoapsis -->
  <circle fill="rgba(255,255,255,0.85)" cx="440" cy="180" r="3" />
  <line stroke="rgba(255,255,255,0.4)" stroke-width="0.8" x1="440" y1="180" x2="490" y2="240" />
  <text class="label" x="494" y="244">APOAPSIS</text>
  <text class="sublabel" x="494" y="256">often raised by 2nd burn</text>

  <!-- Reference panel — mission Δv -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="160" height="100" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="16">CAPTURE Δv (km/s)</text>
    <text class="sublabel" x="8" y="32">Lunar LOI   ·  0.9</text>
    <text class="sublabel" x="8" y="44">Mars MOI    ·  1.0</text>
    <text class="sublabel" x="8" y="56">Jupiter JOI ·  0.6</text>
    <text class="sublabel" x="8" y="68">Cassini SOI  ·  0.6</text>
    <text class="sublabel" x="8" y="88">"the gates of hell" —</text>
    <text class="sublabel" x="8" y="100">single-point-failure burn</text>
  </g>

  <text class="sublabel" x="540" y="316" text-anchor="end">aerocapture is a fuel-free alternative — Mars 2020 EDL effectively used aerobraking for capture</text>
</svg>
