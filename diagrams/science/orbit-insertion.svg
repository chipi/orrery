<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="A hyperbolic approach trajectory bending into a captured elliptical orbit at periapsis with a braking burn arrow.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.45); stroke-width: 1.2; stroke-dasharray: 5 4; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .planet { fill: rgba(78,205,196,0.15); stroke: rgba(78,205,196,0.7); stroke-width: 1.5; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .burn { fill: #4ecdc4; }
  </style>
  <text class="lbl" x="20" y="22">Approach hyperbola → captured ellipse</text>
  <circle class="planet" cx="200" cy="140" r="18" />
  <text class="tick" x="195" y="143" text-anchor="middle" fill="rgba(255,255,255,0.7)">M</text>
  <path class="dashed" d="M 30 60 Q 130 110 182 140" />
  <path class="dashed" d="M 182 140 Q 250 170 380 240" />
  <text class="tick" x="35" y="55">incoming hyperbola (no burn)</text>
  <ellipse class="accent" cx="240" cy="140" rx="60" ry="34" transform="rotate(-15 240 140)" />
  <text class="tick" x="280" y="105" fill="#4ecdc4">capture orbit</text>
  <line class="stroke" x1="195" y1="125" x2="180" y2="115" />
  <polygon class="burn" points="180,115 184,121 188,113" />
  <text class="tick" x="138" y="118" fill="#4ecdc4">BURN at periapsis</text>
  <text class="lbl" x="30" y="240">brake to drop below local escape velocity</text>
</svg>
