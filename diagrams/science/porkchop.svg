<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="A porkchop plot — departure date on the horizontal axis, time of flight on the vertical, with concentric delta-v contour rings forming the characteristic pork-chop lobe. Cheapest centre, expensive outside; second lobe shows the next synodic window.">
  <style>
    .axis { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 0.8; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .ring0 { fill: rgba(78,205,196,0.45); stroke: #4ecdc4; stroke-width: 1.5; }
    .ring1 { fill: rgba(78,205,196,0.22); stroke: #4ecdc4; stroke-width: 1.4; }
    .ring2 { fill: rgba(123,156,255,0.18); stroke: #7b9cff; stroke-width: 1.3; }
    .ring3 { fill: rgba(255,200,80,0.12); stroke: #ffc850; stroke-width: 1.2; stroke-dasharray: 3 2; }
    .ring4 { fill: none; stroke: rgba(193,68,14,0.6); stroke-width: 1.2; stroke-dasharray: 3 2; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: rgba(193,68,14,0.95); font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tick { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.8px; }
    .dim-star { fill: rgba(255,255,255,0.18); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />
  <circle class="dim-star" cx="80" cy="290" r="0.5" />

  <text class="label" x="40" y="28">PORKCHOP PLOT — DEPARTURE DATE × TIME OF FLIGHT → Δv</text>

  <!-- Plot area: x = 80..560, y = 60..270 -->
  <line class="grid" x1="80" y1="110" x2="560" y2="110" />
  <line class="grid" x1="80" y1="160" x2="560" y2="160" />
  <line class="grid" x1="80" y1="210" x2="560" y2="210" />
  <line class="grid" x1="180" y1="60" x2="180" y2="270" />
  <line class="grid" x1="280" y1="60" x2="280" y2="270" />
  <line class="grid" x1="380" y1="60" x2="380" y2="270" />
  <line class="grid" x1="480" y1="60" x2="480" y2="270" />

  <line class="axis" x1="80" y1="270" x2="560" y2="270" />
  <line class="axis" x1="80" y1="60" x2="80" y2="270" />

  <!-- First lobe centred at (230,170): outer rings -->
  <ellipse class="ring4" cx="230" cy="170" rx="150" ry="105" />
  <ellipse class="ring3" cx="230" cy="170" rx="120" ry="84" />
  <ellipse class="ring2" cx="230" cy="170" rx="92" ry="62" />
  <ellipse class="ring1" cx="230" cy="170" rx="64" ry="42" />
  <ellipse class="ring0" cx="230" cy="170" rx="32" ry="22" />

  <!-- Optimum marker -->
  <circle fill="#ffc850" cx="230" cy="170" r="3" />
  <text class="label-gold" x="230" y="172" text-anchor="middle">★</text>

  <!-- Contour labels around the first lobe -->
  <text class="label-accent" x="230" y="155" text-anchor="middle">3 km/s</text>
  <text class="sublabel" x="230" y="187" text-anchor="middle">OPTIMUM</text>
  <text class="sublabel" x="291" y="125">5</text>
  <text class="sublabel" x="320" y="98">7</text>
  <text class="sublabel" x="354" y="78">9+</text>

  <!-- Second (next-synodic) lobe at (490,170) -->
  <ellipse class="ring2" cx="490" cy="170" rx="60" ry="42" />
  <ellipse class="ring1" cx="490" cy="170" rx="34" ry="22" />
  <ellipse class="ring0" cx="490" cy="170" rx="16" ry="12" />
  <circle fill="#ffc850" cx="490" cy="170" r="2" />
  <text class="label-accent" x="490" y="172" text-anchor="middle">3</text>
  <text class="sublabel" x="490" y="135" text-anchor="middle">NEXT SYNODIC</text>

  <!-- Synodic-gap bracket between lobes -->
  <line class="dashed" x1="230" y1="240" x2="490" y2="240" />
  <line class="dashed" x1="230" y1="234" x2="230" y2="246" />
  <line class="dashed" x1="490" y1="234" x2="490" y2="246" />
  <text class="sublabel" x="360" y="258" text-anchor="middle">26-MONTH SYNODIC PERIOD (Earth–Mars)</text>

  <!-- Axis labels -->
  <text class="tick" x="80" y="286" text-anchor="middle">2026</text>
  <text class="tick" x="180" y="286" text-anchor="middle">'27</text>
  <text class="tick" x="280" y="286" text-anchor="middle">'28</text>
  <text class="tick" x="380" y="286" text-anchor="middle">'29</text>
  <text class="tick" x="480" y="286" text-anchor="middle">'30</text>
  <text class="tick" x="560" y="286" text-anchor="middle">'31</text>
  <text class="label" x="320" y="306" text-anchor="middle">DEPARTURE DATE →</text>

  <text class="tick" x="74" y="273" text-anchor="end">100</text>
  <text class="tick" x="74" y="213" text-anchor="end">200</text>
  <text class="tick" x="74" y="163" text-anchor="end">300</text>
  <text class="tick" x="74" y="113" text-anchor="end">400</text>
  <text class="tick" x="74" y="63" text-anchor="end">500</text>
  <text class="label" x="40" y="44">TOF (d)</text>

  <text class="sublabel" x="540" y="318" text-anchor="end">also called a "pork-chop" plot for the shape of the cheap-Δv contour</text>
</svg>
