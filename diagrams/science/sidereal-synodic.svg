<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Sidereal vs synodic period: same star alignment versus same Earth-Mars-Sun alignment">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Sun -->
  <circle cx="200" cy="150" r="6" class="focus" />
  <!-- Earth orbit -->
  <circle cx="200" cy="150" r="60" class="dashed" />
  <!-- Mars orbit -->
  <circle cx="200" cy="150" r="100" class="dashed" />
  <!-- Mars at start (right) -->
  <circle cx="300" cy="150" r="4" class="body" />
  <text x="306" y="148" class="label-mute">Mars t=0</text>
  <!-- Earth at start (right, on inner orbit, aligned) -->
  <circle cx="260" cy="150" r="4" class="body" />
  <text x="244" y="142" class="label-mute">Earth t=0</text>
  <!-- After sidereal year (Earth back to same star direction at Mars t=∼1y, Mars hasn't yet returned) -->
  <!-- Mars at sidereal: hasn't completed orbit; ~190° round (orange dashed) -->
  <circle cx="100" cy="150" r="3" fill="rgba(255,255,255,0.55)" />
  <text x="62" y="168" class="label-mute">Mars 1 sid yr</text>
  <!-- Synodic alignment: needs more time → Mars passed Earth at later position -->
  <circle cx="148" cy="92" r="4" class="body" />
  <text x="120" y="86" class="label-accent">syn align</text>
  <text x="62" y="278" class="label-mute">sidereal: same star direction · synodic: same Earth-Mars geometry</text>
</svg>
