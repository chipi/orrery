<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="True anomaly measured at the focus from perihelion to the body's current position">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Major axis -->
  <line x1="60" y1="150" x2="340" y2="150" class="dashed" />
  <!-- Ellipse -->
  <ellipse cx="200" cy="150" rx="140" ry="100" class="stroke" />
  <!-- Right focus -->
  <circle cx="298" cy="150" r="6" class="focus" />
  <!-- Perihelion (rightmost) -->
  <circle cx="340" cy="150" r="3" class="body" />
  <text x="318" y="170" class="label-mute">perihelion</text>
  <!-- Reference line from focus to perihelion -->
  <line x1="298" y1="150" x2="340" y2="150" class="dashed" />
  <!-- Body at ν ≈ 110° from perihelion. Compute: r at nu=110° on this ellipse, place visually -->
  <circle cx="190" cy="65" r="4" class="body" />
  <!-- Radius vector from focus to body -->
  <line x1="298" y1="150" x2="190" y2="65" class="accent" />
  <!-- Angle arc at focus between perihelion direction and radius -->
  <path d="M 328 150 A 30 30 0 0 0 280 124" class="accent" />
  <text x="282" y="138" class="label-accent">ν</text>
  <text x="240" y="100" class="label-accent">r</text>
  <text x="76" y="50" class="label-mute">true anomaly ν measured at the focus</text>
</svg>
