<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="The Tsiolkovsky rocket equation: delta-v grows logarithmically with mass ratio, with reference markers at Saturn V, Falcon 9, and ion-thruster regimes.">
  <style>
    .axis { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 0.8; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .curve { stroke: #4ecdc4; stroke-width: 2.2; fill: none; }
    .curve-fill { fill: rgba(78,205,196,0.08); stroke: none; }
    .marker { fill: #ffc850; stroke: #ffc850; stroke-width: 1; }
    .marker-dim { fill: rgba(255,200,80,0.4); stroke: rgba(255,200,80,0.4); }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tick { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.8px; }
  </style>

  <!-- Title -->
  <text class="label" x="40" y="28">Δv = vₑ · ln(m₀ / m_f) — LOGARITHMIC IN MASS RATIO</text>

  <!-- Plot frame: x=70..500, y=70..250 -->
  <!-- Faint grid -->
  <line class="grid" x1="70" y1="115" x2="500" y2="115" />
  <line class="grid" x1="70" y1="160" x2="500" y2="160" />
  <line class="grid" x1="70" y1="205" x2="500" y2="205" />
  <line class="grid" x1="156" y1="70" x2="156" y2="250" />
  <line class="grid" x1="242" y1="70" x2="242" y2="250" />
  <line class="grid" x1="328" y1="70" x2="328" y2="250" />
  <line class="grid" x1="414" y1="70" x2="414" y2="250" />

  <!-- Axes -->
  <line class="axis" x1="70" y1="250" x2="500" y2="250" />
  <line class="axis" x1="70" y1="70" x2="70" y2="250" />

  <!-- Curve fill under -->
  <path class="curve-fill" d="M 70 250 L 70 250 Q 130 200 200 168 T 350 115 T 500 85 L 500 250 Z" />
  <!-- Δv curve: logarithmic-ish through mass ratios 1..30 -->
  <path class="curve" d="M 70 250 Q 130 200 200 168 T 350 115 T 500 85" />

  <!-- X-axis tick labels (mass ratio) -->
  <text class="tick" x="70" y="266" text-anchor="middle">1</text>
  <text class="tick" x="156" y="266" text-anchor="middle">3</text>
  <text class="tick" x="242" y="266" text-anchor="middle">7</text>
  <text class="tick" x="328" y="266" text-anchor="middle">15</text>
  <text class="tick" x="414" y="266" text-anchor="middle">30</text>
  <text class="tick" x="500" y="266" text-anchor="middle">60</text>
  <text class="label" x="285" y="295" text-anchor="middle">m₀ / m_f  ·  WET / DRY MASS RATIO</text>

  <!-- Y-axis tick labels (Δv km/s) -->
  <text class="tick" x="62" y="253" text-anchor="end">0</text>
  <text class="tick" x="62" y="208" text-anchor="end">3</text>
  <text class="tick" x="62" y="163" text-anchor="end">7</text>
  <text class="tick" x="62" y="118" text-anchor="end">11</text>
  <text class="tick" x="62" y="73" text-anchor="end">15</text>
  <text class="label" x="28" y="44">Δv (km/s)</text>

  <!-- Reference points along the curve -->
  <!-- Saturn V S-IC (mass ratio ~3.5, Δv ~3 km/s for this stage) -->
  <line class="dashed" x1="180" y1="180" x2="180" y2="250" />
  <circle class="marker" cx="180" cy="180" r="3.5" />
  <line class="dashed" x1="180" y1="180" x2="240" y2="100" />
  <text class="label-gold" x="246" y="98">SATURN V · S-IC</text>
  <text class="sublabel" x="246" y="110">kerosene-LOX · vₑ ≈ 2.6 km/s</text>

  <!-- Falcon 9 stage 2 (~6, ~5 km/s) -->
  <line class="dashed" x1="240" y1="148" x2="240" y2="250" />
  <circle class="marker" cx="240" cy="148" r="3.5" />
  <line class="dashed" x1="240" y1="148" x2="186" y2="92" />
  <text class="label-gold" x="180" y="90" text-anchor="end">FALCON 9 · S2</text>
  <text class="sublabel" x="180" y="102" text-anchor="end">methalox · vₑ ≈ 3.4 km/s</text>

  <!-- Ion thruster: small mass ratio but huge vₑ → far end of curve -->
  <line class="dashed" x1="430" y1="92" x2="430" y2="250" />
  <circle class="marker" cx="430" cy="92" r="3.5" />
  <line class="dashed" x1="430" y1="92" x2="475" y2="160" />
  <text class="label-gold" x="478" y="160">DAWN · ION</text>
  <text class="sublabel" x="478" y="172">xenon · vₑ ≈ 30 km/s · Δv = 11</text>

  <!-- Annotation: doubling propellant adds vₑ·ln(2) ≈ 0.7 vₑ -->
  <text class="label-accent" x="285" y="232" text-anchor="middle">DOUBLE THE PROPELLANT</text>
  <text class="sublabel" x="285" y="245" text-anchor="middle">→ adds only vₑ · ln(2) ≈ 0.7 vₑ to Δv</text>

  <!-- Bottom note -->
  <text class="sublabel" x="500" y="320" text-anchor="end">Konstantin Tsiolkovsky · 1903 · published before any rocket actually flew it</text>
</svg>
