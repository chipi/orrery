<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="A porkchop with a horizontal capability ceiling line. The cheap zone below it is feasible; cells above it are not.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: rgba(78,205,196,0.12); }
    .red { stroke: rgba(193,68,14,0.6); stroke-width: 1.4; fill: none; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .cap { stroke: #ffc850; stroke-width: 1.8; fill: none; stroke-dasharray: 6 3; }
  </style>
  <text class="lbl" x="20" y="22">Mission viability — capability vs cost</text>
  <line class="stroke" x1="50" y1="200" x2="370" y2="200" />
  <line class="stroke" x1="50" y1="200" x2="50" y2="50" />
  <text class="tick" x="370" y="215" text-anchor="end">departure date</text>
  <text class="tick" x="44" y="42" transform="rotate(-90 32 130)">↑ ∆v cost</text>
  <ellipse class="red" cx="210" cy="125" rx="150" ry="65" />
  <ellipse class="accent" cx="210" cy="135" rx="80" ry="35" />
  <line class="cap" x1="50" y1="100" x2="370" y2="100" />
  <text class="tick" x="375" y="103" fill="#ffc850" text-anchor="end">rocket capability</text>
  <text class="tick" x="195" y="140" fill="#4ecdc4">feasible</text>
  <text class="tick" x="195" y="80" fill="rgba(193,68,14,0.85)">infeasible (above ceiling)</text>
  <text class="lbl" x="50" y="230">cells below the ceiling fly · above it: pick a bigger rocket or smaller payload</text>
</svg>
