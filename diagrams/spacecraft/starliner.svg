<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Boeing Starliner spacecraft anatomy: crew capsule, service module, body-mounted solar cells on aft dome, no deployable wings">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .stroke-fill { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: rgba(255,255,255,0.04); }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1; fill: none; }
    .pv { fill: rgba(60,110,200,0.45); stroke: rgba(120,170,240,0.7); stroke-width: 0.8; }
    .heat { fill: rgba(255,200,80,0.20); stroke: rgba(255,200,80,0.7); stroke-width: 0.8; }
    .nozzle { fill: rgba(180,180,190,0.6); stroke: rgba(220,220,230,0.85); stroke-width: 0.6; }
    .accent-blue { fill: rgba(28,58,114,0.85); stroke: rgba(60,110,200,0.85); stroke-width: 0.6; }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; font-size: 10px; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 9px; }
    .title { fill: rgba(255,255,255,0.85); font-size: 13px; letter-spacing: 2px; }
    .subtitle { fill: rgba(255,255,255,0.55); font-size: 9px; letter-spacing: 1px; }
  </style>

  <text x="200" y="20" text-anchor="middle" class="title">CST-100 STARLINER</text>
  <text x="200" y="34" text-anchor="middle" class="subtitle">5.03 m · 13,000 kg · 4–7 crew</text>

  <line x1="200" y1="50" x2="200" y2="260" class="dashed" />

  <!-- NDS docking adapter at top -->
  <rect x="192" y="55" width="16" height="10" class="stroke-fill" />
  <line x1="196" y1="60" x2="204" y2="60" class="stroke" />

  <!-- Crew capsule (truncated cone, narrows toward top) -->
  <path d="M 180 65 L 168 158 L 232 158 L 220 65 Z" class="stroke-fill" />
  <!-- Boeing accent ring at capsule/service junction -->
  <rect x="168" y="155" width="64" height="3" class="accent-blue" />
  <!-- Capsule windows -->
  <circle cx="186" cy="115" r="3" class="stroke" />
  <circle cx="200" cy="110" r="3" class="stroke" />
  <circle cx="214" cy="115" r="3" class="stroke" />

  <!-- Service module (cylindrical) -->
  <rect x="170" y="158" width="60" height="68" class="stroke-fill" />

  <!-- Aft dome with body-mounted PV cells (Starliner's distinctive feature) -->
  <path d="M 170 226 Q 200 268 230 226 Z" class="pv" />
  <!-- Dome PV cell pattern -->
  <line x1="180" y1="226" x2="183" y2="252" class="stroke" />
  <line x1="190" y1="226" x2="191" y2="260" class="stroke" />
  <line x1="200" y1="226" x2="200" y2="262" class="stroke" />
  <line x1="210" y1="226" x2="209" y2="260" class="stroke" />
  <line x1="220" y1="226" x2="217" y2="252" class="stroke" />

  <!-- 4 OMAC engines around the service module -->
  <rect x="161" y="180" width="9" height="6" class="nozzle" />
  <rect x="230" y="180" width="9" height="6" class="nozzle" />

  <!-- LEFT CALLOUTS -->
  <line x1="192" y1="60" x2="100" y2="50" class="accent" />
  <text x="14" y="48" class="label-accent">NDS DOCK</text>
  <text x="14" y="60" class="label-mute">IDA-2 / IDA-3</text>

  <line x1="180" y1="115" x2="100" y2="105" class="accent" />
  <text x="14" y="102" class="label-accent">CAPSULE</text>
  <text x="14" y="114" class="label-mute">4-7 crew · land</text>

  <line x1="170" y1="156" x2="100" y2="160" class="accent" />
  <text x="14" y="148" class="label-accent">BLUE RING</text>
  <text x="14" y="160" class="label-mute">Boeing accent</text>

  <line x1="170" y1="195" x2="100" y2="210" class="accent" />
  <text x="14" y="208" class="label-accent">SERVICE MOD</text>
  <text x="14" y="220" class="label-mute">propulsion</text>

  <line x1="180" y1="245" x2="100" y2="255" class="accent" />
  <text x="14" y="253" class="label-accent">PV ON DOME</text>
  <text x="14" y="265" class="label-mute">no deployed wings</text>

  <!-- RIGHT CALLOUTS -->
  <line x1="220" y1="100" x2="305" y2="92" class="accent" />
  <text x="305" y="88" class="label-accent">REACTION JETS</text>
  <text x="305" y="100" class="label-mute">attitude RCS</text>

  <line x1="232" y1="156" x2="305" y2="160" class="accent" />
  <text x="305" y="156" class="label-accent">HEAT SHIELD</text>
  <text x="305" y="168" class="label-mute">capsule base</text>

  <line x1="234" y1="183" x2="305" y2="200" class="accent" />
  <text x="305" y="198" class="label-accent">OMAC ENGINES</text>
  <text x="305" y="210" class="label-mute">4 abort + orbit</text>

  <line x1="220" y1="245" x2="305" y2="252" class="accent" />
  <text x="305" y="250" class="label-accent">AFT DOME</text>
  <text x="305" y="262" class="label-mute">solar cells inset</text>

  <text x="200" y="290" text-anchor="middle" class="subtitle">Built by Boeing · launches on Atlas V N22</text>
  <text x="200" y="304" text-anchor="middle" class="subtitle">Lands in U.S. desert via airbags + parachutes</text>
</svg>
