  const l=LOGOS[agency]||{bg:"#1a1a2e",abbr:agency.slice(0,4),img:null};

  return `<div style="position:relative;width:${w}px;height:${h}px;border-radius:${r}px;background:${l.bg};overflow:hidden;flex-shrink:0;">

  </div>`;
}

// HELPERS

const MOON_R=120;
function latLonTo3D(lat,lon,r){
  const phi=(90-lat)*Math.PI/180;
  const theta=lon*Math.PI/180;
  return new THREE.Vector3(r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.cos(theta));
}
function latLonTo2D(lat,lon,W,H){return{x:(lon+180)/360*W,y:(90-lat)/180*H};}

// STATE
// ═══════════════════════════════════════════════════════════════
let sel=null, panelOpen=false, agencyFilter='all', currentView='3d';
let lastTime=performance.now(), frame=0;

// ═══════════════════════════════════════════════════════════════
// 2D RENDERER
// ═══════════════════════════════════════════════════════════════
const c2=document.getElementById('r2d');
const ctx2=c2.getContext('2d');
function resize2d(){c2.width=innerWidth;c2.height=innerHeight;}
resize2d();
window.addEventListener('resize',()=>{resize2d();if(currentView==='2d')draw2d();});

function draw2d(){
  const W=c2.width,H=c2.height;
  const mapH=Math.min(H-140,W/2.2); // map height
  const mapW=mapH*2;
  const mx=(W-mapW)/2, my=(H-mapH)/2+10;

  ctx2.fillStyle='#04040c';ctx2.fillRect(0,0,W,H);

  // ── Stars ──
  for(let i=0;i<150;i++){const sx=(i*137.5*31+i*71)%W,sy=(i*137.5*17+i*53)%H,r=i%5===0?1.2:0.5;ctx2.beginPath();ctx2.arc(sx,sy,r,0,Math.PI*2);ctx2.fillStyle=`rgba(210,215,255,${0.1+i%4*0.05})`;ctx2.fill();}

  // ── Moon map background ──
  ctx2.fillStyle='#2a2a2e';ctx2.fillRect(mx,my,mapW,mapH);

  // Highlands texture (subtle noise-like pattern)
  for(let i=0;i<600;i++){const fx=mx+Math.random()*mapW,fy=my+Math.random()*mapH,fr=1+Math.random()*3;ctx2.beginPath();ctx2.arc(fx,fy,fr,0,Math.PI*2);ctx2.fillStyle=`rgba(255,255,255,${0.01+Math.random()*0.02})`;ctx2.fill();}

  // ── Mare (dark regions) ──
  MARE.forEach(m=>{
    const cx2d=mx+(m.cx+180)/360*mapW, cy2d=my+(90-m.cy)/180*mapH;
    const rx2d=m.rx/360*mapW, ry2d=m.ry/180*mapH;
    ctx2.beginPath();ctx2.ellipse(cx2d,cy2d,rx2d,ry2d,0,0,Math.PI*2);
    ctx2.fillStyle='rgba(10,10,15,0.55)';ctx2.fill();
  });

  // ── South pole highlight ──
  const spY=my+mapH*0.98;
  ctx2.fillStyle='rgba(123,156,255,0.06)';ctx2.fillRect(mx,spY-mapH*0.12,mapW,mapH*0.12);
  ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.fillStyle='rgba(123,156,255,0.4)';ctx2.textAlign='center';
  ctx2.fillText('SOUTH POLE REGION · WATER ICE · ARTEMIS TARGET',mx+mapW/2,spY-4);ctx2.restore();

  // ── Far side dividers ──
  const leftEdge=mx,rightEdge=mx+mapW,centerX=mx+mapW/2;
  // Near/far boundary lines
  ctx2.strokeStyle='rgba(255,255,255,0.08)';ctx2.lineWidth=1;ctx2.setLineDash([4,8]);
  ctx2.beginPath();ctx2.moveTo(mx+mapW*0.25,my);ctx2.lineTo(mx+mapW*0.25,my+mapH);ctx2.stroke();
  ctx2.beginPath();ctx2.moveTo(mx+mapW*0.75,my);ctx2.lineTo(mx+mapW*0.75,my+mapH);ctx2.stroke();
  ctx2.setLineDash([]);
  ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.textAlign='center';
  ctx2.fillStyle='rgba(255,255,255,0.12)';
  ctx2.fillText('FAR SIDE',mx+mapW*0.125,my+mapH+14);
  ctx2.fillText('NEAR SIDE',mx+mapW*0.5,my+mapH+14);
  ctx2.fillText('FAR SIDE',mx+mapW*0.875,my+mapH+14);ctx2.restore();

  // ── Grid lines ──
  ctx2.strokeStyle='rgba(255,255,255,0.05)';ctx2.lineWidth=0.5;
  for(let lon=-180;lon<=180;lon+=30){const x=mx+(lon+180)/360*mapW;ctx2.beginPath();ctx2.moveTo(x,my);ctx2.lineTo(x,my+mapH);ctx2.stroke();}
  for(let lat=-90;lat<=90;lat+=30){const y=my+(90-lat)/180*mapH;ctx2.beginPath();ctx2.moveTo(mx,y);ctx2.lineTo(mx+mapW,y);ctx2.stroke();}
  // Equator and prime meridian bolder
  ctx2.strokeStyle='rgba(255,255,255,0.12)';ctx2.lineWidth=0.7;
  ctx2.beginPath();ctx2.moveTo(mx,my+mapH/2);ctx2.lineTo(mx+mapW,my+mapH/2);ctx2.stroke();
  ctx2.beginPath();ctx2.moveTo(centerX,my);ctx2.lineTo(centerX,my+mapH);ctx2.stroke();

  // ── Map border ──
  ctx2.strokeStyle='rgba(255,255,255,0.15)';ctx2.lineWidth=1;ctx2.strokeRect(mx,my,mapW,mapH);

  // ── Coordinate labels ──
  ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.fillStyle='rgba(255,255,255,0.2)';ctx2.textAlign='center';
  ctx2.fillText('0°',centerX,my-5);
  ctx2.fillText('90°E',mx+mapW*0.75,my-5);
  ctx2.fillText('90°W',mx+mapW*0.25,my-5);
  ctx2.textAlign='right';
  ctx2.fillText('45°N',mx-4,my+mapH*0.25+3);
  ctx2.fillText('0°',mx-4,my+mapH/2+3);
  ctx2.fillText('45°S',mx-4,my+mapH*0.75+3);ctx2.restore();

  // ── Landing sites ──
  const filteredSites=getFilteredSites();
  filteredSites.forEach(s=>{
    const {x,y}=latLonTo2D(s.lat,s.lon,mapW,mapH);
    const px=mx+x, py=my+y;
    const isSel=sel?.id===s.id;
    const col=AGENCY_CSS[s.agency]||'#aaa';
    const isPlanned=s.status==='PLANNED';

    // Glow
    const g=ctx2.createRadialGradient(px,py,0,px,py,12);
    g.addColorStop(0,col+'88');g.addColorStop(1,'transparent');
    ctx2.beginPath();ctx2.arc(px,py,12,0,Math.PI*2);ctx2.fillStyle=g;ctx2.fill();

    // Pin
    if(isPlanned){ctx2.beginPath();ctx2.arc(px,py,5,0,Math.PI*2);ctx2.strokeStyle=col;ctx2.lineWidth=1.5;ctx2.setLineDash([3,2]);ctx2.stroke();ctx2.setLineDash([]);}
    else{ctx2.beginPath();ctx2.arc(px,py,isSel?6:4.5,0,Math.PI*2);ctx2.fillStyle=isSel?'#fff':col;ctx2.fill();}

    // Selection ring
    if(isSel){const p=0.5+0.5*Math.sin(frame*0.1);ctx2.beginPath();ctx2.arc(px,py,8+p*2,0,Math.PI*2);ctx2.strokeStyle=`rgba(255,255,255,${0.4+p*0.3})`;ctx2.lineWidth=1;ctx2.stroke();}

    // Label — always visible
    ctx2.save();
    const shortName=s.name.split('/')[0].split(' ').slice(0,2).join(' ');
    ctx2.font=`${isSel?'bold ':''}8px 'Space Mono',monospace`;
    if(isSel){ctx2.shadowColor=col;ctx2.shadowBlur=8;}
    else{ctx2.shadowColor='rgba(0,0,0,0.8)';ctx2.shadowBlur=4;}
    ctx2.fillStyle=isSel?'#fff':col;ctx2.textAlign='left';
    ctx2.fillText(shortName,px+8,py+3);ctx2.restore();
  });

  // ── Title ──
  ctx2.save();ctx2.font="bold 9px 'Space Mono',monospace";ctx2.fillStyle="rgba(255,255,255,0.08)";ctx2.textAlign='left';
  ctx2.fillText("LUNAR SURFACE · CYLINDRICAL PROJECTION · NEARSIDE CENTER",mx,my+mapH+28);ctx2.restore();
}

// 2D click
c2.addEventListener('click',e=>{
  if(currentView!=='2d')return;
  const W=c2.width,H=c2.height;
  const mapH=Math.min(H-140,W/2.2),mapW=mapH*2;
  const mx2=(W-mapW)/2,my2=(H-mapH)/2+10;
  let best=null,bestD=Infinity;
  SITES.forEach(s=>{
    const {x,y}=latLonTo2D(s.lat,s.lon,mapW,mapH);
    const d=Math.hypot(e.clientX-(mx2+x),e.clientY-(my2+y));
    if(d<18&&d<bestD){bestD=d;best=s;}
  });
  if(best){sel=best;panelOpen=true;renderPanel();}
  else if(panelOpen){panelOpen=false;document.getElementById('panel').style.display='none';}
});
c2.addEventListener('mousemove',e=>{
  if(currentView!=='2d')return;
  const W=c2.width,H=c2.height;
  const mapH=Math.min(H-140,W/2.2),mapW=mapH*2;
  const mx2=(W-mapW)/2,my2=(H-mapH)/2+10;
  let hit=false;
  SITES.forEach(s=>{
    const{x,y}=latLonTo2D(s.lat,s.lon,mapW,mapH);
    if(Math.hypot(e.clientX-(mx2+x),e.clientY-(my2+y))<16)hit=true;
  });
  c2.style.cursor=hit?'pointer':'default';
});

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,5000);
const renderer3=new THREE.WebGLRenderer({antialias:true});
renderer3.setPixelRatio(Math.min(devicePixelRatio,2));
renderer3.setSize(innerWidth,innerHeight);
renderer3.setClearColor(0x04040c,1);
document.getElementById('r3d').appendChild(renderer3.domElement);

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer3.setSize(innerWidth,innerHeight);});

// Stars
const sp=new Float32Array(2500*3);for(let i=0;i<2500;i++){const r=2000+Math.random()*500,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);sp[i*3]=r*Math.sin(p)*Math.cos(t);sp[i*3+1]=r*Math.sin(p)*Math.sin(t);sp[i*3+2]=r*Math.cos(p);}
const sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xdde4ff,size:1.2,sizeAttenuation:false,transparent:true,opacity:0.65})));

// Lighting — Sun direction
scene.add(new THREE.AmbientLight(0x223344,0.8));
const sunL=new THREE.DirectionalLight(0xfff8e7,1.4);sunL.position.set(600,200,800);scene.add(sunL);
const fillL=new THREE.DirectionalLight(0x334466,0.25);fillL.position.set(-400,100,-300);scene.add(fillL);

// Moon sphere
const moonGeo=new THREE.SphereGeometry(MOON_R,64,64);
const moonMat=new THREE.MeshPhongMaterial({color:0xaaaaaa,shininess:5,specular:0x111111});
const moonMesh=new THREE.Mesh(moonGeo,moonMat);scene.add(moonMesh);

// Load real Moon texture
new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg',
  tex=>{moonMat.map=tex;moonMat.color.set(0xffffff);moonMat.needsUpdate=true;}
);

// ── Landing site pins 3D ───────────────────────────────────────
const pinMeshes3=[],pinHitMeshes=[];
const pinObjs={};

SITES.forEach(s=>{
  const pos=latLonTo3D(s.lat,s.lon,MOON_R);
  const col=parseInt((AGENCY_CSS[s.agency]||'#888888').replace('#','0x'));
  const isPlanned=s.status==='PLANNED';

  // Pin stem (thin cylinder from surface outward)
  const stemH=6,stemR=0.4;
  const stemMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:isPlanned?0.4:0.7});
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(stemR,stemR,stemH,6),stemMat);
  // Position: center of stem is at surface + stemH/2 in normal direction
  const normal=pos.clone().normalize();
  const stemPos=pos.clone().add(normal.clone().multiplyScalar(stemH/2));
  stem.position.copy(stemPos);
  stem.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),normal);
  scene.add(stem);

  // Pin head
  const headMat=new THREE.MeshBasicMaterial({color:col,transparent:isPlanned,opacity:isPlanned?0.55:1,blending:THREE.AdditiveBlending});
  const headPos=pos.clone().add(normal.clone().multiplyScalar(stemH+2.5));
  const head=new THREE.Mesh(new THREE.SphereGeometry(isPlanned?1.2:1.8,8,8),headMat);
  head.position.copy(headPos);scene.add(head);

  // Glow
  const glowMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending,depthWrite:false});
  const glow=new THREE.Mesh(new THREE.SphereGeometry(4,8,8),glowMat);glow.position.copy(headPos);scene.add(glow);

  // Hit sphere (larger, invisible)
  const hitMat=new THREE.MeshBasicMaterial({transparent:true,opacity:0});
  const hit=new THREE.Mesh(new THREE.SphereGeometry(8,6,6),hitMat);hit.position.copy(headPos);
  hit.userData.site=s;scene.add(hit);pinHitMeshes.push(hit);

  pinObjs[s.id]={head,glow,headMat,glowMat,hit};
});

// 3D Label divs
const lblContainer=document.getElementById('lbl3d');
const lblEls={};
SITES.forEach(s=>{
  const d=document.createElement('div');
  const col=AGENCY_CSS[s.agency]||'#aaa';
  const short=s.name.split('/')[0].replace('Apollo ','A').replace('Chang\'e ','CE').replace('Chandrayaan-','C3-').replace('Artemis ','Ar');
  d.textContent=short;
  d.style.cssText=`position:absolute;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:${col};opacity:0;pointer-events:none;white-space:nowrap;transform:translate(8px,-50%);text-shadow:0 1px 4px rgba(0,0,0,0.9),0 0 8px ${col}88;transition:opacity 0.15s;font-weight:600;`;
  lblContainer.appendChild(d);
  lblEls[s.id]=d;
});

// ── Camera orbit ──────────────────────────────────────────────
let camT=0.3,camP=1.1,camR=340,isDrag=false,dragMoved=false,lmx=0,lmy=0,autoOrbit=true;
function updateCam(){camera.position.set(camR*Math.sin(camP)*Math.sin(camT),camR*Math.cos(camP),camR*Math.sin(camP)*Math.cos(camT));camera.lookAt(0,0,0);}
updateCam();

const el3=renderer3.domElement;
el3.addEventListener('mousedown',e=>{isDrag=true;dragMoved=false;lmx=e.clientX;lmy=e.clientY;autoOrbit=false;el3.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{
  if(isDrag){const dx=e.clientX-lmx,dy=e.clientY-lmy;if(Math.abs(dx)+Math.abs(dy)>2)dragMoved=true;camT-=dx*0.005;camP=Math.max(0.1,Math.min(Math.PI*0.49,camP+dy*0.004));lmx=e.clientX;lmy=e.clientY;updateCam();}
});
window.addEventListener('mouseup',()=>{isDrag=false;el3.style.cursor='grab';setTimeout(()=>{autoOrbit=true;},5000);});
el3.addEventListener('wheel',e=>{camR=Math.max(160,Math.min(800,camR+e.deltaY*0.5));updateCam();},{passive:true});
el3.addEventListener('click',e=>{
  if(dragMoved||currentView!=='3d')return;
  const rect=el3.getBoundingClientRect();
  const ray=new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1),camera);
  const hits=ray.intersectObjects(pinHitMeshes);
  if(hits.length){sel=hits[0].object.userData.site;panelOpen=true;renderPanel();}
  else if(panelOpen){panelOpen=false;document.getElementById('panel').style.display='none';}
});
el3.style.cursor='grab';

// ── 3D draw ───────────────────────────────────────────────────
function draw3d(dt){
  if(autoOrbit) {camT+=dt*0.008;updateCam();}
  const filtered=getFilteredSites();
  const filteredIds=new Set(filtered.map(s=>s.id));

  SITES.forEach(s=>{
    const obj=pinObjs[s.id]; if(!obj) return;
    const visible=filteredIds.has(s.id);
    obj.head.visible=visible;obj.glow.visible=visible;obj.hit.visible=visible;
    const isSel=sel?.id===s.id;
    const p=0.5+0.5*Math.sin(frame*0.1);
    obj.glowMat.opacity=isSel?0.6+p*0.3:0.25;
    if(isSel){obj.head.scale.setScalar(1.3+p*0.2);}else{obj.head.scale.setScalar(1);}

    // Label positioning
    const lbl=lblEls[s.id]; if(!lbl) return;
    if(!visible){lbl.style.opacity='0';return;}
    const wp=obj.head.position.clone().project(camera);
    if(wp.z>1){lbl.style.opacity='0';return;}
    lbl.style.left=((wp.x+1)/2*innerWidth)+'px';
    lbl.style.top=((-wp.y+1)/2*innerHeight)+'px';
    lbl.style.opacity=isSel?'1':'0.75';
    lbl.style.color=isSel?'#fff':(AGENCY_CSS[s.agency]||'#aaa');
    lbl.style.fontWeight=isSel?'700':'400';
  });

  renderer3.render(scene,camera);
}

// FILTER
// ═══════════════════════════════════════════════════════════════
function getFilteredSites(){
  return SITES.filter(s=>{
    if(agencyFilter==='all') return true;
    if(agencyFilter==='crewed') return s.crewed;
    if(agencyFilter==='planned') return s.status==='PLANNED';
    return s.agency===agencyFilter;
  });
}
window.setAgency=btn=>{
  agencyFilter=btn.dataset.agency;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
};

          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:${s.name.length>18?20:26}px;letter-spacing:2px;color:#fff;line-height:1.1;">${s.name}</div>
          <div style="font-size:7px;color:rgba(255,255,255,0.3);margin-top:2px;">${s.type}</div>
        </div>
        <div onclick="closePanel()" style="width:22px;height:22px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:13px;user-select:none;flex-shrink:0;">×</div>
      </div>
      <div style="font-size:8px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:4px;">
        <span>📍</span><span>${s.site}</span>
        <span style="color:rgba(255,255,255,0.2);margin-left:6px;">${s.lat.toFixed(2)}°, ${s.lon.toFixed(2)}°</span>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 18px;flex-shrink:0;">
      <button id="ptab-details" onclick="switchPanelTab('details')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid ${panelTab==='details'?'#4466ff':'transparent'};color:${panelTab==='details'?'#fff':'rgba(255,255,255,0.35)'};cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">OVERVIEW</button>
      <button id="ptab-gallery" onclick="switchPanelTab('gallery')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid ${panelTab==='gallery'?'#4466ff':'transparent'};color:${panelTab==='gallery'?'#fff':'rgba(255,255,255,0.35)'};cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">GALLERY</button>
      <button id="ptab-links" onclick="switchPanelTab('links')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid ${panelTab==='links'?'#4466ff':'transparent'};color:${panelTab==='links'?'#fff':'rgba(255,255,255,0.35)'};cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">LEARN</button>
    </div>

    <!-- Tab content -->
    <div id="panel-content" style="flex:1;overflow-y:auto;"></div>

    <div style="padding:6px 18px;border-top:1px solid rgba(255,255,255,0.06);font-size:6px;color:rgba(255,255,255,0.12);text-align:center;letter-spacing:1px;flex-shrink:0;">
      ${s.lat.toFixed(2)}°${s.lat>=0?'N':'S'} · ${Math.abs(s.lon).toFixed(2)}°${s.lon>=0?'E':'W'} · Lunar coordinate system
    </div>`;

  renderPanelTab();
}

window.switchPanelTab=tab=>{
  panelTab=tab;
  // Update tab button styles
  ['details','gallery','links'].forEach(t=>{
    const b=document.getElementById('ptab-'+t);
    if(!b)return;
    const active=t===tab;
    b.style.borderBottomColor=active?'#4466ff':'transparent';
    b.style.color=active?'#fff':'rgba(255,255,255,0.35)';
  });
  renderPanelTab();
};

function renderPanelTab(){
  const s=sel; if(!s) return;
  const col=AGENCY_CSS[s.agency]||'#aaa';
  const el=document.getElementById('panel-content'); if(!el) return;
  const tc={};Object.keys(TIER).forEach(t=>{tc[t]=(s.links||[]).filter(l=>l.t===t).length;});
  const badges=Object.entries(TIER).filter(([t])=>tc[t]>0).map(([t,v])=>`<div style="font-size:7px;padding:2px 6px;background:${v.bg};color:${v.color};border-radius:2px;border:1px solid ${v.color}33;">${v.label}</div>`).join('');
  const links=Object.entries(TIER).map(([tk,tv])=>{const ls=(s.links||[]).filter(l=>l.t===tk);if(!ls.length)return'';return`<div style="margin-bottom:12px;"><div style="font-size:7px;letter-spacing:2px;color:${tv.color};margin-bottom:5px;display:flex;align-items:center;gap:6px;"><div style="flex:1;height:1px;background:${tv.dot}33;"></div>${tv.label}<div style="flex:1;height:1px;background:${tv.dot}33;"></div></div>${ls.map(lk=>`<a href="${lk.u}" target="_blank" rel="noopener" class="link-row" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;text-decoration:none;margin-bottom:2px;background:transparent;"><div style="width:5px;height:5px;border-radius:50%;background:${tv.dot};flex-shrink:0;"></div><span style="font-size:9px;color:rgba(255,255,255,0.65);flex:1;line-height:1.45;font-family:'Space Mono',monospace;">${lk.l}</span><span style="color:rgba(255,255,255,0.2);font-size:9px;">↗</span></a>`).join('')}</div>`;}).join('');

  if(panelTab==='details'){
    el.innerHTML=`<div style="padding:12px 18px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:8px 10px;">
          <div style="font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-bottom:3px;">CREW</div>
          <div style="font-size:9px;color:#fff;font-weight:700;line-height:1.4;">${s.crew?s.crew.join(' · '):'Uncrewed'}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:8px 10px;">
          <div style="font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-bottom:3px;">SURFACE TIME</div>
          <div style="font-size:9px;color:#fff;font-weight:700;">${s.surface}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:8px 10px;grid-column:span 2;">
          <div style="font-size:6px;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-bottom:3px;">SAMPLES RETURNED</div>
          <div style="font-size:9px;color:#fff;font-weight:700;">${s.samples}</div>
        </div>
      </div>
      <div style="padding:9px 11px;background:rgba(${col.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')},0.07);border-left:3px solid ${col};border-radius:2px;margin-bottom:10px;">
        <div style="font-size:6px;letter-spacing:2px;color:${col};margin-bottom:4px;">STILL ON THE SURFACE</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.55);line-height:1.5;">${s.left||'Unknown'}</div>
      </div>
      <p style="font-family:'Crimson Pro',serif;font-style:italic;font-size:12px;color:rgba(255,255,255,0.55);line-height:1.65;">${s.fact}</p>
    </div>`;
  } else if(panelTab==='gallery'){
    el.innerHTML=`<div style="padding:12px 18px;" id="gallery-inner"><div style="font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:2px;">LOADING...</div></div>`;
    renderGallery(s);
  } else {
    el.innerHTML=s.links&&s.links.length
      ?`<div style="padding:12px 18px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.22);">KNOWLEDGE BASE</div><div style="display:flex;gap:4px;">${badges}</div></div>${links}</div>`
      :`<div style="padding:24px 18px;text-align:center;color:rgba(255,255,255,0.18);font-size:9px;letter-spacing:2px;">LINKS COMING IN OR-03</div>`;
  }
}

function renderGallery(s){
  const gi=document.getElementById('gallery-inner'); if(!gi) return;
  const gd=GALLERY[s.id];
  const credit=s.agency==='NASA'?'© NASA — U.S. Government work · Public domain'
    :s.agency==='ROSCOSMOS'?'© Roscosmos / Soviet Space Program — Historical archive'
    :s.agency==='CNSA'?'© CNSA — Official release — cnsa.gov.cn'
    :s.agency==='ISRO'?'© ISRO — Educational use — isro.gov.in'
    :s.agency==='JAXA'?'© JAXA — jaxa.jp'
    :'Mission imagery';

  if(!gd){gi.innerHTML=`<div style="text-align:center;padding:20px;"><div style="font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.18);">GALLERY CURATED IN OR-03</div><p style="margin-top:8px;font-family:'Crimson Pro',serif;font-style:italic;font-size:11px;color:rgba(255,255,255,0.25);line-height:1.6;">Mission imagery will be sourced from official archives with full attribution.</p></div>`;return;}

  if(gd.query){
    // NASA Images API
    gi.innerHTML=`<div style="font-size:7px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:8px;">NASA IMAGE LIBRARY · LIVE</div><div id="gal-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;"><div style="grid-column:span 3;color:rgba(255,255,255,0.2);font-size:8px;">Loading…</div></div><div style="font-size:6.5px;color:rgba(255,255,255,0.18);line-height:1.5;">${credit}</div>`;
    fetch('https://images-api.nasa.gov/search?q='+encodeURIComponent(gd.query)+'&media_type=image&page_size=9')
      .then(r=>r.json()).then(data=>{
        const items=(data.collection&&data.collection.items)||[];
        const g=document.getElementById('gal-grid');if(!g)return;
        if(!items.length){g.innerHTML=`<div style="grid-column:span 3;color:rgba(255,255,255,0.2);font-size:8px;">No images found</div>`;return;}
        g.innerHTML=items.slice(0,9).map(item=>{
          const th=item.links&&item.links[0]&&item.links[0].href;
          const ti=(item.data&&item.data[0]&&item.data[0].title)||'';
          return th?`<div style="aspect-ratio:1;overflow:hidden;border-radius:3px;background:#0a0a18;cursor:pointer;" title="${ti}" onclick="window.open('${th}','_blank')"><img src="${th}" alt="${ti}" style="width:100%;height:100%;object-fit:cover;" loading="lazy"></div>`:'';
        }).join('');
      }).catch(()=>{const g=document.getElementById('gal-grid');if(g)g.innerHTML=`<div style="grid-column:span 3;color:rgba(255,255,255,0.2);font-size:8px;">Gallery requires internet access</div>`;});
  } else if(gd.imgs&&gd.imgs.length){
    // Curated Wikimedia images
    gi.innerHTML=`<div style="font-size:7px;color:rgba(255,255,255,0.2);letter-spacing:2px;margin-bottom:8px;">CURATED · WIKIMEDIA COMMONS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;">
      ${gd.imgs.map(u=>`<div style="aspect-ratio:1;overflow:hidden;border-radius:3px;background:#0a0a18;cursor:pointer;" onclick="window.open('${u}','_blank')"><img src="${u}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`).join('')}
    </div>
    <div style="font-size:6.5px;color:rgba(255,255,255,0.18);line-height:1.5;">${credit}<br>Source: Wikimedia Commons · Click to open full size</div>`;
  } else {
    gi.innerHTML=`<div style="text-align:center;padding:20px;"><div style="font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.18);">IMAGERY BEING SOURCED</div><p style="margin-top:8px;font-family:'Crimson Pro',serif;font-style:italic;font-size:11px;color:rgba(255,255,255,0.25);line-height:1.6;">Gallery will be populated in OR-03 data catalog research session.</p></div>`;
  }
}

window.closePanel=()=>{panelOpen=false;document.getElementById('panel').style.display='none';};

// ═══════════════════════════════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════════════════════════════
window.setView=v=>{
  currentView=v;
  document.getElementById('r2d').style.opacity=v==='2d'?'1':'0';
  document.getElementById('r2d').style.pointerEvents=v==='2d'?'auto':'none';
  document.getElementById('r3d').style.opacity=v==='3d'?'1':'0';
  document.getElementById('r3d').style.pointerEvents=v==='3d'?'auto':'none';
  document.getElementById('lbl3d').style.opacity=v==='3d'?'1':'0';
  document.getElementById('tab-2d').className='vtab'+(v==='2d'?' active':'');
  document.getElementById('tab-3d').className='vtab'+(v==='3d'?' active':'');
  document.getElementById('hint2d').textContent=v==='2d'?'CLICK A LANDING SITE':'DRAG TO ORBIT · CLICK A SITE';
};

// ═══════════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════════
function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;frame++;
  if(currentView==='3d') draw3d(dt);
  else draw2d();
}
requestAnimationFrame(animate);
</script>
</body>
</html>
