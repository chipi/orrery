function getPlanetPos(p, t) {
  const a = p.a0 + (2*Math.PI*t)/p.period;
  const inc = p.inc*Math.PI/180;
  const x = Math.cos(a)*p.orbitR;
  const zf = Math.sin(a)*p.orbitR;
  return {x3:x, y3:zf*Math.sin(inc), z3:zf*Math.cos(inc), x2:x, y2:zf};
}

const c2 = document.getElementById('r2d');
const ctx2 = c2.getContext('2d');

function resize2d(){c2.width=window.innerWidth;c2.height=window.innerHeight;}

// ── 2D: drag to pan + zoom ────────────────────────────────────
let zoom2d=1, zx2d=0, zy2d=0, isDrag2d=false, drag2dX=0, drag2dY=0;
c2.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.88:1.14;
  const r=c2.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const W=c2.width,H=c2.height;
  // Zoom anchored to cursor: keep world point under cursor fixed
  zx2d=(mx-W/2)*(1-f)+zx2d*f;
  zy2d=(my-H/2)*(1-f)+zy2d*f;
  zoom2d=Math.max(0.12,Math.min(5,zoom2d*f));
},{passive:false});
c2.addEventListener('mousedown',e=>{isDrag2d=true;drag2dX=e.clientX;drag2dY=e.clientY;c2.style.cursor='grabbing';});
window.addEventListener('mouseup',()=>{isDrag2d=false;if(currentView==='2d')c2.style.cursor='grab';});
window.addEventListener('mousemove',e=>{if(!isDrag2d||currentView!=='2d')return;zx2d+=(e.clientX-drag2dX);zy2d+=(e.clientY-drag2dY);drag2dX=e.clientX;drag2dY=e.clientY;});
c2.style.cursor='grab';

// ── 2D click hit detection ────────────────────────────────────
c2.addEventListener('click',e=>{
  if(currentView!=='2d')return;
  const W=c2.width,H=c2.height;
  const r=c2.getBoundingClientRect();
  // Transform: translate(W/2+zx2d, H/2+zy2d) scale(zoom2d)
  // So world = (screen - center_offset) / zoom2d
  const wx=(e.clientX-r.left-(W/2+zx2d))/zoom2d;
  const wy=(e.clientY-r.top -(H/2+zy2d))/zoom2d;
  const bcx=0, bcy=0;
  let best=null, bestD=Infinity;
  // Sun
  const sd=Math.hypot(wx-bcx, wy-bcy);
  if(sd<20){best={...SUN_OBJ,_px:bcx,_py:bcy};bestD=sd;}
  // Planets
  PLANETS.forEach(p=>{
    const ang=p.a0+simT*(2*Math.PI/p.period);
    const px=bcx+Math.cos(ang)*p.orbitR, py=bcy+Math.sin(ang)*p.orbitR;
    const d=Math.hypot(wx-px,wy-py);
    if(d<p.size2*2.5+8&&d<bestD){bestD=d;best={...p,_px:px,_py:py};}
  });
  // Small bodies
  SMALL.forEach(s=>{
    const sp2=getSmallPos(s);
    const px=bcx+sp2.x, py=bcy+sp2.y;
    const d=Math.hypot(wx-px,wy-py);
    if(d<12&&d<bestD){bestD=d;best={...s,_px:px,_py:py};}
  });
  // Kuiper belt / Planet Nine regions
  const dc=Math.hypot(wx-bcx,wy-bcy);
  if(dc>434&&dc<484&&bestD===Infinity){best=EXTRAS[0];}
  const pnR=Math.min(W,H)*0.49;
  if(Math.abs(dc-pnR)<14&&bestD===Infinity){best=EXTRAS[1];}
  if(best){sel=best;panelOpen=true;panelTab='overview';renderPanel();}
  else if(panelOpen){panelOpen=false;document.getElementById('panel').style.display='none';}
});

// ── 2D position helpers ────────────────────────────────────────
function getSmallPos(s){
  const a=s.a0+(2*Math.PI/s.period)*simT;
  return {x:Math.cos(a)*s.orbitR, y:Math.sin(a)*s.orbitR};
}
function getCometPos(c){
  const omega=c.period?2*Math.PI/c.period:0;
  const r=c.period?(c.q+c.Q)/2:c.q;
  const a=c.a0+simT*omega;
  return {x:Math.cos(a+c.rot)*r, y:Math.sin(a+c.rot)*r};
}

// ── 2D draw ────────────────────────────────────────────────────
function draw2d(){
  try{
  const W=c2.width, H=c2.height, cx=0, cy=0;
  ctx2.fillStyle='#04040c'; ctx2.fillRect(0,0,W,H);
  // Stars in screen space (before zoom transform)
  for(let i=0;i<200;i++){const sx=(i*137.5*31+i*71)%W,sy=(i*137.5*17+i*53)%H;ctx2.beginPath();ctx2.arc(sx,sy,i%8===0?1.2:0.5,0,Math.PI*2);ctx2.fillStyle=`rgba(210,215,255,${0.06+i%5*0.04})`;ctx2.fill();}

  ctx2.save();
  // Anchor solar system centre to canvas centre; pan and zoom applied on top
  ctx2.translate(W/2+zx2d, H/2+zy2d);
  ctx2.scale(zoom2d,zoom2d);

  // Orbit rings
  PLANETS.forEach(p=>{
    const isSel=sel?.id===p.id;
    ctx2.beginPath();ctx2.arc(cx,cy,p.orbitR,0,Math.PI*2);
    ctx2.strokeStyle=isSel?'rgba(68,102,255,0.3)':'rgba(255,255,255,0.05)';
    ctx2.lineWidth=isSel?1.5:0.5; ctx2.stroke();
  });
  // Small body inclined ellipse orbits
  SMALL.forEach(s=>{
    const isSel=sel?.id===s.id;
    const inclRad=(s.inc||0)*Math.PI/180;
    ctx2.save(); ctx2.translate(cx,cy);
    ctx2.beginPath(); ctx2.ellipse(0,0,s.orbitR,s.orbitR*Math.cos(inclRad),0,0,Math.PI*2);
    ctx2.strokeStyle=isSel?s.css+'88':'rgba(255,255,255,0.03)';
    ctx2.lineWidth=isSel?1:0.4; ctx2.setLineDash([2,4]); ctx2.stroke(); ctx2.setLineDash([]); ctx2.restore();
  });
  // Asteroid belt
  for(let i=0;i<280;i++){const a=(i/280)*Math.PI*2+simT*0.016,r=192+(i%38)*1.1;ctx2.beginPath();ctx2.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,0.85,0,Math.PI*2);ctx2.fillStyle=`rgba(185,162,110,${0.05+(i%7)*0.03})`;ctx2.fill();}
  // Kuiper Belt
  for(let i=0;i<500;i++){const a=(i/500)*Math.PI*2+simT*0.003,r=438+(i%44)*0.9;ctx2.beginPath();ctx2.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,0.75,0,Math.PI*2);ctx2.fillStyle=`rgba(140,160,210,${0.035+(i%9)*0.018})`;ctx2.fill();}
  // Planet Nine ring
  const pnR=Math.min(W,H)*0.49;
  ctx2.beginPath();ctx2.arc(cx,cy,pnR,0,Math.PI*2);ctx2.strokeStyle='rgba(160,120,220,0.14)';ctx2.lineWidth=1;ctx2.setLineDash([4,9]);ctx2.stroke();ctx2.setLineDash([]);
  ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.fillStyle='rgba(160,120,220,0.32)';ctx2.textAlign='center';ctx2.fillText('PLANET NINE? · HYPOTHETICAL · ~600 AU',cx,cy-pnR-6);ctx2.restore();

  // Comet orbits
  COMETS.forEach(c=>{
    if(!c.Q)return;
    const a=(c.q+c.Q)/2,cc2=(c.Q-c.q)/2,b=Math.sqrt(Math.max(0,a*a-cc2*cc2));
    ctx2.save();ctx2.translate(cx+cc2,cy);ctx2.rotate(c.rot);
    ctx2.beginPath();ctx2.ellipse(0,0,a,b,0,0,Math.PI*2);
    ctx2.strokeStyle=c.css+'44';ctx2.lineWidth=0.8;ctx2.setLineDash([3,6]);ctx2.stroke();ctx2.setLineDash([]);ctx2.restore();
    const omega=c.period?2*Math.PI/c.period:0,ang2=c.a0+simT*omega,r2=c.period?(c.q+c.Q)/2:c.q;
    const px=cx+Math.cos(ang2+c.rot)*r2,py=cy+Math.sin(ang2+c.rot)*r2;
    ctx2.beginPath();ctx2.arc(px,py,3,0,Math.PI*2);ctx2.fillStyle=c.css;ctx2.fill();
    ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.fillStyle=c.css+'99';ctx2.textAlign='left';ctx2.fillText(c.label,px+5,py+3);ctx2.restore();
  });

  // Sun
  if(sel?.id==='sun'){const sp=0.5+0.5*Math.sin(frame*0.06);ctx2.beginPath();ctx2.arc(cx,cy,22+sp*4,0,Math.PI*2);ctx2.strokeStyle='rgba(255,220,80,'+(0.4+sp*0.3)+')';ctx2.lineWidth=1.5;ctx2.stroke();}
  for(let r=90;r>0;r-=6){const sg=ctx2.createRadialGradient(cx,cy,0,cx,cy,r);sg.addColorStop(0,`rgba(255,228,130,${0.012*(90/r)})`);sg.addColorStop(1,'rgba(255,120,0,0)');ctx2.beginPath();ctx2.arc(cx,cy,r,0,Math.PI*2);ctx2.fillStyle=sg;ctx2.fill();}
  ctx2.beginPath();ctx2.arc(cx,cy,14,0,Math.PI*2);ctx2.fillStyle='#fff8e7';ctx2.fill();
  ctx2.save();ctx2.font="7px 'Space Mono',monospace";ctx2.fillStyle='rgba(255,220,100,0.5)';ctx2.textAlign='center';ctx2.fillText('SUN',cx,cy+22);ctx2.restore();

  // Small bodies
  SMALL.forEach(s=>{
    const sp2=getSmallPos(s);
    const px=cx+sp2.x, py=cy+sp2.y;
    const isSel=sel?.id===s.id;
    const gr=ctx2.createRadialGradient(px,py,0,px,py,7);gr.addColorStop(0,s.css+'99');gr.addColorStop(1,'transparent');
    ctx2.beginPath();ctx2.arc(px,py,7,0,Math.PI*2);ctx2.fillStyle=gr;ctx2.fill();
    ctx2.beginPath();ctx2.arc(px,py,isSel?3:2,0,Math.PI*2);ctx2.fillStyle=s.css;ctx2.fill();
    if(isSel){ctx2.beginPath();ctx2.arc(px,py,9,0,Math.PI*2);ctx2.strokeStyle=s.css+'88';ctx2.lineWidth=1;ctx2.stroke();}
    ctx2.save();ctx2.font=`${isSel?'bold ':''}7px 'Space Mono',monospace`;ctx2.fillStyle=s.css+'bb';ctx2.textAlign='left';ctx2.fillText(s.label,px+5,py+3);ctx2.restore();
  });

  // Planets — realistic per-planet shading
  PLANETS.forEach(p=>{
    const ang=p.a0+simT*(2*Math.PI/p.period);
    const pr=Math.max(3,p.size2||5);
    const px=cx+Math.cos(ang)*p.orbitR, py=cy+Math.sin(ang)*p.orbitR;
    const isSel=sel?.id===p.id;
    // Outer glow
    try{
      const gl=ctx2.createRadialGradient(px,py,0,px,py,pr*4);
      gl.addColorStop(0,p.css+'55');gl.addColorStop(1,'rgba(0,0,0,0)');
      ctx2.beginPath();ctx2.arc(px,py,pr*4,0,Math.PI*2);ctx2.fillStyle=gl;ctx2.fill();
    }catch(e){}
    // Selection ring
    if(isSel){const pulse=0.5+0.5*Math.sin(frame*0.08);ctx2.beginPath();ctx2.arc(px,py,pr+10+pulse*3,0,Math.PI*2);ctx2.strokeStyle='rgba(255,255,255,'+(0.35+pulse*0.25)+')';ctx2.lineWidth=1.5;ctx2.stroke();}
    // Saturn rings behind
    if(p.id==='saturn'){ctx2.save();ctx2.translate(px,py);ctx2.scale(1,0.3);ctx2.beginPath();ctx2.ellipse(0,0,pr+14,pr+14,0,0,Math.PI*2);ctx2.strokeStyle='rgba(228,209,145,0.22)';ctx2.lineWidth=7;ctx2.stroke();ctx2.restore();}
    // Planet sphere — use per-planet flat colour + simple shading
    ctx2.beginPath();ctx2.arc(px,py,pr,0,Math.PI*2);
    try{
      const sg=ctx2.createRadialGradient(px-pr*0.3,py-pr*0.3,pr*0.1,px,py,pr);
      if(p.id==='earth'){sg.addColorStop(0,'#6ab8e8');sg.addColorStop(1,'#0d3050');}
      else if(p.id==='mars'){sg.addColorStop(0,'#e0704a');sg.addColorStop(1,'#7a2000');}
      else if(p.id==='jupiter'){sg.addColorStop(0,'#deb878');sg.addColorStop(1,'#6a3a0e');}
      else if(p.id==='saturn'){sg.addColorStop(0,'#ece8b0');sg.addColorStop(1,'#9a8830');}
      else if(p.id==='venus'){sg.addColorStop(0,'#f0e0a0');sg.addColorStop(1,'#9a7820');}
      else if(p.id==='uranus'){sg.addColorStop(0,'#a8f0f0');sg.addColorStop(1,'#207878');}
      else if(p.id==='neptune'){sg.addColorStop(0,'#6080d8');sg.addColorStop(1,'#101858');}
      else if(p.id==='mercury'){sg.addColorStop(0,'#d0c8c0');sg.addColorStop(1,'#504840');}
      else{sg.addColorStop(0,p.css);sg.addColorStop(1,p.css+'88');}
      ctx2.fillStyle=sg;
    }catch(e){ ctx2.fillStyle=p.css; }
    ctx2.fill();
    // Jupiter bands
    if(p.id==='jupiter'&&pr>6){ctx2.save();ctx2.beginPath();ctx2.arc(px,py,pr,0,Math.PI*2);ctx2.clip();[[pr*0.22,'rgba(160,90,40,0.28)'],[pr*0.65,'rgba(140,80,30,0.28)']].forEach(([dy,col])=>{ctx2.fillStyle=col;ctx2.fillRect(px-pr,py-dy-pr*0.07,pr*2,pr*0.14);});ctx2.restore();}
    // Saturn rings front
    if(p.id==='saturn'){ctx2.save();ctx2.translate(px,py);ctx2.scale(1,0.3);ctx2.beginPath();ctx2.ellipse(0,0,pr+14,pr+14,0,0,Math.PI*2);ctx2.strokeStyle='rgba(228,209,145,0.5)';ctx2.lineWidth=3.5;ctx2.stroke();ctx2.restore();}
    // Specular
    ctx2.beginPath();ctx2.arc(px-pr*0.28,py-pr*0.28,pr*0.2,0,Math.PI*2);ctx2.fillStyle='rgba(255,255,255,0.18)';ctx2.fill();
    // Label
    ctx2.save();ctx2.font=(isSel?'bold ':'')+'8px "Space Mono",monospace';
    ctx2.shadowColor=isSel?p.css:'rgba(0,0,0,0.9)';ctx2.shadowBlur=isSel?8:6;
    ctx2.fillStyle=isSel?'#fff':p.css+'cc';ctx2.textAlign='left';ctx2.fillText(p.name,px+pr+5,py+3);ctx2.restore();
    // Store for tooltip
    p._px=px; p._py=py;
  });

  // Tooltip — technical data next to selected body (no name)
  const tt=document.getElementById('tooltip2d');
  const ttSel=sel&&(sel._px!==undefined);
  if(ttSel&&currentView==='2d'){
    const kep=KEPLERIAN[sel.id];
    // Convert world coords to screen coords: screen = world*zoom + (W/2+zx2d)
    const tpx=sel._px*zoom2d+(W/2+zx2d)+((sel.size2||4)*zoom2d)+10;
    const tpy=sel._py*zoom2d+(H/2+zy2d)-22;
    tt.style.left=Math.min(tpx,W-170)+'px'; tt.style.top=Math.max(tpy,60)+'px';
    tt.style.display='block'; tt.style.borderColor=(sel.css||'#4466ff')+'80';
    if(kep){
      const vv=(Math.sqrt(4*Math.PI*Math.PI*(2/kep.a-1/kep.a))*4.7404).toFixed(2);
      document.getElementById('tooltip-vel').textContent='~'+vv+' km/s';
      document.getElementById('tooltip-dist').textContent=(kep.a*149.6).toFixed(0)+' M km from Sun';
      document.getElementById('tooltip-pos').textContent='e='+kep.e.toFixed(3)+' · i='+kep.incl.toFixed(1)+'° · tilt='+kep.axial.toFixed(1)+'°';
    } else if(sel.au){
      document.getElementById('tooltip-vel').textContent=sel.orb||'';
      document.getElementById('tooltip-dist').textContent=sel.au||'';
      document.getElementById('tooltip-pos').textContent=sel.inc!=null?'i='+sel.inc.toFixed(2)+'°':'';
    }
  } else if(tt){ tt.style.display='none'; }

  ctx2.restore(); // close zoom transform
  // Bottom label in screen space
  ctx2.save();ctx2.font="8px 'Space Mono',monospace";ctx2.fillStyle='rgba(255,255,255,0.08)';ctx2.fillText('ECLIPTIC PLANE · TOP-DOWN · SCROLL TO ZOOM · DRAG TO PAN',22,H-10);ctx2.restore();
  }catch(err){console.error('draw2d error:',err);}
}

// Comet orbit ellipses 3D
function addCometOrbit3D(c){
  if(!c.Q)return;
  const a=(c.q+c.Q)/2,cc=(c.Q-c.q)/2,b=Math.sqrt(Math.max(0,a*a-cc*cc));
  const inc=c.inc*Math.PI/180;
  const pts=[];
  for(let i=0;i<=100;i++){
    const ang=i/100*Math.PI*2;
    const ex=Math.cos(ang)*a-cc;
    const ey=Math.sin(ang)*b;
    const xr=ex*Math.cos(c.rot)-ey*Math.sin(c.rot);
    const yr=ex*Math.sin(c.rot)+ey*Math.cos(c.rot);
    pts.push(new THREE.Vector3(xr, yr*Math.sin(inc), yr*Math.cos(inc)));
  }
  const mat=new THREE.LineBasicMaterial({color:parseInt(c.css.replace('#','0x')),transparent:true,opacity:0.2,depthWrite:false,blending:THREE.AdditiveBlending});
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
}

let arcLine=null;
function updateArc(){
  if(arcLine){scene.remove(arcLine);arcLine=null;}
  if(!sel||sel.id!=='mars')return;
  const ep=getPlanetPos(PLANETS[2],simT),mp=getPlanetPos(PLANETS[3],simT);
  const ev=new THREE.Vector3(ep.x3,ep.y3,ep.z3),mv=new THREE.Vector3(mp.x3,mp.y3,mp.z3);
  const mid=new THREE.Vector3().addVectors(ev,mv).multiplyScalar(0.5);
  const dir=new THREE.Vector3().subVectors(mv,ev);
  const perp=new THREE.Vector3(0,1,0).cross(dir).normalize().multiplyScalar(35);
  const ctrl=mid.clone().add(perp);
  const curve=new THREE.QuadraticBezierCurve3(ev,ctrl,mv);
  const geo=new THREE.BufferGeometry().setFromPoints(curve.getPoints(80));
  arcLine=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x4466ff,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(arcLine);
}

function draw3d(){
  PLANETS.forEach(p=>{
    const pos=getPlanetPos(p,simT),obj=pObjs[p.id];
    obj.g.position.set(pos.x3,pos.y3,pos.z3);
    obj.mesh.rotation.y+=0.005;
    orbitMats[p.id].opacity=sel?.id===p.id?0.22:0.06;
    const pulse=0.5+0.5*Math.sin(simT*6);
    obj.pulseMat.opacity=sel?.id===p.id?0.28+pulse*0.28:0;
    if(sel?.id===p.id){obj.pulse.scale.setScalar(1+pulse*0.15);obj.pulse.lookAt(camera.position);}
    obj.mat.emissiveIntensity=hoveredPlanet?.id===p.id?0.38:(sel?.id===p.id?0.2:0.1);
  });
  // Small bodies
  SMALL.forEach(s=>{
    const ang=s.a0+(2*Math.PI/s.period)*simT;
    const inc=s.inc*Math.PI/180;
    const x=Math.cos(ang)*s.orbitR,zf=Math.sin(ang)*s.orbitR;
    const m=smallMeshes3[s.id];
    if(m) m.position.set(x,zf*Math.sin(inc),zf*Math.cos(inc));
    // also update hit mesh (next in pMeshes — shared position)
    const hm=pMeshes.find(pm=>pm.userData.planet?.id===s.id);
    if(hm&&m) hm.position.copy(m.position);
  });
  // Update all 3D labels
  [...PLANETS,...SMALL].forEach(p=>{
    const lbl=planetLabels3D[p.id]; if(!lbl) return;
    let wp;
    if(pObjs[p.id]) wp=pObjs[p.id].g.position.clone().project(camera);
    else if(smallMeshes3[p.id]) wp=smallMeshes3[p.id].position.clone().project(camera);
    else return;
    if(wp.z>1){lbl.style.opacity='0';return;}
    lbl.style.left=((wp.x+1)/2*innerWidth)+'px';
    lbl.style.top=((-wp.y+1)/2*innerHeight)+'px';
    const isSel=sel?.id===p.id, isHov=hoveredPlanet?.id===p.id;
    lbl.style.opacity=isSel?'1':isHov?'0.9':'0.5';
    lbl.style.fontWeight=isSel?'700':'400';
    lbl.style.color=isSel?'#fff':(p.css||p.color||'#fff');
  });
  if(frame%8===0&&sel?.id==='mars')updateArc();
  renderer3.render(scene,camera);
}

const labelEl=document.getElementById('planet-label');
function updateLabel(cx,cy,planet){
  // Just hide the old name label — we use tooltip2d for data instead
  const labelEl=document.getElementById('planet-label');
  if(labelEl) labelEl.style.opacity='0';
  const tt=document.getElementById('tooltip2d');
  if(!planet){if(tt)tt.style.display='none';return;}
  if(tt){
    const kep=KEPLERIAN[planet.id];
    if(kep){
      const vv=(Math.sqrt(4*Math.PI*Math.PI*(2/kep.a-1/kep.a))*4.7404).toFixed(2);
      document.getElementById('tooltip-vel').textContent='~'+vv+' km/s orbital velocity';
      document.getElementById('tooltip-dist').textContent=(kep.a*149.6).toFixed(0)+' M km from Sun';
      document.getElementById('tooltip-pos').textContent='e='+kep.e.toFixed(3)+' · i='+kep.incl.toFixed(1)+'° · tilt='+kep.axial.toFixed(1)+'°';
      tt.style.left=Math.min(cx+18,window.innerWidth-160)+'px';
      tt.style.top=Math.max(cy-18,60)+'px';
      tt.style.display='block';
      tt.style.borderColor=(planet.css||'#4466ff')+'80';
    } else { tt.style.display='none'; }
  }
}

function lighten(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'#'+[Math.min(255,r+60),Math.min(255,g+60),Math.min(255,b+60)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'#'+[Math.max(0,r-60),Math.max(0,g-60),Math.max(0,b-60)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function renderSizeCanvas(sel){
  // Vertical layout — Jupiter fills most of the panel height
  const CNV_W=290, CNV_H=380;
  const cnv=document.createElement('canvas'); cnv.width=CNV_W; cnv.height=CNV_H;
  cnv.style.cssText='width:100%;height:auto;display:block;';
  const ctx=cnv.getContext('2d');
  ctx.fillStyle='#06061a'; ctx.fillRect(0,0,CNV_W,CNV_H);

  const sizes=[
    {id:'jupiter', n:'Jupiter',  r:69911, col:'#c88b3a', km:'69,911 km'},
    {id:'saturn',  n:'Saturn',   r:58232, col:'#e4d191', km:'58,232 km'},
    {id:'uranus',  n:'Uranus',   r:25362, col:'#7de8e8', km:'25,362 km'},
    {id:'neptune', n:'Neptune',  r:24622, col:'#4466bb', km:'24,622 km'},
    {id:'earth',   n:'Earth',    r:6371,  col:'#4b9cd3', km:'6,371 km'},
    {id:'venus',   n:'Venus',    r:6052,  col:'#e8cda0', km:'6,052 km'},
    {id:'mars',    n:'Mars',     r:3390,  col:'#c1440e', km:'3,390 km'},
    {id:'mercury', n:'Mercury',  r:2440,  col:'#c8c8c8', km:'2,440 km'},
    {id:'pluto',   n:'Pluto',    r:1188,  col:'#c8a060', km:'1,188 km'},
    {id:'ceres',   n:'Ceres',    r:476,   col:'#a09080', km:'476 km'},
  ];
  const maxR=69911;
  const maxVR=72; // Jupiter visual radius in px
  const scale=maxVR/maxR;

  let y=10;
  const LABEL_X=16, BAR_X=88, BAR_MAX=CNV_W-BAR_X-16;

  // Header
  ctx.font='6px "Space Mono",monospace'; ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.textAlign='left'; ctx.fillText('PLANET SIZE COMPARISON · TRUE RELATIVE RADII', LABEL_X, y+6);
  y+=18;

  sizes.forEach(s=>{
    const vr=Math.max(1.5, s.r*scale);
    const isThis=sel&&sel.id===s.id;
    const rowH=Math.max(vr*2+6, 18);
    const cy2=y+rowH/2;

    // Row highlight for selected
    if(isThis){
      ctx.fillStyle='rgba(68,102,255,0.08)';
      ctx.fillRect(0,y,CNV_W,rowH);
      ctx.strokeStyle='rgba(68,102,255,0.25)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CNV_W,y);ctx.stroke();
    }

    // Name label
    ctx.font=(isThis?'bold ':'')+`${Math.min(8,6+vr*0.05)}px "Space Mono",monospace`;
    ctx.fillStyle=isThis?'#fff':s.col+'cc';
    ctx.textAlign='left';
    ctx.fillText(s.n, LABEL_X, cy2+3);

    // Size bar
    const barW=Math.max(2,s.r/maxR*BAR_MAX);
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.fillRect(BAR_X,cy2-2.5,BAR_MAX,5);
    const bg=ctx.createLinearGradient(BAR_X,0,BAR_X+barW,0);
    bg.addColorStop(0,s.col+'cc'); bg.addColorStop(1,s.col+'44');
    ctx.fillStyle=bg;
    ctx.fillRect(BAR_X,cy2-2.5,barW,5);

    // Planet circle
    const circleX=BAR_X+barW+vr+4;
    if(circleX+vr<CNV_W-2){
      const g=ctx.createRadialGradient(circleX-vr*0.3,cy2-vr*0.3,vr*0.05,circleX,cy2,vr);
      g.addColorStop(0,s.col+'ee'); g.addColorStop(1,s.col+'44');
      ctx.beginPath();ctx.arc(circleX,cy2,vr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      if(isThis){ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;ctx.stroke();}
    }

    // km label right-aligned
    ctx.font=`6px "Space Mono",monospace`;
    ctx.fillStyle=isThis?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.2)';
    ctx.textAlign='right';
    ctx.fillText(s.km, CNV_W-4, cy2+3);

    y+=rowH+3;
    if(y>CNV_H-10) return;
  });

  // Source note
  ctx.font='5px "Space Mono",monospace'; ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.textAlign='left'; ctx.fillText('Source: IAU · NASA · radii are mean values', LABEL_X, CNV_H-4);
  return cnv;
}
window.switchPlanetTab = function(tab){

  renderPanel();

};

        </div>
      </div>
      ${kep.axial>5?`<div style="padding:9px 11px;background:rgba(255,200,80,0.05);border-left:3px solid #ffc850;border-radius:2px;margin-bottom:10px;">

// ── 3D hover tooltip ──────────────────────────────────────────
const ray3d=new THREE.Raycaster();
renderer3.domElement.addEventListener('mousemove',e=>{
  if(currentView!=='3d')return;
  const rect=renderer3.domElement.getBoundingClientRect();
  ray3d.setFromCamera(new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  ),camera);
  const hits=ray3d.intersectObjects(pMeshes.map?pMeshes:Object.values(pMeshes)).filter(h=>h.object.userData.planet);
  const tt=document.getElementById('tooltip2d');
  if(hits.length&&tt){
    const p=hits[0].object.userData.planet;
    const kep=KEPLERIAN[p.id];
    tt.style.left=Math.min(e.clientX+14,window.innerWidth-170)+'px';
    tt.style.top=Math.max(e.clientY-22,60)+'px';
    tt.style.display='block';
    tt.style.borderColor=(p.css||'#4466ff')+'80';
    if(kep){
      const vv=(Math.sqrt(4*Math.PI*Math.PI*(2/kep.a-1/kep.a))*4.7404).toFixed(2);
      document.getElementById('tooltip-vel').textContent='~'+vv+' km/s orbital velocity';
      document.getElementById('tooltip-dist').textContent=(kep.a*149.6).toFixed(0)+' M km from Sun';
      document.getElementById('tooltip-pos').textContent='e='+kep.e.toFixed(3)+' · i='+kep.incl.toFixed(1)+'° · tilt='+kep.axial.toFixed(1)+'°';
    } else if(p.au){
      document.getElementById('tooltip-vel').textContent=p.au;
      document.getElementById('tooltip-dist').textContent=p.orb||'';
      document.getElementById('tooltip-pos').textContent=p.inc!=null?'i='+p.inc.toFixed(2)+'°':'';
    }
  } else if(tt&&!isDrag){
    tt.style.display='none';
  }
});
renderer3.domElement.addEventListener('mouseleave',()=>{const tt=document.getElementById('tooltip2d');if(tt)tt.style.display='none';});

function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  simT+=dt*0.04*simSpeed;frame++;
  if(currentView==='2d')draw2d();
  else draw3d();
  if(frame%20===0){
    const yr=2026+Math.floor(simT),d=String(Math.floor((simT%1)*365)).padStart(3,'0');
    document.getElementById('sdate').textContent=`SIM DATE · ${yr}.${d}`;
  }
}
