<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orrery — Mission Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#04040c;width:100vw;height:100vh;overflow:hidden;font-family:'Space Mono',monospace;color:#fff;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:18px 22px 40px;}
  .card{background:rgba(10,10,20,0.97);border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;cursor:pointer;}
  .card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px);}
  .card.selected{border-color:rgba(68,102,255,0.7);box-shadow:0 0 20px rgba(68,102,255,0.2);}
  .pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:3px;font-size:7px;letter-spacing:2px;font-weight:700;}
  .filter-btn{padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.35);font-family:'Space Mono',monospace;transition:all 0.15s;}
  .filter-btn.active{background:rgba(68,102,255,0.25);border-color:rgba(68,102,255,0.5);color:#fff;}
  .filter-btn:hover:not(.active){border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);}
  .replay-btn{width:100%;padding:10px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;font-weight:700;cursor:pointer;border-radius:4px;transition:all 0.15s;}
  .replay-btn.flown{background:#1a33bb;border:1px solid rgba(68,102,255,0.6);color:#fff;}
  .replay-btn.flown:hover{background:#2244cc;}
  .replay-btn.planned{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);cursor:default;}
  .replay-btn.mine{background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.4);color:#4ecdc4;}
  .replay-btn.mine:hover{background:rgba(78,205,196,0.25);}
  .logo-main{width:52px;height:52px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .logo-collab{width:22px;height:22px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;letter-spacing:1px;}
  /* Preview panel */
  #preview{position:fixed;top:52px;right:0;bottom:0;width:360px;background:rgba(4,4,12,0.98);border-left:1px solid rgba(68,102,255,0.3);backdrop-filter:blur(18px);display:none;flex-direction:column;z-index:50;transition:transform 0.3s ease;transform:translateX(100%);}
  #preview.open{display:flex;transform:translateX(0);}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card{animation:fadeUp 0.25s ease both;}
  .section-label{grid-column:1/-1;padding:6px 0 4px;font-size:7px;letter-spacing:3px;color:rgba(255,255,255,0.22);border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:2px;}
</style>
</head>
<body>
<div style="height:100vh;display:flex;flex-direction:column;overflow:hidden;">

  <!-- NAV -->
  <div style="height:52px;background:rgba(4,4,12,0.97);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;z-index:60;position:relative;">

      <span style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;">ORRERY</span>

    </div>
    <div style="display:flex;gap:3px;align-items:center;"><a href="P06_moon-map.html" style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.28);text-decoration:none;border-radius:3px;border:1px solid transparent;transition:all 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.borderColor='rgba(255,255,255,0.12)'" onmouseout="this.style.color='rgba(255,255,255,0.28)';this.style.borderColor='transparent'">MOON</a><a href="P01_solar-system-explorer.html" style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.28);text-decoration:none;border-radius:3px;border:1px solid transparent;transition:all 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.borderColor='rgba(255,255,255,0.12)'" onmouseout="this.style.color='rgba(255,255,255,0.28)';this.style.borderColor='transparent'">EXPLORE</a><a href="P02_mission-configurator.html" style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.28);text-decoration:none;border-radius:3px;border:1px solid transparent;transition:all 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.borderColor='rgba(255,255,255,0.12)'" onmouseout="this.style.color='rgba(255,255,255,0.28)';this.style.borderColor='transparent'">PLAN</a><a href="P03_mission-arc.html" style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.28);text-decoration:none;border-radius:3px;border:1px solid transparent;transition:all 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.borderColor='rgba(255,255,255,0.12)'" onmouseout="this.style.color='rgba(255,255,255,0.28)';this.style.borderColor='transparent'">FLY</a><span style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:#fff;background:rgba(68,102,255,0.28);border:1px solid rgba(68,102,255,0.55);border-radius:3px;">MISSIONS</span><a href="P05_earth-orbit.html" style="padding:5px 12px;font-size:7px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.28);text-decoration:none;border-radius:3px;border:1px solid transparent;transition:all 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.85)';this.style.borderColor='rgba(255,255,255,0.12)'" onmouseout="this.style.color='rgba(255,255,255,0.28)';this.style.borderColor='transparent'">EARTH</a></div>
      <div style="padding:5px 13px;font-size:8px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,0.25);border-radius:3px;cursor:pointer;">FLY</div>
      <div style="padding:5px 13px;font-size:8px;letter-spacing:2px;font-weight:700;color:#fff;background:rgba(68,102,255,0.2);border:1px solid rgba(68,102,255,0.45);border-radius:3px;">MISSIONS</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:6px;height:6px;border-radius:50%;background:#4ecdc4;box-shadow:0 0 8px #4ecdc4;animation:pulse 2s infinite;"></div>
      <span style="font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:1px;">LIVE · TODAY</span>
    </div>
  </div>

  <!-- HEADER STATS -->
  <div style="background:rgba(4,4,12,0.92);border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 22px;display:flex;align-items:center;gap:0;flex-shrink:0;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;margin-right:22px;color:rgba(255,255,255,0.8);">MISSION LIBRARY</div>
    <div style="display:flex;gap:18px;margin-right:auto;">
      <div style="text-align:center;"><div style="font-size:15px;font-weight:700;">16</div><div style="font-size:6px;color:rgba(255,255,255,0.3);letter-spacing:1px;">TOTAL</div></div>
      <div style="width:1px;background:rgba(255,255,255,0.07);"></div>
      <div style="text-align:center;"><div style="font-size:15px;font-weight:700;color:#4ecdc4;">7</div><div style="font-size:6px;color:rgba(255,255,255,0.3);letter-spacing:1px;">ACTIVE</div></div>
      <div style="width:1px;background:rgba(255,255,255,0.07);"></div>
      <div style="text-align:center;"><div style="font-size:15px;font-weight:700;color:#7b9cff;">4</div><div style="font-size:6px;color:rgba(255,255,255,0.3);letter-spacing:1px;">PLANNED</div></div>
      <div style="width:1px;background:rgba(255,255,255,0.07);"></div>
      <div style="text-align:center;"><div style="font-size:15px;font-weight:700;color:#ff9966;">2</div><div style="font-size:6px;color:rgba(255,255,255,0.3);letter-spacing:1px;">PRIVATE</div></div>
      <div style="width:1px;background:rgba(255,255,255,0.07);"></div>
      <div style="text-align:center;"><div style="font-size:15px;font-weight:700;color:rgba(255,255,255,0.5);">8</div><div style="font-size:6px;color:rgba(255,255,255,0.3);letter-spacing:1px;">AGENCIES</div></div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.2);font-family:'Crimson Pro',serif;font-style:italic;">Mars has a ~50% mission success rate. Every attempt belongs here.</div>
  </div>

  <!-- FILTER BAR -->
  <div style="background:rgba(4,4,12,0.9);border-bottom:1px solid rgba(255,255,255,0.05);padding:9px 22px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;">
    <span style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.22);margin-right:2px;">DESTINATION</span>
    <button class="filter-btn active" data-group="dest" data-val="all" onclick="doFilter(this)">ALL</button>
    <button class="filter-btn" data-group="dest" data-val="MARS" onclick="doFilter(this)">🔴 MARS</button>
    <button class="filter-btn" data-group="dest" data-val="MOON" onclick="doFilter(this)">🌕 MOON</button>
    <div style="width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
    <span style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.22);margin-right:2px;">STATUS</span>
    <button class="filter-btn active" data-group="status" data-val="all" onclick="doFilter(this)">ALL</button>
    <button class="filter-btn" data-group="status" data-val="FLOWN" onclick="doFilter(this)">FLOWN</button>
    <button class="filter-btn" data-group="status" data-val="ACTIVE" onclick="doFilter(this)">ACTIVE</button>
    <button class="filter-btn" data-group="status" data-val="PLANNED" onclick="doFilter(this)">PLANNED</button>
    <button class="filter-btn" data-group="status" data-val="MINE" onclick="doFilter(this)">MINE</button>
    <div style="width:1px;height:16px;background:rgba(255,255,255,0.07);margin:0 4px;"></div>
    <span style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.22);margin-right:2px;">AGENCY</span>
    <button class="filter-btn active" data-group="agency" data-val="all" onclick="doFilter(this)">ALL</button>
    <button class="filter-btn" data-group="agency" data-val="NASA" onclick="doFilter(this)">NASA</button>
    <button class="filter-btn" data-group="agency" data-val="ESA" onclick="doFilter(this)">ESA</button>
    <button class="filter-btn" data-group="agency" data-val="CNSA" onclick="doFilter(this)">CNSA</button>
    <button class="filter-btn" data-group="agency" data-val="ISRO" onclick="doFilter(this)">ISRO</button>
    <button class="filter-btn" data-group="agency" data-val="ROSCOSMOS" onclick="doFilter(this)">ROSCOSMOS</button>
    <button class="filter-btn" data-group="agency" data-val="UAE" onclick="doFilter(this)">UAE</button>
    <button class="filter-btn" data-group="agency" data-val="JAXA" onclick="doFilter(this)">JAXA</button>
    <button class="filter-btn" data-group="agency" data-val="SpaceX" onclick="doFilter(this)" style="color:rgba(255,200,100,0.6);border-color:rgba(255,200,100,0.2);">⚡ SpaceX</button>

  <!-- MAIN: grid + preview panel -->
  <div style="flex:1;display:flex;overflow:hidden;position:relative;">
    <div id="scroll-area" style="flex:1;overflow-y:auto;transition:margin-right 0.3s;">
      <div id="grid"></div>
    </div>

    <!-- PREVIEW PANEL -->
    <div id="preview">
      <div id="prev-header" style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div id="prev-agency-row" style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"></div>
            <div id="prev-name" style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;"></div>
            <div id="prev-meta" style="font-size:8px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:1px;"></div>
          </div>
          <div onclick="closePreview()" style="width:26px;height:26px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:14px;flex-shrink:0;">×</div>

      </div>

      <!-- Tabs -->

        <button class="prev-tab active" id="tab-overview" onclick="switchTab('overview')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid #4466ff;color:#fff;cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">OVERVIEW</button>
        <button class="prev-tab" id="tab-gallery" onclick="switchTab('gallery')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.35);cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">GALLERY</button>
        <button class="prev-tab" id="tab-learn" onclick="switchTab('learn')" style="padding:8px 14px;font-size:7px;letter-spacing:2px;font-weight:700;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.35);cursor:pointer;font-family:'Space Mono',monospace;margin-bottom:-1px;">LEARN</button>

        <div id="prev-credit" style="font-size:7px;color:rgba(255,255,255,0.18);text-align:center;letter-spacing:1px;line-height:1.6;"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// AGENCY LOGOS — real logos via Wikimedia Commons
//
// TRADEMARK NOTICE: logos used for identification/attribution only (nominative use).
// Real img loads on top of always-visible text fallback. Never breaks.
const LOGOS = {
  NASA:      {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/NASA_logo.svg/200px-NASA_logo.svg.png",      bg:"#0B3D91",              color:"#fff",     abbr:"NASA"},
  ESA:       {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/ESA_logo_simple.svg/200px-ESA_logo_simple.svg.png", bg:"#1C3C8A",    color:"#FFD700",  abbr:"ESA"},
  CNSA:      {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/CNSA_logo.svg/200px-CNSA_logo.svg.png",      bg:"#DE2910",              color:"#FFDE00",  abbr:"CNSA"},
  ISRO:      {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Indian_Space_Research_Organisation_Logo.svg/200px-Indian_Space_Research_Organisation_Logo.svg.png", bg:"#1a1a2e", color:"#FF6B00", abbr:"ISRO"},
  ROSCOSMOS: {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Roscosmos_logo_en.svg/200px-Roscosmos_logo_en.svg.png", bg:"#0d0d1a", color:"#fff",     abbr:"RSC"},
  UAE:       {img:"https://upload.wikimedia.org/wikipedia/en/thumb/e/e0/Mohammed_Bin_Rashid_Space_Centre_Logo.png/200px-Mohammed_Bin_Rashid_Space_Centre_Logo.png", bg:"#fff", color:"#00732F", abbr:"MBRSC"},
  JAXA:      {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/JAXA_logo_2020.svg/200px-JAXA_logo_2020.svg.png",  bg:"#0062AC",             color:"#fff",     abbr:"JAXA"},
  SpaceX:    {img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/SpaceX-Logo.svg/200px-SpaceX-Logo.svg.png",   bg:"#000",                 color:"#fff",     abbr:"SpX"},
  YOU:       {img:null,  bg:"rgba(78,205,196,0.08)", color:"#4ecdc4", abbr:"YOU"},
};

function logoHTML(agency, w=52, h=52, r=8) {
  const l = LOGOS[agency] || {bg:"#1a1a2e", color:"rgba(255,255,255,0.4)", abbr:agency.slice(0,4), img:null};
  const fs = w>40 ? (l.abbr.length>3?9:11) : (l.abbr.length>3?6:7);
  return `<div style="position:relative;width:${w}px;height:${h}px;border-radius:${r}px;background:${l.bg};overflow:hidden;flex-shrink:0;">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:${fs}px;font-weight:700;letter-spacing:1px;color:${l.color};">${l.abbr}</div>
    ${l.img?`<img src="${l.img}" alt="${agency}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:${w>40?'5px':'3px'};">`:''}
  </div>`;
}

// Collaborator abbreviations for secondary display
const COLLAB_LOGOS = {
  NASA:{bg:"#0B3D91",text:"NASA"}, ESA:{bg:"#1C3C8A",text:"ESA"},
  JPL:{bg:"#0B3D91",text:"JPL"}, CNES:{bg:"#003189",text:"CNES"},
  DLR:{bg:"#1C3C8A",text:"DLR"}, ASI:{bg:"#006699",text:"ASI"},
  JAXA:{bg:"#0062AC",text:"JAXA"}, CSA:{bg:"#FF0000",text:"CSA"},
};

// ═══════════════════════════════════════════════════════════════
// MISSION DATA
// ═══════════════════════════════════════════════════════════════
// j2000: days from Jan 1.5 2000 — used for orbital position computation
const MISSIONS = [
  { id:"orrery-1",  name:"ORRERY-1",       agency:"YOU",       sector:"mine",  dest:"MOON",  color:"#4ecdc4",
    year:2026,  type:"CARGO · ORBITER",   status:"MINE",    dep:"Dec 1, 2026",  arr:"Aug 17, 2027", tof:259, j2000:9465,
    vehicle:"Falcon Heavy",  dv:"5.82 km/s", payload:"2,500 kg",
    collabs:[],
    first:null,
    description:"Your mission. Planned via the Orrery configurator. 2026 Hohmann window, 259-day transit.",
    data_quality:"perfect", credit:"Your mission data" },

  { id:"mariner-4", name:"Mariner 4",       agency:"NASA",      sector:"gov",   dest:"MARS",  color:"#0B3D91",
    year:1964,  type:"FLYBY",             status:"FLOWN",   dep:"Nov 28, 1964", arr:"Jul 15, 1965", tof:228, j2000:-12820,
    vehicle:"Atlas-Agena D", dv:"~5.9 km/s", payload:"261 kg",
    collabs:[],
    first:"First images of another planet's surface",
    description:"21 grainy frames that ended the dream of Martian canals and civilisations. A cold, cratered, airless world — but ours to explore.",
    data_quality:"good", credit:"© NASA — U.S. Government work, public domain" },

  { id:"mars-3",    name:"Mars 3",          agency:"ROSCOSMOS", sector:"gov",   dest:"MARS",  color:"#003087",
    year:1971,  type:"ORBITER + LANDER",  status:"FLOWN",   dep:"May 28, 1971", arr:"Dec 2, 1971",  tof:188, j2000:-10445,
    vehicle:"Proton-K / D",  dv:"~5.5 km/s", payload:"1,210 kg",
    collabs:[],
    first:"First soft landing on Mars · 14.5 seconds of transmission",
    description:"Landed. Transmitted for 14.5 seconds. Then silence, forever. A single unreadable frame is all that remains. The silence is the story.",
    data_quality:"reconstructed",
    data_note:"Orbital elements reconstructed from published specs. No usable surface imagery. TASS archive photos used for team credit.",
    credit:"© Soviet Space Program / Roscosmos — Historical archive" },

  { id:"viking-1",  name:"Viking 1",        agency:"NASA",      sector:"gov",   dest:"MARS",  color:"#0B3D91",
    year:1975,  type:"ORBITER + LANDER",  status:"FLOWN",   dep:"Aug 20, 1975", arr:"Jun 19, 1976", tof:303, j2000:-8899,
    vehicle:"Titan IIIE-Centaur", dv:"~5.7 km/s", payload:"883 kg lander",
    collabs:[],
    first:"First successful Mars landing",

// ═══════════════════════════════════════════════════════════════
// ORBITAL MECHANICS (for 2D trajectory preview)
// ═══════════════════════════════════════════════════════════════
const MU=4*Math.PI*Math.PI;
const EARTH_L0=1.753, EARTH_W=2*Math.PI/365.25; // rad, rad/day (J2000)
const MARS_L0=6.203,  MARS_W=2*Math.PI/686.97;
const R_EARTH=1.0, R_MARS=1.524;

function getPlanetPos2D(L0, omega, j2000_day) {
  const ang = L0 + omega * j2000_day;
  const r = (L0===EARTH_L0)?R_EARTH:R_MARS;
  return {x:Math.cos(ang)*r, y:Math.sin(ang)*r};
}

function drawTrajectory(m) {
  const canvas=document.getElementById('prev-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2;
  const scale=Math.min(W,H)*0.35;

  ctx.fillStyle='#06060f'; ctx.fillRect(0,0,W,H);

  // Moon missions — draw Earth-Moon diagram (not solar-system scale)
  if(m.dest==='MOON'){
    ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);
    // Earth
    const ex=W*0.22,ey=H/2;
    const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,22);
    eg.addColorStop(0,'#4b9cd3');eg.addColorStop(0.5,'#1a6a9a');eg.addColorStop(1,'rgba(0,30,60,0)');
    ctx.beginPath();ctx.arc(ex,ey,22,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
    ctx.beginPath();ctx.arc(ex,ey,12,0,Math.PI*2);ctx.fillStyle='#4b9cd3';ctx.fill();
    ctx.font="8px 'Space Mono',monospace";ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='center';
    ctx.fillText('EARTH',ex,ey+28);
    // Moon
    const mx2=W*0.78,my2=H/2;
    const mg=ctx.createRadialGradient(mx2,my2,0,mx2,my2,18);
    mg.addColorStop(0,'#aaa');mg.addColorStop(0.5,'#666');mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(mx2,my2,18,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
    ctx.beginPath();ctx.arc(mx2,my2,10,0,Math.PI*2);ctx.fillStyle='#999';ctx.fill();
    ctx.fillText('MOON',mx2,my2+28);
    // Arc
    const cpx=W/2,cpy=H/2-40;
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.quadraticCurveTo(cpx,cpy,mx2,my2);
    ctx.strokeStyle='rgba(68,102,255,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    // Arrow
    const adx=mx2-cpx,ady=my2-cpy,al=Math.sqrt(adx*adx+ady*ady)||1;
    const ax=mx2,ay=my2,ux=adx/al,uy=ady/al;
    ctx.beginPath();ctx.moveTo(ax-ux*10-uy*4,ay-uy*10+ux*4);ctx.lineTo(ax,ay);ctx.lineTo(ax-ux*10+uy*4,ay-uy*10-ux*4);
    ctx.strokeStyle='rgba(68,102,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    // Labels
    ctx.fillStyle='rgba(68,102,255,0.7)';ctx.font="7px 'Space Mono',monospace";ctx.textAlign='center';
    ctx.fillText('EARTH → MOON · '+( m.tof ? m.tof+'d TRANSIT' : 'TRANSIT TIME VARIES' ),W/2,H-10);
    document.getElementById('prev-canvas-label').textContent='Earth–Moon transfer · not to scale with solar system view';
    return;
  }
  if(!m.j2000) {
    // Planned Mars mission — show schematic
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.font="9px 'Space Mono',monospace";
    ctx.textAlign='center';
    ctx.fillText('TRAJECTORY TBD', W/2, H/2-8);
    ctx.fillText('2026 WINDOW ESTIMATED', W/2, H/2+8);
    document.getElementById('prev-canvas-label').textContent='Planned mission · trajectory estimated';
    return;
  }

  const dep=m.j2000, arr=m.j2000+m.tof;
  const earthDep=getPlanetPos2D(EARTH_L0,EARTH_W,dep);
  const marsArr =getPlanetPos2D(MARS_L0, MARS_W, arr);
  const marsDep =getPlanetPos2D(MARS_L0, MARS_W, dep);

  // Orbit rings
  [[R_EARTH,'rgba(75,156,211,0.2)'],[R_MARS,'rgba(193,68,14,0.2)']].forEach(([r,c])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r*scale,0,Math.PI*2);
    ctx.strokeStyle=c; ctx.lineWidth=0.8; ctx.stroke();
  });

  // Bezier transfer arc
  const midX=(cx+earthDep.x*scale+cx+marsArr.x*scale)/2;
  const midY=(cy+earthDep.y*scale+cy+marsArr.y*scale)/2;
  const dx=(marsArr.x-earthDep.x), dy=(marsArr.y-earthDep.y);
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const cpX=midX-(-dy/len)*scale*0.28, cpY=midY-(dx/len)*scale*0.28;
  ctx.beginPath();
  ctx.moveTo(cx+earthDep.x*scale, cy+earthDep.y*scale);
  ctx.quadraticCurveTo(cpX,cpY, cx+marsArr.x*scale, cy+marsArr.y*scale);
  ctx.strokeStyle='rgba(68,102,255,0.65)'; ctx.lineWidth=1.5;
  ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);

  // Arrow tip
  const tdx=marsArr.x*scale-cpX+cx, tdy=marsArr.y*scale-cpY+cy;
  const tl=Math.sqrt(tdx*tdx+tdy*tdy)||1;
  const ux=tdx/tl, uy=tdy/tl;
  const ax=cx+marsArr.x*scale, ay=cy+marsArr.y*scale;
  ctx.beginPath(); ctx.moveTo(ax-ux*8-uy*4,ay-uy*8+ux*4); ctx.lineTo(ax,ay); ctx.lineTo(ax-ux*8+uy*4,ay-uy*8-ux*4);
  ctx.strokeStyle='rgba(68,102,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();

  // Sun
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,16);
  sg.addColorStop(0,'#fff8e7'); sg.addColorStop(0.5,'#ffe060'); sg.addColorStop(1,'rgba(255,140,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,16,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();

  // Earth at departure
  const ex=cx+earthDep.x*scale, ey=cy+earthDep.y*scale;
  ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2); ctx.fillStyle='#4b9cd3'; ctx.fill();
  ctx.font="bold 8px 'Space Mono'"; ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.textAlign='center';
  ctx.fillText('DEP',ex,ey-9);

  // Mars at arrival
  const max=cx+marsArr.x*scale, may=cy+marsArr.y*scale;
  ctx.beginPath(); ctx.arc(max,may,4,0,Math.PI*2); ctx.fillStyle='#c1440e'; ctx.fill();
  ctx.fillText('ARR',max,may-8);

  // Mars at departure (ghost)
  const mdx=cx+marsDep.x*scale, mdy=cy+marsDep.y*scale;
  ctx.beginPath(); ctx.arc(mdx,mdy,4,0,Math.PI*2);
  ctx.strokeStyle='rgba(193,68,14,0.35)'; ctx.lineWidth=1; ctx.stroke();

  // Transit label
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font="7px 'Space Mono'"; ctx.textAlign='left';
  ctx.fillText(m.tof+'d transit · '+m.dep, 8, H-8);

  document.getElementById('prev-canvas-label').textContent=
    `Earth (blue) → Mars (red) · ${m.tof} day transfer · ${m.year}`;
}

let fStatus='all', fAgency='all', fDest='all', selectedId=null;

function doFilter(btn){
  const g=btn.dataset.group, v=btn.dataset.val;
  document.querySelectorAll(`.filter-btn[data-group="${g}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(g==='status') fStatus=v;
  else if(g==='dest') fDest=v;
  else fAgency=v;
  closePreview(); render();
}

function statusPill(s){
  const map={ACTIVE:['rgba(78,205,196,0.15)','#4ecdc4','rgba(78,205,196,0.3)','● ACTIVE'],
             FLOWN: ['rgba(255,255,255,0.06)','rgba(255,255,255,0.45)','rgba(255,255,255,0.12)','FLOWN'],
             PLANNED:['rgba(123,156,255,0.1)','#7b9cff','rgba(123,156,255,0.3)','◌ PLANNED'],
             MINE:  ['rgba(78,205,196,0.1)','#4ecdc4','rgba(78,205,196,0.25)','★ MINE']};
  const [bg,col,brd,label]=map[s]||['transparent','#fff','rgba(255,255,255,0.1)',s];
  return `<div class="pill" style="background:${bg};color:${col};border:1px solid ${brd};">${label}</div>`;
}
function qualityBadge(q,note){
  if(q==='reconstructed') return `<div class="pill" style="background:rgba(240,80,40,0.1);color:#ff8060;border:1px solid rgba(240,80,40,0.3);margin-top:5px;" title="${note||''}">◈ RECONSTRUCTED</div>`;
  if(q==='partial')       return `<div class="pill" style="background:rgba(240,180,40,0.1);color:#f0b428;border:1px solid rgba(240,180,40,0.3);margin-top:5px;" title="${note||''}">⚠ PARTIAL DATA</div>`;
  if(q==='planned')       return `<div class="pill" style="background:rgba(123,156,255,0.08);color:#7b9cff;border:1px solid rgba(123,156,255,0.2);margin-top:5px;">◌ PLANNED</div>`;
  return '';
}

        ${collabRow}
        ${qualityBadge(m.data_quality, m.data_note)}
      </div>
    </div>

    <!-- Stats strip -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);">

    </div>

    <!-- Description -->

function selectMission(id){
  if(selectedId===id){ closePreview(); return; }
  selectedId=id;
  const m=MISSIONS.find(x=>x.id===id);
  const panel=document.getElementById('preview');

  // Agency row
  document.getElementById('prev-agency-row').innerHTML=
    `${logoHTML(m.agency, 36, 36, 6)}
     <div><div style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.3);">${m.agency}</div>
     <div style="font-size:8px;color:rgba(255,255,255,0.6);letter-spacing:1px;">${m.year}</div></div>
     ${m.sector==='private'?`<div class="pill" style="background:rgba(255,153,0,0.12);color:#ff9940;border:1px solid rgba(255,153,0,0.25);margin-left:4px;">⚡ PRIVATE</div>`:statusPill(m.status)}`;
  document.getElementById('prev-name').textContent=m.name;
  document.getElementById('prev-meta').textContent=`${m.type} · ${m.vehicle||'Vehicle TBD'}`;

  // Reset tabs to OVERVIEW
  currentMission=m; activeTab='overview';
  document.querySelectorAll('.prev-tab').forEach(b=>{const a=b.id==='tab-overview';b.style.borderBottomColor=a?'#4466ff':'transparent';b.style.color=a?'#fff':'rgba(255,255,255,0.35)';});

  // Credit
  document.getElementById('prev-credit').innerHTML=`<div style="font-size:7px;color:rgba(255,255,255,0.18);text-align:center;letter-spacing:1px;line-height:1.6;">${m.credit||m.agency}</div><div style="font-size:6px;color:rgba(255,255,255,0.1);margin-top:2px;text-align:center;">Logos are trademarks of their agencies · educational identification only</div>`;

  // Fly button
  const flyBtn=document.getElementById('prev-fly-btn');
  if(m.status==='PLANNED'){ flyBtn.textContent='◌ TRAJECTORY TBD'; flyBtn.style.background='rgba(255,255,255,0.04)'; flyBtn.style.borderColor='rgba(255,255,255,0.1)'; flyBtn.style.color='rgba(255,255,255,0.3)'; flyBtn.style.cursor='default'; }
  else if(m.sector==='mine'){ flyBtn.textContent='▶ REPLAY MY MISSION'; flyBtn.style.background='rgba(78,205,196,0.2)'; flyBtn.style.borderColor='rgba(78,205,196,0.4)'; flyBtn.style.color='#4ecdc4'; flyBtn.style.cursor='pointer'; }
  else { flyBtn.textContent='▶ FLY THIS MISSION'; flyBtn.style.background='#1a33bb'; flyBtn.style.borderColor='rgba(68,102,255,0.6)'; flyBtn.style.color='#fff'; flyBtn.style.cursor='pointer'; }

  // Draw trajectory + render overview
  drawTrajectory(m);
  renderOverview(m);

  // Open panel + shift scroll area
  panel.classList.add('open');
  document.getElementById('scroll-area').style.marginRight='360px';

  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  render();
}

function closePreview(){
  selectedId=null;
  document.getElementById('preview').classList.remove('open');
  document.getElementById('scroll-area').style.marginRight='0';
  render();
}
window.closePreview=closePreview;

// RENDER GRID
// ═══════════════════════════════════════════════════════════════
function render(){
  const filtered=MISSIONS.filter(m=>{
    const sOk=fStatus==='all'||(fStatus==='MINE'&&m.sector==='mine')||(fStatus!=='MINE'&&m.status===fStatus);
    const aOk=fAgency==='all'||(fAgency==='PRIVATE'&&m.sector==='private')||m.agency===fAgency;
    const dOk=fDest==='all'||m.dest===fDest;
    return sOk&&aOk&&dOk;
  });
  const mine=filtered.filter(m=>m.sector==='mine');
  const active=filtered.filter(m=>m.status==='ACTIVE');
  const planned=filtered.filter(m=>m.status==='PLANNED');
  const flown=filtered.filter(m=>m.status==='FLOWN');
  let html='',delay=0;
  if(mine.length){html+=`<div class="section-label">YOUR MISSIONS</div>`;mine.forEach(m=>{html+=cardHTML(m,delay);delay+=35;});}
  if(active.length){const destLabel=fDest==='MOON'?'MOON · CURRENTLY ACTIVE':fDest==='MARS'?'MARS · CURRENTLY ACTIVE':'CURRENTLY ACTIVE — MARS & MOON';html+=`<div class="section-label">${destLabel}</div>`;active.forEach(m=>{html+=cardHTML(m,delay);delay+=35;});}
  if(planned.length){html+=`<div class="section-label">PLANNED & UPCOMING · PRIVATE SECTOR INCLUDED</div>`;planned.forEach(m=>{html+=cardHTML(m,delay);delay+=35;});}
  if(flown.length){const archLabel=fDest==='MOON'?'MOON · MISSION ARCHIVE':fDest==='MARS'?'MARS · MISSION ARCHIVE':'MISSION ARCHIVE — PATH TO MARS';html+=`<div class="section-label">${archLabel}</div>`;flown.forEach(m=>{html+=cardHTML(m,delay);delay+=35;});}
  if(!filtered.length) html=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.15);font-size:9px;letter-spacing:2px;">NO MISSIONS MATCH THIS FILTER</div>`;
  document.getElementById('grid').innerHTML=html;
}

let activeTab='overview'; let currentMission=null;

window.switchTab=tab=>{
  activeTab=tab;
  document.querySelectorAll('.prev-tab').forEach(b=>{const a=b.id==='tab-'+tab;b.style.borderBottomColor=a?'#4466ff':'transparent';b.style.color=a?'#fff':'rgba(255,255,255,0.35)';});

function renderLearn(m){
  const el=document.getElementById('prev-stats');
  if(!m.links||!m.links.length){el.innerHTML=`<div style="padding:24px 20px;text-align:center;"><div style="font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:8px;">LINKS COMING IN OR-03</div><p style="font-size:10px;color:rgba(255,255,255,0.15);font-family:'Crimson Pro',serif;font-style:italic;line-height:1.6;">Each mission will have curated INTRO / CORE / DEEP reading lists when the data catalog is built.</p></div>`;return;}
  const tc={};Object.keys(TIER).forEach(t=>{tc[t]=(m.links||[]).filter(l=>l.t===t).length;});
  const badges=Object.entries(TIER).filter(([t])=>tc[t]>0).map(([t,v])=>`<div style="font-size:7px;padding:2px 6px;background:${v.bg};color:${v.color};border-radius:2px;border:1px solid ${v.color}33;">${v.label} ${tc[t]}</div>`).join('');
  const links=Object.entries(TIER).map(([tk,tv])=>{const ls=(m.links||[]).filter(l=>l.t===tk);if(!ls.length)return'';return`<div style="margin-bottom:14px;"><div style="font-size:7px;letter-spacing:2px;color:${tv.color};margin-bottom:6px;display:flex;align-items:center;gap:6px;"><div style="flex:1;height:1px;background:${tv.dot}33;"></div>${tv.label}<div style="flex:1;height:1px;background:${tv.dot}33;"></div></div>${ls.map(lk=>`<a href="${lk.u}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;text-decoration:none;margin-bottom:3px;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'"><div style="width:5px;height:5px;border-radius:50%;background:${tv.dot};flex-shrink:0;"></div><span style="font-size:10px;color:rgba(255,255,255,0.68);flex:1;line-height:1.45;font-family:'Space Mono',monospace;">${lk.l}</span><span style="font-size:9px;color:rgba(255,255,255,0.2);">↗</span></a>`).join('')}</div>`;}).join('');
  el.innerHTML=`<div style="padding:14px 20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div style="font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.25);">KNOWLEDGE BASE</div><div style="display:flex;gap:4px;">${badges}</div></div><div style="display:flex;gap:8px;margin-bottom:12px;padding:7px 10px;background:rgba(255,255,255,0.02);border-radius:4px;">${Object.entries(TIER).map(([t,v])=>`<div style="display:flex;align-items:center;gap:4px;"><div style="width:5px;height:5px;border-radius:50%;background:${v.dot};"></div><span style="font-size:7px;color:${v.color};">${v.label}</span></div>`).join('')}</div>${links}</div>`;
}

render();
