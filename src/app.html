<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#04040c" />
    <title>Orrery</title>

    <!-- PWA manifest (v0.1.10 / Theme C.C1 / issue #18). Manifest-only
         install support; no service worker yet — offline-first
         behaviour already comes from the static-deploy + browser cache. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="logos/nasa.svg" type="image/svg+xml" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
