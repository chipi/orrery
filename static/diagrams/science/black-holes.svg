<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" role="img" aria-label="A black hole diagram — event horizon at radius r_s, photon sphere at 1.5 r_s, accretion disc surrounding it, and the shadow that an interferometer like the Event Horizon Telescope images.">
  <style>
    .stroke-soft { stroke: rgba(255,255,255,0.18); stroke-width: 0.8; fill: none; }
    .stroke-mid { stroke: rgba(255,255,255,0.4); stroke-width: 1; fill: none; }
    .stroke-bright { stroke: rgba(255,255,255,0.75); stroke-width: 1.2; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .gold { stroke: #ffc850; stroke-width: 1.6; fill: none; }
    .red { stroke: #ff6b6b; stroke-width: 1.6; fill: none; }
    .horizon { fill: #04040c; stroke: rgba(255,255,255,0.75); stroke-width: 1.2; }
    .photon-sphere { fill: none; stroke: #ffc850; stroke-width: 1.4; stroke-dasharray: 4 3; }
    .disc-near { fill: rgba(255,200,80,0.35); stroke: #ffc850; stroke-width: 1; }
    .disc-far { fill: rgba(255,107,107,0.25); stroke: #ff6b6b; stroke-width: 1; }
    .shadow { fill: rgba(0,0,0,0.0); stroke: rgba(78,205,196,0.7); stroke-width: 1.5; stroke-dasharray: 6 4; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 7.5px; letter-spacing: 1px; }
    .star { fill: rgba(255,255,255,0.45); }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <!-- Sparse starfield background -->
  <circle class="dim-star" cx="40" cy="36" r="0.7" />
  <circle class="dim-star" cx="110" cy="50" r="0.5" />
  <circle class="star" cx="180" cy="22" r="0.7" />
  <circle class="dim-star" cx="430" cy="40" r="0.6" />
  <circle class="dim-star" cx="510" cy="56" r="0.5" />
  <circle class="star" cx="560" cy="32" r="0.6" />
  <circle class="dim-star" cx="60" cy="110" r="0.5" />
  <circle class="dim-star" cx="540" cy="200" r="0.5" />
  <circle class="star" cx="570" cy="160" r="0.7" />

  <!-- Accretion disc — flattened ellipse, far side dimmer (red-shifted) -->
  <!-- Far half (behind horizon from viewer) -->
  <path class="disc-far" d="M 130 130 a 130 32 0 0 1 260 0 L 380 130 a 120 28 0 0 0 -240 0 Z" />
  <!-- Near half (in front of horizon) — slightly brighter -->
  <path class="disc-near" d="M 130 130 a 130 32 0 0 0 260 0 L 380 130 a 120 28 0 0 1 -240 0 Z" />

  <!-- Photon sphere (dashed ring at 1.5 r_s) -->
  <circle class="photon-sphere" cx="260" cy="130" r="76" />

  <!-- Event horizon (solid black circle, white outline = r_s) -->
  <circle class="horizon" cx="260" cy="130" r="50" />

  <!-- Shadow ring (what EHT images — slightly larger than horizon) -->
  <circle class="shadow" cx="260" cy="130" r="64" />

  <!-- Labels with leader lines -->
  <!-- Event horizon -->
  <line class="stroke-mid" x1="260" y1="130" x2="260" y2="58" />
  <text class="label" x="260" y="50" text-anchor="middle">EVENT HORIZON · r_s</text>
  <text class="sublabel" x="260" y="62" text-anchor="middle">r_s = 2GM / c²</text>

  <!-- Photon sphere -->
  <line class="stroke-mid" x1="336" y1="130" x2="396" y2="220" />
  <text class="label" x="402" y="222">PHOTON SPHERE · 1.5 r_s</text>
  <text class="sublabel" x="402" y="234">light orbits indefinitely</text>

  <!-- Shadow (what EHT sees) -->
  <line class="stroke-mid" x1="196" y1="130" x2="120" y2="40" />
  <text class="label" x="116" y="38" text-anchor="end">EHT SHADOW · ~2.6 r_s</text>
  <text class="sublabel" x="116" y="50" text-anchor="end">M87 · Sgr A* imaged here</text>

  <!-- Accretion disc -->
  <line class="stroke-mid" x1="386" y1="118" x2="486" y2="78" />
  <text class="label" x="490" y="80">ACCRETION DISC</text>
  <text class="sublabel" x="490" y="92">10⁶ K · X-ray glow (Chandra)</text>

  <!-- r_s scale callout at bottom -->
  <g transform="translate(40,222)">
    <text class="sublabel" x="0" y="0">SUN r_s = 3 km</text>
    <text class="sublabel" x="0" y="12">EARTH r_s = 9 mm</text>
    <text class="sublabel" x="0" y="24">M87* r_s = 1.8 × 10¹⁰ km</text>
  </g>
</svg>
