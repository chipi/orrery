<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Earth at the focus of a hyperbolic escape trajectory with V-infinity along the asymptote and C3 = V-infinity squared.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .earth { fill: rgba(75,156,211,0.25); stroke: rgba(75,156,211,0.85); stroke-width: 1.5; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .arrow { fill: rgba(255,255,255,0.85); }
  </style>
  <text class="lbl" x="20" y="22">C3 — characteristic energy at launch</text>
  <circle class="earth" cx="100" cy="150" r="14" />
  <text class="tick" x="93" y="153" text-anchor="middle" fill="rgba(255,255,255,0.85)">E</text>
  <path class="accent" d="M 100 150 Q 180 100 380 50" />
  <path class="dashed" d="M 100 150 L 380 50" />
  <line class="stroke" x1="320" y1="68" x2="345" y2="56" />
  <polygon class="arrow" points="345,56 339,57 343,63" />
  <text class="tick" x="320" y="50" fill="#4ecdc4">V∞ along asymptote</text>
  <text class="tick" x="180" y="88" fill="#4ecdc4">hyperbolic escape</text>
  <text class="lbl" x="40" y="210">C3 = V∞²  (km²/s²)</text>
  <text class="tick" x="40" y="226">Mars: ~10  ·  Jupiter: ~80  ·  Pluto (New Horizons): 158</text>
</svg>
