<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="The four conic sections — circle, ellipse, parabola, hyperbola — all sharing a common focus, parameterised by eccentricity e from 0 to greater than 1.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .circle { stroke: rgba(255,255,255,0.85); stroke-width: 1.6; fill: none; }
    .ellipse { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .parabola { stroke: #ffc850; stroke-width: 1.8; fill: none; }
    .hyperbola { stroke: #ff6b6b; stroke-width: 1.8; fill: none; }
    .focus { fill: #ffffff; stroke: #ffffff; stroke-width: 1; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">CONIC SECTIONS — ECCENTRICITY DECIDES BOUND vs ESCAPE vs FLYBY</text>

  <!-- Common focus at centre -->
  <circle class="focus" cx="300" cy="200" r="6" />
  <text class="label" x="300" y="222" text-anchor="middle">FOCUS</text>

  <!-- e=0 · circle: r=40 -->
  <circle class="circle" cx="300" cy="200" r="40" />

  <!-- e=0.66 · ellipse: a=110, c=72.6, b=82.6 → rx=110, ry=82.6, centre = (300-72.6, 200) = (227.4, 200)... but to share focus on the right we use the right focus position. -->
  <!-- Actually for educational simplicity, all share focus at (300,200); use ellipse with right focus at this point: c = 72.6, centre = (300-72.6, 200) = (227.4, 200) -->
  <ellipse class="ellipse" cx="227.4" cy="200" rx="110" ry="82.6" />

  <!-- e=1 · parabola: vertex distance p/2 from focus, with vertex to the left of focus. p=80 (parameter). vertex at (300-40, 200)=(260,200). -->
  <!-- Parabola opening right: x = (y²)/(4·a) + 260 with focus at 300. Sketch a y range from -120..120 -->
  <path class="parabola" d="M 540 60 Q 380 100 260 200 Q 380 300 540 340" />

  <!-- e>1 · hyperbola: right branch — opens to the right past the focus -->
  <path class="hyperbola" d="M 540 30 Q 360 90 320 200 Q 360 310 540 370" />

  <!-- Legend -->
  <g transform="translate(30,80)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
    <text class="label" x="28" y="3">e = 0  ·  CIRCLE</text>
    <text class="sublabel" x="28" y="14">v = √(μ/r) · ISS, GEO comsats</text>

    <line x1="0" y1="30" x2="22" y2="30" stroke="#4ecdc4" stroke-width="2" />
    <text class="label-accent" x="28" y="33">0 &lt; e &lt; 1  ·  ELLIPSE</text>
    <text class="sublabel" x="28" y="44">bound orbit · planets, transfers</text>

    <line x1="0" y1="60" x2="22" y2="60" stroke="#ffc850" stroke-width="2" />
    <text class="label-gold" x="28" y="63">e = 1  ·  PARABOLA</text>
    <text class="sublabel" x="28" y="74">exactly escape · v_∞ = 0</text>

    <line x1="0" y1="90" x2="22" y2="90" stroke="#ff6b6b" stroke-width="2" />
    <text class="label-red" x="28" y="93">e &gt; 1  ·  HYPERBOLA</text>
    <text class="sublabel" x="28" y="104">flyby · v_∞ &gt; 0 · Voyager</text>
  </g>

  <!-- Energy panel right -->
  <g transform="translate(560,90)">
    <text class="label-gold" x="0" y="0" text-anchor="end">ORBITAL ENERGY</text>
    <text class="sublabel" x="0" y="14" text-anchor="end">circle/ellipse  ·  E &lt; 0</text>
    <text class="sublabel" x="0" y="26" text-anchor="end">parabola         ·  E = 0</text>
    <text class="sublabel" x="0" y="38" text-anchor="end">hyperbola       ·  E &gt; 0</text>
  </g>

  <text class="sublabel" x="540" y="316" text-anchor="end">all four shapes are slices of the same cone — and all four are valid Keplerian orbits</text>
</svg>
