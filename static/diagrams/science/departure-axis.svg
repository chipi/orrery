<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="A four-year departure-date axis with recurring 26-month launch windows highlighted in teal.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .teal-bar { fill: rgba(78,205,196,0.32); stroke: #4ecdc4; stroke-width: 1.2; }
    .arrow { fill: rgba(255,255,255,0.85); }
  </style>
  <text class="lbl" x="20" y="22">Departure-window axis (4 years)</text>
  <line class="stroke" x1="30" y1="120" x2="370" y2="120" />
  <polygon points="370,120 362,116 362,124" class="arrow" />
  <line class="dashed" x1="30" y1="80" x2="30" y2="120" />
  <line class="dashed" x1="115" y1="80" x2="115" y2="120" />
  <line class="dashed" x1="200" y1="80" x2="200" y2="120" />
  <line class="dashed" x1="285" y1="80" x2="285" y2="120" />
  <line class="dashed" x1="370" y1="80" x2="370" y2="120" />
  <text class="tick" x="22" y="138">2026</text>
  <text class="tick" x="107" y="138">2027</text>
  <text class="tick" x="192" y="138">2028</text>
  <text class="tick" x="277" y="138">2029</text>
  <text class="tick" x="358" y="138">2030</text>
  <rect class="teal-bar" x="60" y="90" width="22" height="20" />
  <rect class="teal-bar" x="220" y="90" width="22" height="20" />
  <text class="tick" x="55" y="80" fill="#4ecdc4">window</text>
  <text class="tick" x="215" y="80" fill="#4ecdc4">window</text>
  <text class="tick" x="135" y="105">26-month gap</text>
  <text class="lbl" x="30" y="170">launch windows recur every 26 months for Mars; outside them: red</text>
</svg>
