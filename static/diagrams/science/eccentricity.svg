<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Three orbits with the same semi-major axis but different eccentricity">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- All three share the same major axis: 2a = 280, so a = 140; centred at (200,150) -->
  <!-- e=0 circle: rx=ry=140 -->
  <circle cx="200" cy="150" r="140" class="stroke" />
  <text x="190" y="20" class="label-mute">e = 0</text>
  <!-- e=0.4: rx=140, ry=140·sqrt(1-0.16)=128 -->
  <ellipse cx="200" cy="150" rx="140" ry="128" class="stroke" />
  <!-- e=0.8: rx=140, ry=140·sqrt(1-0.64)=84 -->
  <ellipse cx="200" cy="150" rx="140" ry="84" class="stroke" />
  <!-- Common focus on the right for the e=0.4 ellipse: c = a·e = 56 -->
  <circle cx="256" cy="150" r="3" class="focus" />
  <!-- Common focus on the right for the e=0.8 ellipse: c = a·e = 112 -->
  <circle cx="312" cy="150" r="3" class="focus" />
  <!-- Centre marker -->
  <circle cx="200" cy="150" r="2" fill="rgba(255,255,255,0.55)" />
  <text x="160" y="280" class="label-mute">same a, different e</text>
  <text x="328" y="148" class="label-mute">e=0.8</text>
  <text x="262" y="148" class="label-mute">e=0.4</text>
  <text x="44" y="172" class="label-accent">e = 0.8</text>
  <text x="44" y="220" class="label-accent">e = 0.4</text>
</svg>
