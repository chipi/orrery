<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Free-return trajectory: Earth out, planet flyby, Earth back">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Sun at centre -->
  <circle cx="200" cy="150" r="6" class="focus" />
  <!-- Earth at start position (left) -->
  <circle cx="80" cy="150" r="5" class="body" />
  <text x="42" y="148" class="label-mute">Earth</text>
  <!-- Mars at flyby (right) -->
  <circle cx="320" cy="150" r="5" class="body" />
  <text x="332" y="148" class="label-mute">Mars</text>
  <!-- Outbound arc: from Earth swing wide, past Mars -->
  <path d="M 80 150 Q 180 50 320 150" class="accent" />
  <!-- Inbound arc: bouncing back from Mars side, returning to Earth at a different position -->
  <path d="M 320 150 Q 220 250 80 150" class="accent" />
  <!-- Direction arrows -->
  <polygon points="240,76 234,80 240,84" fill="#4ecdc4" transform="rotate(-32 237 80)" />
  <polygon points="160,224 160,232 168,228" fill="#4ecdc4" />
  <text x="146" y="46" class="label-accent">outbound</text>
  <text x="158" y="280" class="label-accent">return</text>
  <text x="92" y="170" class="label-mute">depart</text>
  <text x="296" y="170" class="label-mute">flyby</text>
</svg>
