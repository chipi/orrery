<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Gravity assist flyby: hyperbolic path bent by planet gravity, exit speed boosted by planet's heliocentric motion">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Planet as central body -->
  <circle cx="200" cy="160" r="14" class="focus" />
  <text x="174" y="200" class="label-accent">planet</text>
  <!-- Planet's orbital velocity (heliocentric) -->
  <line x1="200" y1="160" x2="290" y2="160" class="dashed" />
  <polygon points="294,160 286,156 286,164" fill="rgba(255,255,255,0.55)" />
  <text x="232" y="152" class="label-mute">V_planet</text>
  <!-- Hyperbolic incoming path: from upper-left, bent by planet -->
  <path d="M 30 30 Q 160 90 195 146" class="accent" />
  <polygon points="190,140 196,146 198,140" fill="#4ecdc4" />
  <text x="40" y="22" class="label-accent">V_in (relative)</text>
  <!-- Hyperbolic outgoing path: bent away, exiting upper-right -->
  <path d="M 215 174 Q 290 230 380 280" class="accent" />
  <polygon points="378,278 372,272 374,266" fill="#4ecdc4" />
  <text x="298" y="288" class="label-accent">V_out (relative)</text>
  <!-- Asymptotic angle indication -->
  <text x="60" y="262" class="label-mute">|V_in| = |V_out| in planet's frame</text>
  <text x="60" y="278" class="label-mute">but planet's motion adds heliocentric Δv</text>
</svg>
