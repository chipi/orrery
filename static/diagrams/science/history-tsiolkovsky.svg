<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="Tsiolkovsky rocket equation: mass ratio vs delta-v">
  <style>
    .panel { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.18); stroke-width: 1; }
    .axis { stroke: rgba(255,255,255,0.4); stroke-width: 1; fill: none; }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 0.6; fill: none; }
    .curve { stroke: #ffc850; stroke-width: 2; fill: none; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.2px; }
    .axis-label { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 7px; }
    .formula { fill: rgba(255,200,80,0.95); font-family: 'Space Mono', monospace; font-size: 12px; }
  </style>
  <rect x="10" y="10" width="380" height="200" class="panel" />
  <text x="20" y="28" class="label">TSIOLKOVSKY · ∆v vs MASS RATIO  (1903)</text>
  <line x1="50" y1="180" x2="370" y2="180" class="axis" />
  <line x1="50" y1="50" x2="50" y2="180" class="axis" />
  <text x="200" y="200" text-anchor="middle" class="axis-label">MASS RATIO  m₀ / m₁</text>
  <text x="20" y="115" class="axis-label" transform="rotate(-90 20 115)">∆V (km/s)</text>
  <!-- Curve: dv = ve * ln(m0/m1), with ve=4.4 km/s -->
  <!-- mass ratio 1 → 0; ratio 2 → 3.05; ratio 5 → 7.08; ratio 10 → 10.13; ratio 20 → 13.18; ratio 50 → 17.21 -->
  <path d="M 50 180 Q 110 130 200 95 T 360 60" class="curve" />
  <text x="60" y="183" text-anchor="middle" class="axis-label">1</text>
  <text x="160" y="195" text-anchor="middle" class="axis-label">5</text>
  <text x="260" y="195" text-anchor="middle" class="axis-label">20</text>
  <text x="360" y="195" text-anchor="middle" class="axis-label">50</text>
  <text x="44" y="180" text-anchor="end" class="axis-label">0</text>
  <text x="44" y="120" text-anchor="end" class="axis-label">10</text>
  <text x="44" y="60" text-anchor="end" class="axis-label">20</text>
  <text x="200" y="135" text-anchor="middle" class="formula">∆v = vₑ · ln(m₀ / m₁)</text>
</svg>
