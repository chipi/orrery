<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Hohmann transfer ellipse touching inner and outer circular orbits">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Sun at centre -->
  <circle cx="200" cy="150" r="6" class="focus" />
  <text x="194" y="138" class="label-accent">μ</text>
  <!-- Inner circular orbit (Earth): r1=70 -->
  <circle cx="200" cy="150" r="70" class="dashed" />
  <text x="278" y="148" class="label-mute">Earth orbit</text>
  <!-- Outer circular orbit (Mars): r2=130 -->
  <circle cx="200" cy="150" r="130" class="dashed" />
  <text x="328" y="148" class="label-mute">Mars orbit</text>
  <!-- Hohmann transfer ellipse: perihelion at Earth (right at r=70), aphelion at Mars (left at r=130) -->
  <!-- a = (70 + 130) / 2 = 100; centred at (200 - 30, 150) = (170, 150); rx=100, ry=sqrt(a²(1-e²)) where e=0.3 → ry=95 -->
  <ellipse cx="170" cy="150" rx="100" ry="95" class="accent" />
  <!-- Departure body at perihelion (right tip of transfer = 200+70 = 270, 150) -->
  <circle cx="270" cy="150" r="4" class="body" />
  <text x="244" y="170" class="label-mute">depart</text>
  <!-- Arrival body at aphelion (left tip of transfer = 200-130 = 70, 150) -->
  <circle cx="70" cy="150" r="4" class="body" />
  <text x="68" y="170" class="label-mute">arrive</text>
  <!-- Departure burn (∆v1) -->
  <line x1="270" y1="150" x2="270" y2="116" class="accent" />
  <polygon points="270,112 266,122 274,122" fill="#4ecdc4" />
  <text x="276" y="124" class="label-accent">Δv₁</text>
  <!-- Arrival burn (∆v2) -->
  <line x1="70" y1="150" x2="70" y2="184" class="accent" />
  <polygon points="70,188 66,178 74,178" fill="#4ecdc4" />
  <text x="34" y="200" class="label-accent">Δv₂</text>
  <text x="100" y="288" class="label-mute">two burns · cheapest fixed-impulse transfer</text>
</svg>
