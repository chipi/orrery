<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="A Hohmann transfer — two burns linking an inner circular orbit to an outer one via a transfer ellipse that touches both, with Δv₁ at departure and Δv₂ at arrival.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .orbit { stroke: rgba(255,255,255,0.55); stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
    .transfer { stroke: #4ecdc4; stroke-width: 2.4; fill: none; }
    .transfer-fill { fill: rgba(78,205,196,0.04); stroke: none; }
    .accent-fill { fill: #4ecdc4; }
    .focus { fill: #ffc850; stroke: #ffc850; stroke-width: 1.2; }
    .body { fill: rgba(255,255,255,0.95); }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />
  <circle class="dim-star" cx="80" cy="290" r="0.5" />
  <circle class="dim-star" cx="560" cy="290" r="0.6" />

  <text class="label" x="40" y="28">HOHMANN TRANSFER — TWO BURNS, CHEAPEST FIXED-IMPULSE ORBIT-TO-ORBIT</text>

  <!-- Sun -->
  <circle class="focus" cx="300" cy="170" r="8" />
  <text class="label-gold" x="300" y="148" text-anchor="middle">SUN · μ</text>

  <!-- Inner orbit (Earth): r1=100 -->
  <circle class="orbit" cx="300" cy="170" r="100" />
  <text class="sublabel" x="412" y="172">EARTH ORBIT · r₁ = 1.0 AU</text>

  <!-- Outer orbit (Mars): r2=160 -->
  <circle class="orbit" cx="300" cy="170" r="160" />
  <text class="sublabel" x="472" y="172">MARS ORBIT · r₂ = 1.52 AU</text>

  <!-- Hohmann transfer ellipse: a = (r1+r2)/2 = 130, c = (r2-r1)/2 = 30 -->
  <!-- centred at (300-30, 170) = (270, 170); rx=130, e=30/130=0.23, ry=130·sqrt(1-0.053) = 126.5 -->
  <ellipse class="transfer-fill" cx="270" cy="170" rx="130" ry="126.5" />
  <ellipse class="transfer" cx="270" cy="170" rx="130" ry="126.5" />

  <!-- Departure marker at right tip of transfer = perihelion (300+100, 170) = (400, 170) — touches inner orbit -->
  <circle class="body" cx="400" cy="170" r="5" />
  <line stroke="rgba(255,255,255,0.4)" stroke-width="0.8" x1="400" y1="170" x2="440" y2="100" />
  <text class="label" x="446" y="100">DEPART · Δv₁</text>
  <text class="sublabel" x="446" y="112">prograde burn · 2.94 km/s</text>
  <text class="sublabel" x="446" y="124">circular → transfer ellipse</text>

  <!-- Arrival marker at left tip = aphelion (300-160, 170) = (140, 170) — touches outer orbit -->
  <circle class="body" cx="140" cy="170" r="5" />
  <line stroke="rgba(255,255,255,0.4)" stroke-width="0.8" x1="140" y1="170" x2="100" y2="244" />
  <text class="label" x="96" y="248" text-anchor="end">ARRIVE · Δv₂</text>
  <text class="sublabel" x="96" y="260" text-anchor="end">prograde burn · 2.65 km/s</text>
  <text class="sublabel" x="96" y="272" text-anchor="end">transfer → circular at r₂</text>

  <!-- Δv1 arrow at departure (tangential, prograde) -->
  <line stroke="#4ecdc4" stroke-width="2.4" x1="400" y1="170" x2="400" y2="138" />
  <polygon class="accent-fill" points="400,134 395,144 405,144" />
  <text class="label-accent" x="408" y="148">Δv₁</text>

  <!-- Δv2 arrow at arrival (tangential, prograde) -->
  <line stroke="#4ecdc4" stroke-width="2.4" x1="140" y1="170" x2="140" y2="202" />
  <polygon class="accent-fill" points="140,206 135,196 145,196" />
  <text class="label-accent" x="106" y="200" text-anchor="end">Δv₂</text>

  <!-- Stats panel -->
  <g transform="translate(30,110)">
    <rect x="0" y="0" width="158" height="110" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="16">EARTH → MARS</text>
    <text class="sublabel" x="8" y="32">a_t = (1.0+1.52)/2</text>
    <text class="sublabel" x="8" y="44">     = 1.26 AU</text>
    <text class="sublabel" x="8" y="62">TOF = π·√(a_t³/μ)</text>
    <text class="sublabel" x="8" y="74">     = 8.5 months</text>
    <text class="sublabel" x="8" y="92">Σ Δv = 5.59 km/s</text>
    <text class="sublabel" x="8" y="104">(heliocentric)</text>
  </g>

  <text class="sublabel" x="540" y="316" text-anchor="end">Walter Hohmann · 1925 · "Die Erreichbarkeit der Himmelskörper"</text>
</svg>
