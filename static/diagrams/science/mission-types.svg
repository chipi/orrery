<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Five mission archetypes as a ladder of escalating complexity — flyby, orbiter, lander, rover, sample-return — with cheap delta-v on the left rising to expensive delta-v plus risk plus mass on the right.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .planet { fill: rgba(193,68,14,0.45); stroke: rgba(193,68,14,0.95); stroke-width: 1.4; }
    .body { fill: rgba(255,255,255,0.85); }
    .gold { fill: #ffc850; }
    .accent-fill { fill: #4ecdc4; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 1px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tick { fill: rgba(255,255,255,0.7); font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.8px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">FIVE MISSION ARCHETYPES — A LADDER OF Δv + RISK + MASS</text>

  <!-- 1 FLYBY -->
  <g transform="translate(90, 140)">
    <circle class="planet" cx="0" cy="0" r="14" />
    <path class="dashed" d="M -50 -40 Q 0 0 50 40" />
    <polygon class="body" points="-50,-40 -44,-37 -47,-32" />
    <text class="label-accent" x="0" y="40" text-anchor="middle">1 · FLYBY</text>
    <text class="sublabel" x="0" y="54" text-anchor="middle">no braking</text>
    <text class="sublabel" x="0" y="66" text-anchor="middle">Voyager 1, 2</text>
    <text class="sublabel" x="0" y="78" text-anchor="middle">New Horizons</text>
  </g>

  <!-- 2 ORBITER -->
  <g transform="translate(210, 140)">
    <circle class="planet" cx="0" cy="0" r="14" />
    <ellipse class="accent" cx="0" cy="0" rx="30" ry="20" transform="rotate(-15)" />
    <circle class="accent-fill" cx="-28" cy="8" r="2.5" />
    <text class="label-accent" x="0" y="40" text-anchor="middle">2 · ORBITER</text>
    <text class="sublabel" x="0" y="54" text-anchor="middle">+ insertion Δv</text>
    <text class="sublabel" x="0" y="66" text-anchor="middle">MRO, MAVEN</text>
    <text class="sublabel" x="0" y="78" text-anchor="middle">Cassini, JUNO</text>
  </g>

  <!-- 3 LANDER -->
  <g transform="translate(320, 140)">
    <line class="dashed" x1="0" y1="-40" x2="0" y2="-16" />
    <polygon class="body" points="-4,-16 4,-16 3,-5 -3,-5" />
    <line stroke="rgba(78,205,196,0.7)" stroke-width="1.5" x1="0" y1="-5" x2="0" y2="5" />
    <line stroke="rgba(193,68,14,0.6)" stroke-width="1" x1="-16" y1="14" x2="16" y2="14" />
    <text class="label-accent" x="0" y="40" text-anchor="middle">3 · LANDER</text>
    <text class="sublabel" x="0" y="54" text-anchor="middle">+ EDL</text>
    <text class="sublabel" x="0" y="66" text-anchor="middle">Phoenix, Insight</text>
    <text class="sublabel" x="0" y="78" text-anchor="middle">Vikings, Beagle 2</text>
  </g>

  <!-- 4 ROVER -->
  <g transform="translate(430, 140)">
    <rect class="body" x="-9" y="-5" width="18" height="9" />
    <circle fill="rgba(255,255,255,0.85)" cx="-7" cy="6" r="2.5" />
    <circle fill="rgba(255,255,255,0.85)" cx="0" cy="6" r="2.5" />
    <circle fill="rgba(255,255,255,0.85)" cx="7" cy="6" r="2.5" />
    <line stroke="rgba(193,68,14,0.6)" stroke-width="1" x1="-20" y1="11" x2="20" y2="11" />
    <path stroke="rgba(78,205,196,0.5)" stroke-width="1" stroke-dasharray="2 2" fill="none" d="M -14 11 Q 0 22 14 11" />
    <text class="label-accent" x="0" y="40" text-anchor="middle">4 · ROVER</text>
    <text class="sublabel" x="0" y="54" text-anchor="middle">+ wheels + autonomy</text>
    <text class="sublabel" x="0" y="66" text-anchor="middle">Curiosity</text>
    <text class="sublabel" x="0" y="78" text-anchor="middle">Perseverance · Zhurong</text>
  </g>

  <!-- 5 SAMPLE RETURN -->
  <g transform="translate(540, 140)">
    <line class="dashed" x1="0" y1="-40" x2="0" y2="-14" />
    <polygon class="body" points="-4,-14 4,-14 3,-4 -3,-4" />
    <line stroke="#ffc850" stroke-width="1.8" x1="0" y1="-4" x2="0" y2="6" />
    <polygon class="gold" points="-3,6 3,6 0,14" />
    <line stroke="rgba(193,68,14,0.6)" stroke-width="1" x1="-14" y1="16" x2="14" y2="16" />
    <text class="label-gold" x="0" y="40" text-anchor="middle">5 · SAMPLE RETURN</text>
    <text class="sublabel" x="0" y="54" text-anchor="middle">+ ascent + Earth EDL</text>
    <text class="sublabel" x="0" y="66" text-anchor="middle">Apollo, Hayabusa 2</text>
    <text class="sublabel" x="0" y="78" text-anchor="middle">OSIRIS-REx · MSR planned</text>
  </g>

  <!-- Cost/complexity axis at the bottom -->
  <line class="stroke" x1="60" y1="240" x2="560" y2="240" />
  <polygon fill="rgba(255,255,255,0.85)" points="568,240 558,236 558,244" />
  <text class="tick" x="60" y="258">CHEAP Δv · LOW RISK</text>
  <text class="tick" x="560" y="258" text-anchor="end">EXPENSIVE Δv + MASS + RISK</text>

  <text class="sublabel" x="540" y="312" text-anchor="end">flyby is the floor of deep-space science · sample return is the ceiling of robotic ambition</text>
</svg>
