<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Five mission archetypes drawn as a ladder of escalating complexity: flyby, orbiter, lander, rover, sample return.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.6; fill: none; }
    .body { fill: rgba(255,255,255,0.85); }
    .planet { fill: rgba(193,68,14,0.5); stroke: rgba(193,68,14,0.85); stroke-width: 1; }
    .gold { fill: #ffc850; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 10px; fill: rgba(255,255,255,0.85); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .accent-fill { fill: #4ecdc4; }
  </style>
  <text class="lbl" x="20" y="22">Five mission archetypes</text>
  <g transform="translate(50 90)">
    <circle class="planet" cx="20" cy="0" r="9" />
    <path class="dashed" d="M -25 -25 Q 20 0 65 30" />
    <polygon class="body" points="-25,-25 -19,-23 -22,-19" />
    <text class="tick" x="20" y="32" text-anchor="middle">FLYBY</text>
    <text class="tick" x="20" y="48" text-anchor="middle" fill="rgba(78,205,196,0.85)">no braking</text>
  </g>
  <g transform="translate(140 90)">
    <circle class="planet" cx="0" cy="0" r="9" />
    <ellipse class="accent" cx="0" cy="0" rx="22" ry="14" transform="rotate(-15)" />
    <circle class="accent-fill" cx="-21" cy="6" r="2" />
    <text class="tick" x="0" y="32" text-anchor="middle">ORBITER</text>
    <text class="tick" x="0" y="48" text-anchor="middle" fill="rgba(78,205,196,0.85)">+ insertion ∆v</text>
  </g>
  <g transform="translate(220 90)">
    <line class="dashed" x1="0" y1="-30" x2="0" y2="-12" />
    <polygon class="body" points="-3,-12 3,-12 2,-4 -2,-4" />
    <line x1="0" y1="-4" x2="0" y2="3" stroke="rgba(78,205,196,0.7)" stroke-width="1.5" />
    <ellipse class="accent-fill" cx="0" cy="6" rx="3" ry="2" opacity="0.6" />
    <line x1="-12" y1="11" x2="12" y2="11" stroke="rgba(193,68,14,0.6)" stroke-width="1" />
    <text class="tick" x="0" y="32" text-anchor="middle">LANDER</text>
    <text class="tick" x="0" y="48" text-anchor="middle" fill="rgba(78,205,196,0.85)">+ EDL</text>
  </g>
  <g transform="translate(290 90)">
    <rect class="body" x="-6" y="-3" width="12" height="6" />
    <circle cx="-5" cy="4" r="2" fill="rgba(255,255,255,0.85)" />
    <circle cx="0" cy="4" r="2" fill="rgba(255,255,255,0.85)" />
    <circle cx="5" cy="4" r="2" fill="rgba(255,255,255,0.85)" />
    <line x1="-15" y1="8" x2="15" y2="8" stroke="rgba(193,68,14,0.6)" stroke-width="1" />
    <path d="M -10 8 Q 0 16 10 8" stroke="rgba(78,205,196,0.6)" stroke-width="1" stroke-dasharray="2 2" fill="none" />
    <text class="tick" x="0" y="32" text-anchor="middle">ROVER</text>
    <text class="tick" x="0" y="48" text-anchor="middle" fill="rgba(78,205,196,0.85)">+ wheels + autonomy</text>
  </g>
  <g transform="translate(360 90)">
    <line class="dashed" x1="0" y1="-25" x2="0" y2="-8" />
    <polygon class="body" points="-3,-8 3,-8 2,0 -2,0" />
    <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,200,80,0.85)" stroke-width="1.5" />
    <polygon class="gold" points="-2,6 2,6 0,12" />
    <line x1="-10" y1="14" x2="10" y2="14" stroke="rgba(193,68,14,0.6)" stroke-width="1" />
    <text class="tick" x="0" y="32" text-anchor="middle">SAMPLE</text>
    <text class="tick" x="0" y="42" text-anchor="middle">RETURN</text>
    <text class="tick" x="0" y="58" text-anchor="middle" fill="rgba(255,200,80,0.85)">+ ascent + Earth EDL</text>
  </g>
  <line class="stroke" x1="40" y1="160" x2="370" y2="160" />
  <polygon points="370,160 362,156 362,164" fill="rgba(255,255,255,0.85)" />
  <text class="tick" x="40" y="178">cheap ∆v</text>
  <text class="tick" x="370" y="178" text-anchor="end">expensive ∆v + risk + mass</text>
  <text class="lbl" x="30" y="218">flyby is the floor; sample return is the ceiling of robotic ambition</text>
</svg>
