<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Patched-conic approximation: an interplanetary trajectory modelled as three two-body arcs — Earth-centred at launch, sun-centred during cruise, Mars-centred at arrival — patched at sphere-of-influence boundaries.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .soi { stroke: rgba(255,255,255,0.4); stroke-width: 1.2; stroke-dasharray: 4 3; fill: rgba(255,255,255,0.02); }
    .arc-earth { stroke: rgba(75,156,211,0.95); stroke-width: 2.2; fill: none; }
    .arc-helio { stroke: #ffc850; stroke-width: 2.2; fill: none; }
    .arc-mars { stroke: #ff6b6b; stroke-width: 2.2; fill: none; }
    .earth { fill: rgba(75,156,211,0.45); stroke: rgba(75,156,211,0.95); stroke-width: 1.5; }
    .mars { fill: rgba(255,107,107,0.45); stroke: rgba(255,107,107,0.95); stroke-width: 1.5; }
    .sun { fill: #ffc850; stroke: #ffc850; stroke-width: 1.2; }
    .soi-marker { fill: rgba(78,205,196,0.95); stroke: #4ecdc4; stroke-width: 1.5; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-blue { fill: rgba(75,156,211,0.95); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="300" cy="55" r="0.5" />
  <circle class="dim-star" cx="540" cy="60" r="0.5" />

  <text class="label" x="40" y="28">PATCHED-CONIC APPROXIMATION — THREE 2-BODY ARCS, SWITCHED AT SOIs</text>

  <!-- Earth SOI (left) -->
  <circle class="soi" cx="100" cy="180" r="56" />
  <circle class="earth" cx="100" cy="180" r="9" />
  <text class="label-blue" x="100" y="252" text-anchor="middle">EARTH FRAME</text>
  <text class="sublabel" x="100" y="264" text-anchor="middle">SOI · 924,000 km</text>

  <!-- Sun (centre, large gap to show heliocentric frame) -->
  <circle class="sun" cx="300" cy="180" r="6" />
  <text class="label-gold" x="300" y="252" text-anchor="middle">SUN FRAME</text>
  <text class="sublabel" x="300" y="264" text-anchor="middle">heliocentric Kepler arc</text>

  <!-- Mars SOI (right) -->
  <circle class="soi" cx="500" cy="180" r="56" />
  <circle class="mars" cx="500" cy="180" r="7" />
  <text class="label-red" x="500" y="252" text-anchor="middle">MARS FRAME</text>
  <text class="sublabel" x="500" y="264" text-anchor="middle">SOI · 577,000 km</text>

  <!-- Earth-centred Kepler arc (escape hyperbola), curving up and right -->
  <path class="arc-earth" d="M 100 170 Q 130 130 156 170" />
  <text class="label-blue" x="100" y="115" text-anchor="middle">ESCAPE</text>
  <text class="sublabel" x="100" y="127" text-anchor="middle">hyperbola</text>

  <!-- Heliocentric arc: from Earth SOI edge to Mars SOI edge -->
  <path class="arc-helio" d="M 156 170 Q 300 80 444 170" />
  <text class="label-gold" x="300" y="105" text-anchor="middle">CRUISE</text>
  <text class="sublabel" x="300" y="117" text-anchor="middle">half-ellipse (Hohmann)</text>

  <!-- Mars-centred Kepler arc (capture hyperbola) -->
  <path class="arc-mars" d="M 444 170 Q 470 130 500 170" />
  <text class="label-red" x="500" y="115" text-anchor="middle">CAPTURE</text>
  <text class="sublabel" x="500" y="127" text-anchor="middle">hyperbola</text>

  <!-- SOI patch markers (where the trajectory hands off) -->
  <circle class="soi-marker" cx="156" cy="170" r="3.5" />
  <line stroke="rgba(78,205,196,0.5)" stroke-width="0.8" x1="156" y1="170" x2="200" y2="115" />
  <text class="label-accent" x="204" y="118">SOI BOUNDARY</text>
  <text class="sublabel" x="204" y="130">hand off Earth → Sun</text>

  <circle class="soi-marker" cx="444" cy="170" r="3.5" />
  <line stroke="rgba(78,205,196,0.5)" stroke-width="0.8" x1="444" y1="170" x2="400" y2="115" />
  <text class="label-accent" x="396" y="118" text-anchor="end">SOI BOUNDARY</text>
  <text class="sublabel" x="396" y="130" text-anchor="end">hand off Sun → Mars</text>

  <!-- Approximation note panel at bottom -->
  <g transform="translate(40,278)">
    <rect x="0" y="0" width="520" height="34" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label" x="8" y="14">APPROXIMATION: only one body's gravity matters at a time</text>
    <text class="sublabel" x="8" y="26">→ closed-form Kepler solution per arc · errors ≪ 1% for fast cruise · refined by N-body propagation for ops</text>
  </g>
</svg>
