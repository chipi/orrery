<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Patched-conic approximation: switch reference frame at sphere-of-influence boundaries">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <!-- Three circles representing three frames -->
  <!-- Earth's sphere of influence -->
  <circle cx="80" cy="150" r="50" class="dashed" />
  <circle cx="80" cy="150" r="6" class="focus" />
  <text x="64" y="216" class="label-mute">Earth SOI</text>
  <!-- Sun's heliocentric region (large dashed box not needed; use horizontal central band labels) -->
  <line x1="130" y1="150" x2="270" y2="150" class="accent" />
  <text x="160" y="142" class="label-accent">heliocentric arc</text>
  <!-- Mars's sphere of influence -->
  <circle cx="320" cy="150" r="50" class="dashed" />
  <circle cx="320" cy="150" r="5" class="focus" />
  <text x="306" y="216" class="label-mute">Mars SOI</text>
  <!-- Earth-centred Kepler arc inside Earth SOI -->
  <path d="M 60 110 Q 100 130 130 150" class="stroke" />
  <text x="38" y="98" class="label-mute">Kepler arc</text>
  <text x="38" y="112" class="label-mute">(Earth)</text>
  <!-- Mars-centred Kepler arc inside Mars SOI -->
  <path d="M 270 150 Q 300 170 340 190" class="stroke" />
  <text x="332" y="180" class="label-mute">Kepler arc</text>
  <text x="332" y="194" class="label-mute">(Mars)</text>
  <!-- SOI boundary markers -->
  <circle cx="130" cy="150" r="3" fill="#4ecdc4" />
  <circle cx="270" cy="150" r="3" fill="#4ecdc4" />
  <text x="46" y="262" class="label-mute">three frames patched at sphere-of-influence boundaries</text>
</svg>
