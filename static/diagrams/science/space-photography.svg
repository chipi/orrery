<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" role="img" aria-label="Space photography pipeline — a CCD sensor accumulating photons through a filter wheel, multiple exposures stacked + registered + calibrated + composited into a final colour-mapped image.">
  <style>
    .stroke-soft { stroke: rgba(255,255,255,0.18); stroke-width: 0.8; fill: none; }
    .stroke-mid { stroke: rgba(255,255,255,0.4); stroke-width: 1; fill: none; }
    .stroke-bright { stroke: rgba(255,255,255,0.75); stroke-width: 1.2; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.6; fill: none; }
    .gold { stroke: #ffc850; stroke-width: 1.4; fill: none; }
    .red { stroke: #ff6b6b; stroke-width: 1.4; fill: none; }
    .blue { stroke: #6aa9ff; stroke-width: 1.4; fill: none; }
    .filter-r { fill: rgba(255,107,107,0.4); stroke: #ff6b6b; stroke-width: 1; }
    .filter-g { fill: rgba(78,205,196,0.4); stroke: #4ecdc4; stroke-width: 1; }
    .filter-b { fill: rgba(108,169,255,0.4); stroke: #6aa9ff; stroke-width: 1; }
    .ccd-fill { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.55); stroke-width: 1; }
    .arrow { fill: none; stroke: rgba(255,255,255,0.65); stroke-width: 1.2; marker-end: url(#arrow); }
    .composite { fill: url(#nebula); stroke: rgba(255,255,255,0.6); stroke-width: 1; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1px; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.7)" />
    </marker>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc850" stop-opacity="0.7" />
      <stop offset="40%" stop-color="#ff6b6b" stop-opacity="0.4" />
      <stop offset="80%" stop-color="#6aa9ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#04040c" stop-opacity="0.1" />
    </radialGradient>
  </defs>

  <!-- Step 1: Telescope + filter wheel -->
  <g transform="translate(30,110)">
    <!-- Mirror barrel -->
    <rect class="ccd-fill" x="0" y="-22" width="40" height="44" rx="2" />
    <line class="accent" x1="40" y1="-22" x2="40" y2="22" />
    <!-- Filter wheel (3 colored filters) -->
    <circle class="filter-r" cx="56" cy="-12" r="6" />
    <circle class="filter-g" cx="56" cy="0" r="6" />
    <circle class="filter-b" cx="56" cy="12" r="6" />
    <!-- CCD -->
    <rect class="ccd-fill" x="72" y="-16" width="22" height="32" />
    <!-- CCD pixel grid hint -->
    <g stroke="rgba(255,255,255,0.18)" stroke-width="0.4">
      <line x1="77" y1="-16" x2="77" y2="16" />
      <line x1="83" y1="-16" x2="83" y2="16" />
      <line x1="89" y1="-16" x2="89" y2="16" />
      <line x1="72" y1="-11" x2="94" y2="-11" />
      <line x1="72" y1="-5" x2="94" y2="-5" />
      <line x1="72" y1="0" x2="94" y2="0" />
      <line x1="72" y1="5" x2="94" y2="5" />
      <line x1="72" y1="10" x2="94" y2="10" />
    </g>
    <text class="label" x="48" y="-32" text-anchor="middle">TELESCOPE + FILTERS + CCD</text>
    <text class="sublabel" x="48" y="40" text-anchor="middle">photons → electron counts</text>
  </g>

  <!-- Arrow to step 2 -->
  <line class="arrow" x1="138" y1="110" x2="178" y2="110" />

  <!-- Step 2: Multiple exposures (stack) -->
  <g transform="translate(186,90)">
    <rect class="ccd-fill" x="0" y="0" width="38" height="28" />
    <rect class="ccd-fill" x="4" y="4" width="38" height="28" />
    <rect class="ccd-fill" x="8" y="8" width="38" height="28" />
    <rect class="ccd-fill" x="12" y="12" width="38" height="28" />
    <text class="label" x="25" y="60" text-anchor="middle">STACK</text>
    <text class="sublabel" x="25" y="72" text-anchor="middle">dozens of exposures</text>
  </g>

  <!-- Arrow -->
  <line class="arrow" x1="244" y1="110" x2="284" y2="110" />

  <!-- Step 3: Register + calibrate (alignment grid) -->
  <g transform="translate(294,86)">
    <rect class="ccd-fill" x="0" y="0" width="44" height="38" />
    <!-- alignment crosshair -->
    <line class="accent" x1="22" y1="2" x2="22" y2="36" />
    <line class="accent" x1="2" y1="19" x2="42" y2="19" />
    <circle cx="22" cy="19" r="2" fill="#4ecdc4" />
    <text class="label" x="22" y="56" text-anchor="middle">REGISTER</text>
    <text class="sublabel" x="22" y="68" text-anchor="middle">sub-pixel align</text>
  </g>

  <!-- Arrow -->
  <line class="arrow" x1="344" y1="110" x2="384" y2="110" />

  <!-- Step 4: 3-color composite -->
  <g transform="translate(396,80)">
    <rect class="filter-r" x="0" y="0" width="48" height="14" />
    <rect class="filter-g" x="0" y="16" width="48" height="14" />
    <rect class="filter-b" x="0" y="32" width="48" height="14" />
    <text class="label" x="24" y="64" text-anchor="middle">3-CHANNEL</text>
    <text class="sublabel" x="24" y="76" text-anchor="middle">filter → R G B</text>
  </g>

  <!-- Arrow -->
  <line class="arrow" x1="454" y1="110" x2="494" y2="110" />

  <!-- Step 5: Final composite (colored nebula) -->
  <g transform="translate(504,86)">
    <rect class="composite" x="0" y="0" width="60" height="48" rx="3" />
    <text class="label" x="30" y="64" text-anchor="middle">COMPOSITE</text>
    <text class="sublabel" x="30" y="76" text-anchor="middle">what you see on the poster</text>
  </g>

  <!-- Bottom annotation: real data, real interpretation -->
  <text class="sublabel" x="300" y="232" text-anchor="middle">EVERY STEP DOCUMENTED · raw data in MAST / ESA Datalabs · open pipeline · no fabrication</text>
</svg>
