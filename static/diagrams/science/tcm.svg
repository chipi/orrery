<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 230" role="img" aria-label="A cruise trajectory between Earth and Mars with three small TCM tick marks along the way.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1.8; fill: none; }
    .body { fill: rgba(255,255,255,0.7); }
    .mars { fill: rgba(193,68,14,0.5); stroke: rgba(193,68,14,0.85); stroke-width: 1; }
    .tcm { fill: #4ecdc4; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
  </style>
  <text class="lbl" x="20" y="22">Trajectory Correction Maneuvers</text>
  <circle class="body" cx="40" cy="160" r="6" />
  <text class="tick" x="32" y="180">Earth</text>
  <circle class="mars" cx="360" cy="80" r="5" />
  <text class="tick" x="346" y="100">Mars</text>
  <path class="accent" d="M 46 158 Q 200 60 357 82" />
  <text class="tick" x="100" y="135" fill="#4ecdc4">8-month cruise</text>
  <circle class="tcm" cx="100" cy="120" r="2.5" />
  <line class="dashed" x1="100" y1="120" x2="100" y2="100" />
  <text class="tick" x="92" y="96">TCM-1</text>
  <circle class="tcm" cx="180" cy="92" r="2.5" />
  <line class="dashed" x1="180" y1="92" x2="180" y2="72" />
  <text class="tick" x="172" y="68">TCM-2</text>
  <circle class="tcm" cx="280" cy="78" r="2.5" />
  <line class="dashed" x1="280" y1="78" x2="280" y2="58" />
  <text class="tick" x="272" y="54">TCM-3</text>
  <text class="lbl" x="30" y="210">tiny burns trim the trajectory before errors grow into miss-distance</text>
</svg>
