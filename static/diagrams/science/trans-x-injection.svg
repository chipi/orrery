<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Trans-X injection — a single hard burn at perigee in low Earth orbit that throws the spacecraft onto an Oberth-efficient transfer ellipse toward the Moon, Mars, Venus, or Jupiter.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2.4; fill: none; }
    .earth { fill: rgba(75,156,211,0.4); stroke: rgba(75,156,211,0.95); stroke-width: 1.5; }
    .leo { stroke: rgba(255,255,255,0.55); stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
    .accent-fill { fill: #4ecdc4; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">TRANS-X INJECTION (TLI / TMI / TVI / TJI) — ONE BURN, ONE TRANSFER</text>

  <!-- Earth -->
  <circle class="earth" cx="140" cy="180" r="22" />
  <text class="label" x="140" y="184" text-anchor="middle" fill="rgba(255,255,255,0.95)">E</text>

  <!-- Parking orbit (LEO) -->
  <circle class="leo" cx="140" cy="180" r="42" />
  <text class="sublabel" x="140" y="240" text-anchor="middle">PARKING ORBIT · LEO · 7.8 km/s</text>

  <!-- Transfer ellipse extending to the right -->
  <!-- Sun/destination far to the right; transfer ellipse perigee touches LEO at right tip of LEO -->
  <ellipse class="accent" cx="320" cy="180" rx="220" ry="80" />

  <!-- Burn point at perigee (right tip of LEO, left tip of transfer): (140+42, 180) = (182, 180) ≈ 100, 180. Let's use intersection: transfer at right tip of LEO -->
  <circle class="accent-fill" cx="182" cy="180" r="5" />
  <!-- Burn vector -->
  <line stroke="#4ecdc4" stroke-width="2.6" x1="182" y1="180" x2="182" y2="138" />
  <polygon class="accent-fill" points="182,134 177,144 187,144" />
  <text class="label-accent" x="194" y="140">Δv₁ · ~3 km/s</text>
  <text class="sublabel" x="194" y="152">prograde · at perigee (Oberth)</text>

  <!-- Destination markers along the transfer -->
  <circle fill="#ffc850" cx="540" cy="180" r="4" />
  <text class="label-gold" x="540" y="206" text-anchor="middle">DESTINATION</text>
  <text class="sublabel" x="540" y="218" text-anchor="middle">Moon / Mars / Venus / Jupiter</text>

  <!-- Annotation panel: variants -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="180" height="130" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="4" />
    <text class="label-gold" x="8" y="16">VARIANTS · BY TARGET</text>
    <text class="sublabel" x="8" y="32">TLI  ·  trans-Lunar     · 3.05 km/s</text>
    <text class="sublabel" x="8" y="44">TMI  ·  trans-Mars     · 3.6 km/s</text>
    <text class="sublabel" x="8" y="56">TVI  ·  trans-Venus    · 3.5 km/s</text>
    <text class="sublabel" x="8" y="68">TJI  ·  trans-Jupiter  · 6.3 km/s</text>
    <text class="sublabel" x="8" y="88">all the Oberth advantage</text>
    <text class="sublabel" x="8" y="100">comes from burning at</text>
    <text class="sublabel" x="8" y="112">perigee where v is fast</text>
    <text class="sublabel" x="8" y="124">→ minimum Δv to escape</text>
  </g>

  <text class="sublabel" x="540" y="316" text-anchor="end">Apollo TLI: S-IVB stage burned ~6 min over the Pacific to put crew on a 3-day trans-lunar coast</text>
</svg>
