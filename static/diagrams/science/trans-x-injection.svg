<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Low Earth orbit with a single trans-X injection burn at perigee that throws the spacecraft onto a transfer ellipse.">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .earth { fill: rgba(75,156,211,0.25); stroke: rgba(75,156,211,0.85); stroke-width: 1.5; }
    .lbl { font-family: 'Space Mono', monospace; font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tick { font-family: 'Space Mono', monospace; font-size: 8px; fill: rgba(255,255,255,0.55); }
    .burn { fill: #4ecdc4; }
  </style>
  <text class="lbl" x="20" y="22">Trans-X injection (TLI/TMI/TVI/TJI)</text>
  <circle class="earth" cx="120" cy="140" r="22" />
  <text class="tick" x="115" y="143" text-anchor="middle" fill="rgba(255,255,255,0.85)">E</text>
  <ellipse class="dashed" cx="120" cy="140" rx="40" ry="40" />
  <text class="tick" x="65" y="190">parking orbit (LEO)</text>
  <ellipse class="accent" cx="220" cy="140" rx="135" ry="60" />
  <text class="tick" x="280" y="80" fill="#4ecdc4">transfer ellipse</text>
  <text class="tick" x="320" y="98" fill="#4ecdc4">→ destination</text>
  <line class="stroke" x1="105" y1="125" x2="92" y2="115" />
  <polygon class="burn" points="92,115 96,121 100,113" />
  <text class="tick" x="55" y="115" fill="#4ecdc4">BURN at perigee</text>
  <text class="tick" x="55" y="128" fill="#4ecdc4">(Oberth)</text>
  <text class="lbl" x="30" y="240">one hard burn flings you onto the transfer to the Moon, Mars, Venus, or Jupiter</text>
</svg>
