<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Transfer ellipse with Sun at one focus, perihelion at departure, aphelion at arrival">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 2; fill: none; }
    .focus { fill: #4ecdc4; }
    .body { fill: rgba(255,255,255,0.85); }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 10px; }
  </style>
  <line x1="50" y1="150" x2="350" y2="150" class="dashed" />
  <ellipse cx="200" cy="150" rx="150" ry="92" class="accent" />
  <!-- Sun at right focus = (200 + sqrt(150² - 92²), 150) ≈ (200+118, 150) = (318, 150) -->
  <circle cx="318" cy="150" r="6" class="focus" />
  <text x="304" y="138" class="label-accent">Sun</text>
  <!-- Departure (perihelion) at right tip -->
  <circle cx="350" cy="150" r="4" class="body" />
  <text x="316" y="172" class="label-mute">depart</text>
  <text x="316" y="186" class="label-mute">(perihelion)</text>
  <!-- Arrival (aphelion) at left tip -->
  <circle cx="50" cy="150" r="4" class="body" />
  <text x="44" y="172" class="label-mute">arrive</text>
  <text x="40" y="186" class="label-mute">(aphelion)</text>
  <!-- Mid-flight body up top -->
  <circle cx="170" cy="60" r="3" class="body" />
  <text x="138" y="50" class="label-mute">in cruise</text>
  <text x="148" y="278" class="label-mute">half a Keplerian orbit</text>
</svg>
