<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Mission viability — porkchop lobe with a horizontal capability ceiling. Cells below the ceiling are feasible; above is infeasible without a bigger rocket or smaller payload.">
  <style>
    .axis { stroke: rgba(255,255,255,0.85); stroke-width: 1.4; fill: none; }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 0.8; fill: none; }
    .dashed { stroke: rgba(255,255,255,0.3); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .red-zone { fill: rgba(193,68,14,0.05); stroke: rgba(193,68,14,0.6); stroke-width: 1.3; stroke-dasharray: 4 3; }
    .accent-fill { fill: rgba(78,205,196,0.3); stroke: #4ecdc4; stroke-width: 1.5; }
    .accent-inner { fill: rgba(78,205,196,0.55); stroke: #4ecdc4; stroke-width: 1.5; }
    .ceiling { stroke: #ffc850; stroke-width: 2; fill: none; stroke-dasharray: 6 3; }
    .ceiling-shade { fill: rgba(193,68,14,0.06); stroke: none; }
    .label { fill: rgba(255,255,255,0.85); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-accent { fill: #4ecdc4; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-gold { fill: #ffc850; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .label-red { fill: rgba(193,68,14,0.95); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; }
    .sublabel { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; }
    .tick { fill: rgba(255,255,255,0.55); font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.8px; }
    .dim-star { fill: rgba(255,255,255,0.2); }
  </style>

  <circle class="dim-star" cx="50" cy="40" r="0.6" />
  <circle class="dim-star" cx="540" cy="50" r="0.5" />

  <text class="label" x="40" y="28">MISSION VIABILITY — DOES THE CHEAP LOBE FIT UNDER THE ROCKET CEILING?</text>

  <!-- Axes -->
  <line class="grid" x1="80" y1="110" x2="560" y2="110" />
  <line class="grid" x1="80" y1="160" x2="560" y2="160" />
  <line class="grid" x1="80" y1="210" x2="560" y2="210" />

  <line class="axis" x1="80" y1="270" x2="560" y2="270" />
  <line class="axis" x1="80" y1="60" x2="80" y2="270" />

  <text class="tick" x="80" y="286" text-anchor="middle">May</text>
  <text class="tick" x="200" y="286" text-anchor="middle">Jul</text>
  <text class="tick" x="320" y="286" text-anchor="middle">Sep</text>
  <text class="tick" x="440" y="286" text-anchor="middle">Nov</text>
  <text class="tick" x="560" y="286" text-anchor="middle">Jan</text>
  <text class="label" x="320" y="304" text-anchor="middle">DEPARTURE DATE</text>

  <text class="tick" x="74" y="273" text-anchor="end">3</text>
  <text class="tick" x="74" y="223" text-anchor="end">5</text>
  <text class="tick" x="74" y="173" text-anchor="end">7</text>
  <text class="tick" x="74" y="123" text-anchor="end">9</text>
  <text class="tick" x="74" y="73" text-anchor="end">12+</text>
  <text class="label" x="40" y="44">Δv (km/s)</text>

  <!-- Ceiling line at Δv = 6 (y = 195) -->
  <rect class="ceiling-shade" x="80" y="60" width="480" height="135" />
  <line class="ceiling" x1="80" y1="195" x2="560" y2="195" />

  <!-- Lobe centred at (320, 220) -->
  <ellipse class="red-zone" cx="320" cy="170" rx="220" ry="90" />
  <ellipse class="accent-fill" cx="320" cy="220" rx="120" ry="34" />
  <ellipse class="accent-inner" cx="320" cy="220" rx="64" ry="18" />

  <!-- Star at optimum -->
  <circle fill="#ffc850" cx="320" cy="220" r="3" />

  <!-- Ceiling label -->
  <text class="label-gold" x="560" y="190" text-anchor="end">FALCON HEAVY CEILING · 6 km/s</text>
  <text class="sublabel" x="560" y="207" text-anchor="end">below this line → flies on existing rockets</text>

  <!-- Feasibility annotations -->
  <text class="label-accent" x="320" y="252" text-anchor="middle">FEASIBLE</text>
  <text class="sublabel" x="320" y="264" text-anchor="middle">cheap lobe lives below ceiling</text>

  <text class="label-red" x="320" y="100" text-anchor="middle">INFEASIBLE</text>
  <text class="sublabel" x="320" y="112" text-anchor="middle">above ceiling — bigger rocket or smaller payload</text>

  <!-- Bottom note -->
  <text class="sublabel" x="540" y="316" text-anchor="end">ceiling depends on payload mass too: doubled payload halves the available Δv</text>
</svg>
