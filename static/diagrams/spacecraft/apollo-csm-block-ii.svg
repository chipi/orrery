<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Apollo Command and Service Module Block II anatomy: command module conical capsule, service module cylinder, SPS engine bell, RCS quads, high-gain antenna">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .stroke-fill { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: rgba(255,255,255,0.04); }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1; fill: none; }
    .nozzle { fill: rgba(180,180,190,0.6); stroke: rgba(220,220,230,0.85); stroke-width: 0.6; }
    .heat { fill: rgba(255,200,80,0.20); stroke: rgba(255,200,80,0.7); stroke-width: 0.8; }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; font-size: 10px; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 9px; }
    .title { fill: rgba(255,255,255,0.85); font-size: 13px; letter-spacing: 2px; }
    .subtitle { fill: rgba(255,255,255,0.55); font-size: 9px; letter-spacing: 1px; }
  </style>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" class="title">APOLLO CSM · BLOCK II</text>
  <text x="200" y="34" text-anchor="middle" class="subtitle">11.0 m · 30,300 kg · 3 crew</text>

  <!-- Centerline -->
  <line x1="200" y1="50" x2="200" y2="270" class="dashed" />

  <!-- Command Module (conical capsule, apex up) -->
  <path d="M 200 60 L 168 130 L 232 130 Z" class="stroke-fill" />
  <!-- Forward access port -->
  <line x1="194" y1="60" x2="206" y2="60" class="stroke" />
  <!-- Pitch RCS -->
  <rect x="183" y="100" width="3" height="6" class="stroke" />
  <rect x="214" y="100" width="3" height="6" class="stroke" />
  <!-- Crew hatch -->
  <rect x="194" y="115" width="12" height="6" class="stroke" />
  <!-- Heat shield -->
  <path d="M 168 130 Q 200 152 232 130" class="heat" />
  <text x="200" y="143" text-anchor="middle" class="label-mute" style="font-size:8px;">ABLATIVE</text>

  <!-- Connection ring CM ↔ SM -->
  <line x1="172" y1="156" x2="228" y2="156" class="stroke" />

  <!-- Service Module cylinder -->
  <rect x="172" y="156" width="56" height="80" class="stroke-fill" />

  <!-- Sectors (8) — visualised as vertical lines -->
  <line x1="186" y1="156" x2="186" y2="236" class="dashed" />
  <line x1="200" y1="156" x2="200" y2="236" class="dashed" />
  <line x1="214" y1="156" x2="214" y2="236" class="dashed" />

  <!-- High-gain antenna (deployed) -->
  <line x1="228" y1="170" x2="270" y2="160" class="stroke" />
  <circle cx="276" cy="158" r="9" class="stroke-fill" />
  <line x1="270" y1="158" x2="282" y2="158" class="stroke" />
  <line x1="276" y1="152" x2="276" y2="164" class="stroke" />

  <!-- RCS quad (4 nozzles, top-right) -->
  <rect x="226" y="180" width="3" height="6" class="nozzle" />
  <rect x="226" y="190" width="3" height="6" class="nozzle" />

  <!-- RCS quad (4 nozzles, top-left) -->
  <rect x="171" y="180" width="3" height="6" class="nozzle" />
  <rect x="171" y="190" width="3" height="6" class="nozzle" />

  <!-- Radiator panels -->
  <rect x="173" y="205" width="6" height="22" class="stroke" />
  <rect x="221" y="205" width="6" height="22" class="stroke" />

  <!-- SPS engine bell -->
  <path d="M 188 236 L 184 268 L 216 268 L 212 236 Z" class="nozzle" />

  <!-- LEFT-SIDE CALLOUTS -->
  <line x1="180" y1="95" x2="80" y2="95" class="accent" />
  <text x="6" y="92" class="label-accent">CM CONE</text>
  <text x="6" y="103" class="label-mute">2.65 m apex angle</text>

  <line x1="172" y1="156" x2="80" y2="156" class="accent" />
  <text x="6" y="153" class="label-accent">HEAT SHIELD</text>
  <text x="6" y="164" class="label-mute">phenolic ablative</text>

  <line x1="172" y1="180" x2="80" y2="180" class="accent" />
  <text x="6" y="177" class="label-accent">SM SECTOR</text>
  <text x="6" y="188" class="label-mute">8 internal bays</text>

  <line x1="173" y1="216" x2="80" y2="216" class="accent" />
  <text x="6" y="213" class="label-accent">RADIATORS</text>
  <text x="6" y="224" class="label-mute">heat rejection</text>

  <line x1="200" y1="252" x2="80" y2="252" class="accent" />
  <text x="6" y="249" class="label-accent">SPS ENGINE</text>
  <text x="6" y="260" class="label-mute">91 kN · LOI + TEI</text>

  <!-- RIGHT-SIDE CALLOUTS -->
  <line x1="206" y1="60" x2="305" y2="60" class="accent" />
  <text x="305" y="57" class="label-accent">DOCKING</text>
  <text x="305" y="68" class="label-mute">to LM adapter</text>

  <line x1="206" y1="118" x2="305" y2="118" class="accent" />
  <text x="305" y="115" class="label-accent">CREW HATCH</text>
  <text x="305" y="126" class="label-mute">side egress</text>

  <line x1="282" y1="158" x2="305" y2="158" class="accent" />
  <text x="305" y="155" class="label-accent">HIGH GAIN</text>
  <text x="305" y="166" class="label-mute">deep-space comm</text>

  <line x1="227" y1="216" x2="305" y2="216" class="accent" />
  <text x="305" y="213" class="label-accent">FUEL CELLS</text>
  <text x="305" y="224" class="label-mute">3× H₂/O₂ stack</text>

  <!-- Footer caption -->
  <text x="200" y="298" text-anchor="middle" class="subtitle">North American Aviation · 1968–1975 · 11 lunar flights + Skylab + ASTP</text>
  <text x="200" y="312" text-anchor="middle" class="subtitle">CM returns; SM jettisoned before reentry · only CM lands</text>
</svg>
