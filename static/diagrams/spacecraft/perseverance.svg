<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Perseverance Mars rover anatomy: rocker-bogie chassis, MMRTG aft, robotic arm with sample-caching turret, Mastcam-Z mast, MOXIE oxygen experiment, Ingenuity helicopter mount">
  <style>
    .stroke { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: none; }
    .stroke-fill { stroke: rgba(255,255,255,0.85); stroke-width: 1.5; fill: rgba(255,255,255,0.04); }
    .dashed { stroke: rgba(255,255,255,0.35); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .accent { stroke: #4ecdc4; stroke-width: 1; fill: none; }
    .silver { fill: rgba(200,200,210,0.18); stroke: rgba(220,220,230,0.85); stroke-width: 0.8; }
    .rust { fill: rgba(193,68,14,0.10); stroke: rgba(193,68,14,0.6); stroke-width: 0.6; }
    .heat { fill: rgba(255,200,80,0.20); stroke: rgba(255,200,80,0.7); stroke-width: 0.8; }
    text { font-family: 'Space Mono', monospace; font-size: 11px; fill: rgba(255,255,255,0.85); letter-spacing: 1px; }
    .label-accent { fill: #4ecdc4; font-size: 10px; }
    .label-mute { fill: rgba(255,255,255,0.55); font-size: 9px; }
    .title { fill: rgba(255,255,255,0.85); font-size: 13px; letter-spacing: 2px; }
    .subtitle { fill: rgba(255,255,255,0.55); font-size: 9px; letter-spacing: 1px; }
  </style>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" class="title">PERSEVERANCE · MARS 2020</text>
  <text x="200" y="34" text-anchor="middle" class="subtitle">3.0 m × 2.7 m × 2.2 m · 1,025 kg · Jezero Crater since 2021</text>

  <!-- Mars surface -->
  <line x1="50" y1="240" x2="350" y2="240" class="dashed" />
  <path d="M 60 240 Q 80 234 100 240 T 140 240 T 200 240 T 260 240 T 340 240" class="rust" />

  <!-- Chassis -->
  <rect x="120" y="170" width="160" height="50" class="silver" />

  <!-- Mast -->
  <line x1="155" y1="170" x2="155" y2="100" class="stroke" />
  <rect x="146" y="84" width="18" height="16" class="stroke-fill" />
  <circle cx="151" cy="92" r="2.2" class="stroke" />
  <circle cx="159" cy="92" r="2.2" class="stroke" />
  <line x1="155" y1="84" x2="155" y2="76" class="accent" />
  <circle cx="155" cy="74" r="3" class="stroke-fill" />

  <!-- HGA -->
  <rect x="240" y="146" width="20" height="20" class="stroke-fill" />
  <line x1="250" y1="146" x2="250" y2="170" class="stroke" />

  <!-- MMRTG -->
  <rect x="284" y="180" width="22" height="30" class="heat" />
  <line x1="285" y1="186" x2="305" y2="186" class="stroke" />
  <line x1="285" y1="194" x2="305" y2="194" class="stroke" />
  <line x1="285" y1="202" x2="305" y2="202" class="stroke" />

  <!-- Robotic arm with sample-caching turret -->
  <line x1="120" y1="190" x2="100" y2="210" class="stroke" />
  <line x1="100" y1="210" x2="80" y2="220" class="stroke" />
  <circle cx="100" cy="210" r="3" class="stroke-fill" />
  <circle cx="80" cy="220" r="3" class="stroke-fill" />
  <!-- Sample-caching turret (larger than Curiosity's, includes coring drill + SHERLOC + PIXL) -->
  <rect x="64" y="212" width="18" height="20" class="stroke-fill" />

  <!-- MOXIE box (oxygen-from-CO₂ experiment, top deck right) -->
  <rect x="206" y="158" width="20" height="14" class="stroke-fill" />

  <!-- Ingenuity helicopter (small, attached under chassis pre-deploy) -->
  <rect x="200" y="226" width="18" height="6" class="stroke-fill" />
  <line x1="200" y1="222" x2="218" y2="222" class="stroke" />
  <line x1="195" y1="220" x2="223" y2="220" class="stroke" />
  <line x1="209" y1="218" x2="209" y2="232" class="stroke" />

  <!-- Wheels -->
  <circle cx="135" cy="240" r="14" class="stroke-fill" />
  <circle cx="135" cy="240" r="8" class="dashed" />
  <circle cx="200" cy="246" r="14" class="stroke-fill" />
  <circle cx="200" cy="246" r="8" class="dashed" />
  <circle cx="265" cy="240" r="14" class="stroke-fill" />
  <circle cx="265" cy="240" r="8" class="dashed" />

  <!-- Suspension -->
  <line x1="135" y1="226" x2="200" y2="222" class="stroke" />
  <line x1="200" y1="222" x2="265" y2="226" class="stroke" />

  <!-- LEFT-SIDE CALLOUTS -->
  <line x1="155" y1="74" x2="80" y2="60" class="accent" />
  <text x="6" y="58" class="label-accent">SUPERCAM</text>
  <text x="6" y="69" class="label-mute">laser + IR + Raman</text>

  <line x1="146" y1="92" x2="80" y2="100" class="accent" />
  <text x="6" y="98" class="label-accent">MASTCAM-Z</text>
  <text x="6" y="109" class="label-mute">zoom · stereo</text>

  <line x1="120" y1="195" x2="50" y2="195" class="accent" />
  <text x="6" y="192" class="label-accent">ROBOT ARM</text>
  <text x="6" y="203" class="label-mute">2.1 m · sample drill</text>

  <line x1="64" y1="220" x2="50" y2="246" class="accent" />
  <text x="6" y="246" class="label-accent">CACHE TURRET</text>
  <text x="6" y="257" class="label-mute">PIXL · SHERLOC · drill</text>

  <!-- RIGHT-SIDE CALLOUTS -->
  <line x1="226" y1="166" x2="305" y2="160" class="accent" />
  <text x="305" y="158" class="label-accent">MOXIE</text>
  <text x="305" y="169" class="label-mute">CO₂ → O₂ first</text>

  <line x1="260" y1="156" x2="305" y2="180" class="accent" />
  <text x="305" y="178" class="label-accent">HGA</text>
  <text x="305" y="189" class="label-mute">DSN comm</text>

  <line x1="306" y1="195" x2="335" y2="200" class="accent" />
  <text x="335" y="207" text-anchor="end" class="label-accent">MMRTG</text>

  <line x1="218" y1="222" x2="335" y2="245" class="accent" />
  <text x="335" y="252" text-anchor="end" class="label-accent">INGENUITY</text>
  <text x="335" y="263" text-anchor="end" class="label-mute">first off-world flight</text>

  <line x1="265" y1="254" x2="335" y2="280" class="accent" />
  <text x="335" y="287" text-anchor="end" class="label-accent">6 WHEELS</text>
  <text x="335" y="298" text-anchor="end" class="label-mute">aluminum spoked</text>

  <!-- Footer caption -->
  <text x="200" y="313" text-anchor="middle" class="subtitle">NASA JPL · launched 2020-07-30 on Atlas V · sky-crane landing 2021-02-18 · 38 sample tubes cached for return</text>
</svg>
